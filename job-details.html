<!DOCTYPE html>
<html>
<head>
  <title>Job Details - TaskMint</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      color: #111;
      padding-bottom: 80px;
    }

    .container {
      max-width: 420px;
      margin: 0 auto;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    h1 {
      text-align: center;
    }

    p {
      margin: 8px 0;
    }

    .status {
      font-weight: bold;
      color: green;
    }

    .nav {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: white;
      border-top: 1px solid #ddd;
      display: flex;
      justify-content: space-around;
      padding: 12px 0;
    }

    .nav a {
      text-decoration: none;
      color: #555;
      font-size: 14px;
    }

    .nav a.active {
      color: green;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>Job Details</h1>

  <div id="jobDetails" class="card">
    Loading job...
  </div>
</div>

<div class="nav">
  <a href="customer-home.html">Home</a>
  <a href="my-jobs.html" class="active">My Jobs</a>
  <a href="messages.html">Messages</a>
  <a href="profile.html">Profile</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseClient = window.supabase.createClient(
  "https://dbcthtjmtlumidpbucrc.supabase.co",
  "sb_publishable_3h7cO2Z8CDxZyEKDLRzvtg_1UJCLldJ"
);

async function loadJobDetails() {
  const jobId = localStorage.getItem("selectedJobId");
  const container = document.getElementById("jobDetails");

  if (!jobId) {
    container.innerHTML = "No job selected.";
    return;
  }

  const { data: job, error } = await supabaseClient
    .from("tasks")
    .select("*")
    .eq("id", jobId)
    .single();

  if (error || !job) {
    container.innerHTML = "Error loading job.";
    return;
  }

  container.innerHTML = `
    <h2>${job.title || "Untitled Job"}</h2>
    <p>${job.description || ""}</p>

    <p><strong>Category:</strong> ${job.category || ""}</p>
    <p><strong>Budget:</strong> $${job.price || ""}</p>
    <p><strong>Location:</strong> ${job.city || ""}, ${job.state || ""}</p>
    <p><strong>Address:</strong> ${job.street_address || ""}</p>
    <p><strong>Unit:</strong> ${job.unit || ""}</p>
    <p><strong>Zip Code:</strong> ${job.zip_code || ""}</p>
    <p><strong>Schedule:</strong> ${job.schedule_preference || ""}</p>

    <p class="status">${job.status || "open"}</p>
  `;
}

loadJobDetails();
</script>

</body>
</html>
