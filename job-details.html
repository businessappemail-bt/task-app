<!DOCTYPE html>
<html>
<head>
  <title>Job Details - TaskMint</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      color: #111;
      padding-bottom: 80px;
    }

    .container {
      max-width: 420px;
      margin: 0 auto;
      padding: 20px;
      box-sizing: border-box;
    }

    .back {
      color: #0b7a28;
      font-weight: bold;
      margin-bottom: 18px;
      display: inline-block;
      text-decoration: none;
    }

    h1 {
      text-align: center;
    }

    p {
      margin: 8px 0;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .customer-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px;
      border-radius: 14px;
      background: #f7faf8;
      border: 1px solid #e3eee6;
      margin: 12px 0;
    }

    .customer-photo {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #e7f7ec;
      background: #e7f7ec;
      flex-shrink: 0;
    }

    .customer-name {
      font-size: 14px;
      font-weight: 900;
      color: #111;
    }

    .customer-sub {
      font-size: 12px;
      color: #666;
      margin-top: 2px;
    }

    .privacy-note {
      font-size: 12px;
      color: #666;
      line-height: 1.4;
      background: #fff7e6;
      border: 1px solid #ffd27a;
      border-radius: 12px;
      padding: 10px;
      margin: 12px 0;
    }

    .status {
      font-weight: bold;
      color: green;
      text-transform: capitalize;
    }

    button {
      padding: 11px 13px;
      border: none;
      border-radius: 10px;
      background: #0b7a28;
      color: white;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
    }

    .nav {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: white;
      border-top: 1px solid #ddd;
      display: flex;
      justify-content: space-around;
      padding: 12px 0;
    }

    .nav a {
      text-decoration: none;
      color: #555;
      font-size: 14px;
    }

    .nav a.active {
      color: green;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="container">
  <a class="back" href="my-jobs.html">← Back</a>

  <h1>Job Details</h1>

  <div id="jobDetails" class="card">
    Loading job details...
  </div>

  <div id="applicantsList" class="card" style="margin-top:15px;">
    No applicants yet.
  </div>
</div>

<div class="nav">
  <a href="customer-home.html">Home</a>
  <a href="my-jobs.html" class="active">My Jobs</a>
  <a href="messages.html">Messages</a>
  <a href="profile.html">Profile</a>
</div>

<script>
const supabaseClient = window.supabase.createClient(
  "https://dbcthtjmtlumidpbucrc.supabase.co",
  "sb_publishable_3h7cO2Z8CDxZyEKDLRzvtg_1UJCLldJ"
);

const DEFAULT_PROFILE_PHOTO =
  "https://github.com/businessappemail-bt/task-app/blob/main/taskmintlogo.png?raw=true";

let currentUser = null;

function cleanText(value, fallback = "") {
  if (value === null || value === undefined) {
    return fallback;
  }

  const text = String(value).trim();
  return text === "" ? fallback : text;
}

function escapeHTML(value) {
  return cleanText(value, "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function getCustomerName(job, profile) {
  const taskCustomerName = cleanText(job.customer_name, "");

  if (taskCustomerName) {
    return taskCustomerName;
  }

  if (profile) {
    const fullName = cleanText(profile.full_name, "");

    if (fullName) {
      return fullName;
    }

    const firstName = cleanText(profile.first_name, "");
    const lastName = cleanText(profile.last_name, "");
    const combinedName = `${firstName} ${lastName}`.trim();

    if (combinedName) {
      return combinedName;
    }
  }

  return "Customer";
}

function getCustomerPhoto(profile) {
  if (!profile) {
    return DEFAULT_PROFILE_PHOTO;
  }

  return cleanText(profile.profile_photo_url, DEFAULT_PROFILE_PHOTO);
}

function removeHiddenAddressDetails(textValue) {
  const text = cleanText(textValue, "");

  if (!text) {
    return "";
  }

  return text
    .split("\n")
    .filter(line => {
      const lowered = String(line || "").toLowerCase().trim();

      return !(
        lowered.startsWith("drop-off address:") ||
        lowered.startsWith("dropoff address:") ||
        lowered.startsWith("drop off address:") ||
        lowered.startsWith("drop-off unit:") ||
        lowered.startsWith("dropoff unit:") ||
        lowered.startsWith("drop off unit:") ||
        lowered.startsWith("drop-off city:") ||
        lowered.startsWith("dropoff city:") ||
        lowered.startsWith("drop off city:") ||
        lowered.startsWith("drop-off state:") ||
        lowered.startsWith("dropoff state:") ||
        lowered.startsWith("drop off state:") ||
        lowered.startsWith("drop-off zip:") ||
        lowered.startsWith("dropoff zip:") ||
        lowered.startsWith("drop off zip:")
      );
    })
    .join("\n")
    .trim();
}

function isPaidOrAccepted(job) {
  const paymentStatus = String(cleanText(job.payment_status, "")).toLowerCase();
  const escrowStatus = String(cleanText(job.escrow_status, "")).toLowerCase();

  return (
    job.quote_accepted === true ||
    cleanText(job.accepted_quote_id, "") !== "" ||
    ["paid", "escrowed", "authorized", "held"].includes(paymentStatus) ||
    ["paid", "escrowed", "authorized", "held"].includes(escrowStatus)
  );
}

function canShowAddress(job, customerProfile) {
  if (!currentUser || !job) {
    return false;
  }

  const currentEmail = cleanText(currentUser.email, "").toLowerCase();
  const customerEmail = cleanText(customerProfile ? customerProfile.email : "", "").toLowerCase();

  const currentUserOwnsTask =
    cleanText(job.customer_id, "") === cleanText(currentUser.id, "") ||
    (customerEmail && currentEmail && customerEmail === currentEmail);

  const workerAssigned =
    cleanText(job.assigned_worker_id, "") === cleanText(currentUser.id, "") ||
    cleanText(job.accepted_worker_id, "") === cleanText(currentUser.id, "") ||
    cleanText(job.worker_id, "") === cleanText(currentUser.id, "");

  return currentUserOwnsTask || (workerAssigned && isPaidOrAccepted(job));
}

function formatTaskDetails(job, showAddress) {
  const description = cleanText(job.description, "");

  if (showAddress) {
    return description;
  }

  return removeHiddenAddressDetails(description);
}

async function fetchCustomerProfile(customerId) {
  if (!customerId) {
    return null;
  }

  const { data, error } = await supabaseClient
    .from("profiles")
    .select("id, first_name, last_name, full_name, email, profile_photo_url")
    .eq("id", customerId)
    .maybeSingle();

  if (error || !data) {
    return null;
  }

  return data;
}

async function loadJobDetails() {
  const jobId = localStorage.getItem("selectedJobId") || localStorage.getItem("selectedTaskId");
  const container = document.getElementById("jobDetails");

  const { data: userData } = await supabaseClient.auth.getUser();
  currentUser = userData && userData.user ? userData.user : null;

  if (!jobId) {
    container.innerHTML = "No job selected.";
    return;
  }

  const { data: job, error } = await supabaseClient
    .from("tasks")
    .select("*")
    .eq("id", jobId)
    .single();

  if (error || !job) {
    container.innerHTML = "Error loading job.";
    return;
  }

  const customerProfile = await fetchCustomerProfile(job.customer_id);
  const showAddress = canShowAddress(job, customerProfile);
  const safeDescription = formatTaskDetails(job, showAddress);

  container.innerHTML = `
    <h2>${escapeHTML(job.title || "Untitled Job")}</h2>

    <div class="customer-row">
      <img
        class="customer-photo"
        src="${escapeHTML(getCustomerPhoto(customerProfile))}"
        alt="Customer profile photo"
        onerror="this.src='${DEFAULT_PROFILE_PHOTO}'"
      >

      <div>
        <div class="customer-name">
          ${escapeHTML(getCustomerName(job, customerProfile))}
        </div>
        <div class="customer-sub">
          Customer for this task
        </div>
      </div>
    </div>

    <p>${escapeHTML(safeDescription)}</p>

    <p><strong>Category:</strong> ${escapeHTML(job.category || "")}</p>
    <p><strong>Location:</strong> ${escapeHTML(job.city || "")}, ${escapeHTML(job.state || "")}</p>

    ${
      showAddress
        ? `
          <p><strong>Address:</strong> ${escapeHTML(job.location_address || job.street_address || "")}</p>
          <p><strong>Unit:</strong> ${escapeHTML(job.unit || "")}</p>
          <p><strong>Zip Code:</strong> ${escapeHTML(job.zip_code || "")}</p>
          <p><strong>Drop-Off Address:</strong> ${escapeHTML(job.dropoff_address || "")}</p>
          <p><strong>Drop-Off Unit:</strong> ${escapeHTML(job.dropoff_unit || "")}</p>
          <p><strong>Drop-Off City:</strong> ${escapeHTML(job.dropoff_city || "")}</p>
          <p><strong>Drop-Off State:</strong> ${escapeHTML(job.dropoff_state || "")}</p>
          <p><strong>Drop-Off Zip:</strong> ${escapeHTML(job.dropoff_zip_code || "")}</p>
        `
        : `
          <div class="privacy-note">
            Full pickup and drop-off addresses are hidden until the customer's quote is accepted and payment is recorded.
          </div>
        `
    }

    <p><strong>Schedule:</strong> ${escapeHTML(job.schedule_preference || job.date_needed || job.task_date || "")}</p>

    <p class="status">${escapeHTML(job.status || "open")}</p>
  `;
}

async function loadApplicants() {
  const jobId = localStorage.getItem("selectedJobId") || localStorage.getItem("selectedTaskId");
  const container = document.getElementById("applicantsList");

  if (!jobId) {
    return;
  }

  const { data: quotes, error } = await supabaseClient
    .from("worker_quotes")
    .select("*")
    .eq("task_id", jobId);

  if (error || !quotes || quotes.length === 0) {
    container.innerHTML = "No applicants yet.";
    return;
  }

  container.innerHTML = "";

  quotes.forEach(q => {
    const div = document.createElement("div");

    div.innerHTML = `
      <p><strong>Quote:</strong> $${escapeHTML(q.quote_amount || "")}</p>
      <p>${escapeHTML(q.message || "")}</p>
      <button onclick="acceptQuote('${escapeHTML(q.id)}', '${escapeHTML(q.worker_id)}')">
        Accept Worker
      </button>
      <hr/>
    `;

    container.appendChild(div);
  });
}

async function acceptQuote(quoteId, workerId) {
  alert("Accept clicked for quote: " + quoteId);
}

loadJobDetails();
loadApplicants();
</script>

</body>
</html>
