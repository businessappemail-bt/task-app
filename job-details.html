<!DOCTYPE html>
<html>
<head>
  <title>Job Details - TaskMint</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      color: #111;
      padding-bottom: 80px;
    }

    .container {
      max-width: 420px;
      margin: 0 auto;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    h1 {
      text-align: center;
    }

    p {
      margin: 8px 0;
    }

    .status {
      font-weight: bold;
      color: green;
    }

    .nav {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: white;
      border-top: 1px solid #ddd;
      display: flex;
      justify-content: space-around;
      padding: 12px 0;
    }

    .nav a {
      text-decoration: none;
      color: #555;
      font-size: 14px;
    }

    .nav a.active {
      color: green;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>Job Details</h1>

  <div id="jobDetails" class="card">
    No applicants yet.
  </div>
  <div id="applicantsList" class="card" style="margin-top:15px;">
  No applicants yet.
</div>
  

<div class="nav">
  <a href="customer-home.html">Home</a>
  <a href="my-jobs.html" class="active">My Jobs</a>
  <a href="messages.html">Messages</a>
  <a href="profile.html">Profile</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseClient = window.supabase.createClient(
  "https://dbcthtjmtlumidpbucrc.supabase.co",
  "sb_publishable_3h7cO2Z8CDxZyEKDLRzvtg_1UJCLldJ"
);

async function loadJobDetails() {
  const jobId = localStorage.getItem("selectedJobId");
  const container = document.getElementById("jobDetails");

  if (!jobId) {
    container.innerHTML = "No job selected.";
    return;
  }

  const { data: job, error } = await supabaseClient
    .from("tasks")
    .select("*")
    .eq("id", jobId)
    .single();

  if (error || !job) {
    container.innerHTML = "Error loading job.";
    return;
  }

  container.innerHTML = `
    <h2>${job.title || "Untitled Job"}</h2>
    <p>${job.description || ""}</p>

    <p><strong>Category:</strong> ${job.category || ""}</p>
    <p><strong>Location:</strong> ${job.city || ""}, ${job.state || ""}</p>
    <p><strong>Address:</strong> ${job.street_address || ""}</p>
    <p><strong>Unit:</strong> ${job.unit || ""}</p>
    <p><strong>Zip Code:</strong> ${job.zip_code || ""}</p>
    <p><strong>Schedule:</strong> ${job.schedule_preference || ""}</p>

    <p class="status">${job.status || "open"}</p>
  `;
}
async function loadApplicants() {
  const jobId = localStorage.getItem("selectedJobId");
  const container = document.getElementById("applicantsList");

  if (!jobId) return;

  const { data: quotes, error } = await supabaseClient
    .from("worker_quotes")
    .select("*")
    .eq("task_id", jobId);

  if (error || !quotes || quotes.length === 0) {
    container.innerHTML = "No applicants yet.";
    return;
  }

  container.innerHTML = "";

  quotes.forEach(q => {
    const div = document.createElement("div");

    div.innerHTML = `
      <p><strong>Quote:</strong> $${q.quote_amount}</p>
      <p>${q.message || ""}</p>
      <button onclick="acceptQuote('${q.id}', '${q.worker_id}')">
        Accept Worker
      </button>
      <hr/>
    `;

    container.appendChild(div);
  });
  async function acceptQuote(quoteId, workerId) {
  alert("Accept quote button is connected.");
}
loadJobDetails();
loadApplicants();
</script>

</body>
</html>
