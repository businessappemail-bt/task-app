<!DOCTYPE html>
<html>
<head>
<title>Past Tasks - TaskMint</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --bg: #ffffff;
  --surface: #f2f7f4;
  --surface2: #e6f4eb;
  --border: #e2ebe5;
  --accent: #0b7a28;
  --text: #111111;
  --muted: #6b7870;
  --danger: #b00020;
}

body {
  margin: 0;
  font-family: 'Plus Jakarta Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  padding-bottom: 90px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.container {
  width: 100%;
  max-width: 470px;
  padding: 20px 16px 30px;
}

.top-bar {
  position: sticky;
  top: 0;
  z-index: 40;
  width: 100%;
  max-width: 470px;
  background: rgba(255,255,255,0.97);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 13px 20px;
  margin: -20px -16px 20px;
}

.back,
.refresh {
  color: var(--accent);
  font-weight: 800;
  cursor: pointer;
  font-size: 14px;
  text-decoration: none;
}

.refresh {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 999px;
  padding: 8px 11px;
  font-size: 12px;
}

.hero {
  background: var(--accent);
  color: white;
  border-radius: 22px;
  padding: 24px 20px;
  margin-bottom: 14px;
  box-shadow: 0 8px 24px rgba(11,122,40,0.22);
  position: relative;
  overflow: hidden;
  opacity: 0;
  animation: riseIn 0.35s 0.05s forwards;
}

.hero::before {
  content: "";
  position: absolute;
  width: 155px;
  height: 155px;
  border-radius: 50%;
  background: rgba(255,255,255,0.10);
  top: -65px;
  right: -55px;
}

.hero::after {
  content: "";
  position: absolute;
  width: 92px;
  height: 92px;
  border-radius: 50%;
  background: rgba(255,255,255,0.07);
  bottom: -45px;
  left: -35px;
}

.hero h1 {
  margin: 0 0 7px;
  font-size: 29px;
  font-weight: 800;
  line-height: 1.08;
  letter-spacing: -0.5px;
  position: relative;
  z-index: 2;
}

.hero p {
  margin: 0;
  font-size: 13px;
  line-height: 1.5;
  color: rgba(255,255,255,0.82);
  position: relative;
  z-index: 2;
}

.summary-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 12px;
  opacity: 0;
  animation: riseIn 0.35s 0.1s forwards;
}

.summary-box,
.filter-card,
.task-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 15px;
}

.summary-label {
  color: var(--accent);
  font-size: 10.5px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.6px;
}

.summary-value {
  font-size: 26px;
  line-height: 1;
  font-weight: 800;
  margin-top: 7px;
}

.filter-card {
  margin-bottom: 12px;
  opacity: 0;
  animation: riseIn 0.35s 0.15s forwards;
}

.filter-title {
  font-size: 15px;
  font-weight: 800;
  margin-bottom: 10px;
}

.filter-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

select,
input {
  width: 100%;
  padding: 13px;
  border: 1px solid var(--border);
  border-radius: 13px;
  font-size: 14px;
  outline: none;
  background: white;
  color: var(--text);
  font-family: 'Plus Jakarta Sans', sans-serif;
}

select:focus,
input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(11,122,40,0.10);
}

.task-card {
  margin-bottom: 12px;
  background: #fff;
  opacity: 0;
  animation: riseIn 0.35s 0.12s forwards;
}

.task-top {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  align-items: flex-start;
}

.task-title {
  font-size: 18px;
  font-weight: 800;
  margin-bottom: 5px;
  letter-spacing: -0.2px;
}

.task-sub {
  color: var(--muted);
  font-size: 12px;
  line-height: 1.35;
}

.status-pill {
  background: var(--surface2);
  color: var(--accent);
  border-radius: 999px;
  padding: 7px 10px;
  font-size: 11px;
  font-weight: 800;
  white-space: nowrap;
}

.info-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-top: 12px;
}

.info-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 11px;
  min-height: 68px;
}

.info-label {
  color: var(--accent);
  font-size: 10.5px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.6px;
  margin-bottom: 6px;
}

.info-value {
  font-size: 13px;
  font-weight: 700;
  line-height: 1.35;
}

.details-toggle {
  margin-top: 12px;
  color: var(--accent);
  font-size: 13px;
  font-weight: 800;
  cursor: pointer;
}

.details-box {
  display: none;
  margin-top: 10px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 12px;
}

.detail-chip {
  background: white;
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 10px;
  margin-bottom: 8px;
  font-size: 12px;
  font-weight: 700;
  line-height: 1.35;
}

button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 13px;
  font-size: 12px;
  font-weight: 800;
  cursor: pointer;
  transition: opacity 0.18s, transform 0.18s, box-shadow 0.18s;
  margin-top: 10px;
  font-family: 'Plus Jakarta Sans', sans-serif;
}

button:hover {
  opacity: 0.9;
  transform: translateY(-1px);
  box-shadow: 0 6px 14px rgba(11,122,40,0.10);
}

.secondary-btn {
  background: white;
  color: var(--accent);
  border: 1px solid var(--border);
}

.empty {
  background: var(--surface);
  padding: 24px 18px;
  border-radius: 20px;
  text-align: center;
  color: var(--muted);
  border: 1px solid var(--border);
  font-size: 13px;
  line-height: 1.45;
}

#status {
  text-align: center;
  color: var(--danger);
  font-size: 13px;
  font-weight: 800;
  margin: 10px 0;
  line-height: 1.4;
}

.nav {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 470px;
  background: rgba(255,255,255,0.97);
  backdrop-filter: blur(16px);
  border-top: 1px solid var(--border);
  box-shadow: 0 -3px 16px rgba(0,0,0,0.06);
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  padding: 10px 6px 14px;
  z-index: 50;
}

.nav a {
  text-decoration: none;
  color: var(--muted);
  font-size: 10px;
  font-weight: 600;
  text-align: center;
  transition: color 0.18s;
}

.nav a:hover {
  color: var(--accent);
}

.nav-icon {
  display: block;
  font-size: 20px;
  margin-bottom: 3px;
}

.active {
  color: var(--accent) !important;
}

@keyframes riseIn {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

@media (max-width: 360px) {
  .hero h1 {
    font-size: 25px;
  }

  .filter-grid,
  .info-grid {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>
<div class="container">

  <div class="top-bar">
    <a class="back" href="customer-home.html">← Back</a>
    <div class="refresh" onclick="loadPastTasks()">Refresh</div>
  </div>

  <div class="hero">
    <h1>Past Tasks</h1>
    <p>View completed jobs after the customer confirms completion, including worker details, payment amount, and task history.</p>
  </div>

  <div class="summary-row">
    <div class="summary-box">
      <div class="summary-label">Completed Tasks</div>
      <div class="summary-value" id="paidCount">0</div>
    </div>

    <div class="summary-box">
      <div class="summary-label">Total Completed</div>
      <div class="summary-value" id="totalPaid">$0.00</div>
    </div>
  </div>

  <div class="filter-card">
    <div class="filter-title">Filter Past Tasks</div>

    <div class="filter-grid">
      <select id="taskTypeFilter" onchange="applyFilters()">
        <option value="">All categories</option>
      </select>

      <input id="dateFilter" type="date" onchange="applyFilters()">
    </div>

    <button class="secondary-btn" onclick="clearFilters()">Clear Filters</button>
  </div>

  <p id="status"></p>

  <div id="tasksList"></div>
</div>

<div class="nav">
  <a href="customer-home.html"><span class="nav-icon">🏠</span>Home</a>
  <a href="post-job.html"><span class="nav-icon">＋</span>Post</a>
  <a href="view-open-task.html"><span class="nav-icon">📌</span>Open</a>
  <a href="view-past-task.html" class="active"><span class="nav-icon">✅</span>Past</a>
  <a href="message-center.html"><span class="nav-icon">💬</span>Messages</a>
</div>

<script>
const supabaseClient = window.supabase.createClient(
  "https://dbcthtjmtlumidpbucrc.supabase.co",
  "sb_publishable_3h7cO2Z8CDxZyEKDLRzvtg_1UJCLldJ"
);

let allPastTasks = [];
let currentUserId = "";

function escapeHTML(value) {
  if (value === null || value === undefined) {
    return "";
  }

  return String(value)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function formatMoney(value) {
  const numberValue =
    Number(value || 0);

  if (isNaN(numberValue)) {
    return "$0.00";
  }

  return "$" + numberValue.toFixed(2);
}

function formatDate(value) {
  if (!value) {
    return "Not listed";
  }

  const date =
    new Date(value);

  if (isNaN(date.getTime())) {
    return value;
  }

  return date.toLocaleDateString();
}

function getTaskPaidDate(task) {
  return (
    task.customer_completed_at ||
    task.completed_at ||
    task.paid_at ||
    task.created_at ||
    ""
  );
}

function getTaskAmount(task) {
  return (
    task.paid_amount ??
    task.amount_paid ??
    task.accepted_quote_amount ??
    task.quote_amount ??
    task.total_amount ??
    task.price ??
    task.amount ??
    0
  );
}

function getAssignedWorkerId(task) {
  return (
    task.assigned_worker_id ||
    task.accepted_worker_id ||
    task.worker_id ||
    ""
  );
}

function getTaskType(task) {
  return (
    task.category ||
    task.task_type ||
    task.service_type ||
    task.job_type ||
    task.type ||
    task.title ||
    "Task"
  );
}

function getTaskDetails(task) {
  if (task.task_details && typeof task.task_details === "object") {
    return Object.keys(task.task_details)
      .map(key => {
        const label =
          key.replaceAll("_", " ").replace(/\b\w/g, char => char.toUpperCase());

        const value =
          Array.isArray(task.task_details[key])
            ? task.task_details[key].join(", ")
            : task.task_details[key];

        return `${label}: ${value || "Not answered"}`;
      });
  }

  if (task.description) {
    return String(task.description)
      .split("\n")
      .filter(Boolean);
  }

  return ["No task details listed."];
}

async function getCurrentUser() {
  const { data } =
    await supabaseClient.auth.getSession();

  if (data.session && data.session.user) {
    localStorage.setItem("taskmintUserId", data.session.user.id);
    return data.session.user;
  }

  const savedUserId =
    localStorage.getItem("taskmintUserId");

  if (savedUserId) {
    return { id: savedUserId };
  }

  window.location.href = "login.html";
  return null;
}

async function attachQuoteAmountsAndWorkers() {
  for (const task of allPastTasks) {
    const quoteId =
      task.accepted_quote_id ||
      task.quote_id ||
      "";

    if (quoteId) {
      const { data: quote } =
        await supabaseClient
          .from("worker_quotes")
          .select("*")
          .eq("id", quoteId)
          .maybeSingle();

      if (quote) {
        task.quote_amount =
          quote.quote_amount ??
          quote.quote_price ??
          quote.offer_amount ??
          quote.total_amount ??
          quote.quote ??
          quote.amount ??
          quote.price ??
          task.quote_amount ??
          0;

        task.worker_id =
          task.worker_id ||
          quote.worker_id ||
          quote.user_id ||
          quote.worker_user_id ||
          "";
      }
    }
  }
}

async function getWorkerName(workerId) {
  if (!workerId) {
    return "Worker not listed";
  }

  let person = {};

  const { data: profile } =
    await supabaseClient
      .from("profiles")
      .select("first_name, last_name, full_name, display_name")
      .eq("id", workerId)
      .maybeSingle();

  if (profile) {
    person = Object.assign(person, profile);
  }

  const { data: workerProfileById } =
    await supabaseClient
      .from("worker_profiles")
      .select("full_name, display_name")
      .eq("id", workerId)
      .maybeSingle();

  if (workerProfileById) {
    person = Object.assign(person, workerProfileById);
  }

  const { data: workerProfileByUserId } =
    await supabaseClient
      .from("worker_profiles")
      .select("full_name, display_name")
      .eq("auth_user_id", workerId)
      .maybeSingle();

  if (workerProfileByUserId) {
    person = Object.assign(person, workerProfileByUserId);
  }

  return (
    person.full_name ||
    person.display_name ||
    `${person.first_name || ""} ${person.last_name || ""}`.trim() ||
    "Worker not listed"
  );
}

async function loadPastTasks() {
  const tasksList =
    document.getElementById("tasksList");

  const status =
    document.getElementById("status");

  status.innerText = "";
  tasksList.innerHTML =
    `<div class="empty">Loading completed tasks...</div>`;

  const user =
    await getCurrentUser();

  if (!user) {
    return;
  }

  currentUserId =
    user.id;

  const { data: tasks, error } =
    await supabaseClient
      .from("tasks")
      .select("*")
      .eq("customer_id", currentUserId)
      .eq("status", "completed")
      .eq("customer_completed", true)
      .order("created_at", { ascending: false });

  if (error) {
    tasksList.innerHTML =
      `<div class="empty">${escapeHTML(error.message)}</div>`;
    return;
  }

  allPastTasks =
    tasks || [];

  await attachQuoteAmountsAndWorkers();
  populateTaskTypeFilter();
  applyFilters();
}

function populateTaskTypeFilter() {
  const select =
    document.getElementById("taskTypeFilter");

  const currentValue =
    select.value;

  const types =
    [...new Set(
      allPastTasks
        .map(task => getTaskType(task))
        .filter(Boolean)
    )].sort();

  select.innerHTML =
    `<option value="">All categories</option>`;

  types.forEach(type => {
    const option =
      document.createElement("option");

    option.value = type;
    option.innerText = type;

    select.appendChild(option);
  });

  select.value =
    currentValue;
}

function applyFilters() {
  const typeFilter =
    document.getElementById("taskTypeFilter").value;

  const dateFilter =
    document.getElementById("dateFilter").value;

  let filtered =
    allPastTasks.slice();

  if (typeFilter) {
    filtered =
      filtered.filter(task => getTaskType(task) === typeFilter);
  }

  if (dateFilter) {
    filtered =
      filtered.filter(task => {
        const paidDate =
          getTaskPaidDate(task);

        if (!paidDate) {
          return false;
        }

        return String(paidDate).slice(0, 10) === dateFilter;
      });
  }

  renderTasks(filtered);
}

function clearFilters() {
  document.getElementById("taskTypeFilter").value = "";
  document.getElementById("dateFilter").value = "";

  renderTasks(allPastTasks);
}

async function renderTasks(tasks) {
  const tasksList =
    document.getElementById("tasksList");

  document.getElementById("paidCount").innerText =
    String(tasks.length);

  const total =
    tasks.reduce((sum, task) => {
      return sum + Number(getTaskAmount(task) || 0);
    }, 0);

  document.getElementById("totalPaid").innerText =
    formatMoney(total);

  if (!tasks || tasks.length === 0) {
    tasksList.innerHTML =
      `<div class="empty">No completed tasks match this filter.</div>`;
    return;
  }

  tasksList.innerHTML = "";

  for (const task of tasks) {
    const workerId =
      getAssignedWorkerId(task);

    const workerName =
      task.worker_name ||
      await getWorkerName(workerId);

    const detailsId =
      `details-${task.id}`;

    const card =
      document.createElement("div");

    card.className =
      "task-card";

    const details =
      getTaskDetails(task)
        .map(detail => `
          <div class="detail-chip">
            ${escapeHTML(detail)}
          </div>
        `)
        .join("");

    card.innerHTML = `
      <div class="task-top">
        <div>
          <div class="task-title">
            ${escapeHTML(getTaskType(task))}
          </div>

          <div class="task-sub">
            Order # TM-${String(task.id).slice(0, 8).toUpperCase()} •
            Completed ${escapeHTML(formatDate(getTaskPaidDate(task)))}
          </div>
        </div>

        <div class="status-pill">
          Completed
        </div>
      </div>

      <div class="info-grid">
        <div class="info-box">
          <div class="info-label">Worker</div>
          <div class="info-value">
            ${escapeHTML(workerName)}
          </div>
        </div>

        <div class="info-box">
          <div class="info-label">Amount</div>
          <div class="info-value">
            ${escapeHTML(formatMoney(getTaskAmount(task)))}
          </div>
        </div>

        <div class="info-box">
          <div class="info-label">Task Date</div>
          <div class="info-value">
            ${escapeHTML(formatDate(task.task_date || task.date_needed || task.created_at))}
          </div>
        </div>

        <div class="info-box">
          <div class="info-label">Location</div>
          <div class="info-value">
            ${escapeHTML(task.city || "")}, ${escapeHTML(task.state || "")}
          </div>
        </div>
      </div>

      <div class="details-toggle" onclick="toggleDetails('${detailsId}')">
        View task details
      </div>

      <div class="details-box" id="${detailsId}">
        ${details}
      </div>
    `;

    tasksList.appendChild(card);
  }
}

function toggleDetails(detailsId) {
  const box =
    document.getElementById(detailsId);

  if (!box) {
    return;
  }

  box.style.display =
    box.style.display === "block" ? "none" : "block";
}

loadPastTasks();
</script>
</body>
</html>
