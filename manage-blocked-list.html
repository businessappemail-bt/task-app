<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Manage Blocked List - TaskMint</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --bg:          #ffffff;
  --surface:     #f2f7f4;
  --surface2:    #e6f4eb;
  --border:      #e2ebe5;
  --accent:      #0b7a28;
  --text:        #111111;
  --muted:       #6b7870;
  --danger:      #b00020;
  --danger-bg:   #fff0ef;
  --danger-line: #ffd7d3;
  --dark:        #1f2933;
}

body {
  margin: 0;
  font-family: 'Plus Jakarta Sans', Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  justify-content: center;
}

.app {
  width: 100%;
  max-width: 470px;
  min-height: 100vh;
  background: var(--bg);
  padding-bottom: 90px;
}

/* ── HERO / TOP AREA ── */
.hero {
  background: var(--accent);
  color: #fff;
  border-radius: 0 0 24px 24px;
  padding: 14px 16px 24px;
  box-shadow: 0 6px 20px rgba(11,122,40,0.20);
  opacity: 0;
  animation: riseIn 0.35s 0.05s forwards;
}

.hero-top {
  position: sticky;
  top: 0;
  z-index: 40;
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 18px;
}

.back-btn {
  background: rgba(255,255,255,0.14);
  color: #fff;
  border: 1px solid rgba(255,255,255,0.32);
  border-radius: 999px;
  padding: 9px 13px;
  font-size: 13px;
  font-weight: 800;
  font-family: 'Plus Jakarta Sans', Arial, sans-serif;
  cursor: pointer;
}

.page-label {
  font-size: 12px;
  font-weight: 700;
  color: rgba(255,255,255,0.78);
  letter-spacing: 0.2px;
}

.hero h1 {
  margin: 0 0 7px;
  font-size: 27px;
  font-weight: 800;
  line-height: 1.08;
  letter-spacing: -0.45px;
}

.hero p {
  margin: 0;
  font-size: 13px;
  line-height: 1.55;
  color: rgba(255,255,255,0.82);
}

/* ── CONTENT ── */
.content {
  padding: 18px 16px 30px;
}

.summary-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 16px;
  margin-bottom: 14px;
  box-shadow: none;
  opacity: 0;
  animation: riseIn 0.35s 0.1s forwards;
}

.summary-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 14px;
}

.summary-title {
  font-size: 12px;
  font-weight: 700;
  color: var(--muted);
  margin-bottom: 6px;
}

.summary-count {
  font-size: 34px;
  font-weight: 800;
  color: var(--text);
  line-height: 1;
}

.summary-note {
  margin-top: 12px;
  color: var(--muted);
  font-size: 13px;
  line-height: 1.5;
}

.shield {
  width: 48px;
  height: 48px;
  border-radius: 15px;
  background: var(--surface2);
  color: var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  flex-shrink: 0;
}

/* ── SECTION HEADER ── */
.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin: 20px 2px 12px;
  opacity: 0;
  animation: riseIn 0.35s 0.14s forwards;
}

.section-title {
  font-size: 15px;
  font-weight: 800;
  color: var(--text);
}

.refresh-btn {
  background: #fff;
  color: var(--accent);
  border: 1px solid var(--border);
  border-radius: 999px;
  padding: 8px 12px;
  font-size: 12px;
  font-weight: 800;
  font-family: 'Plus Jakarta Sans', Arial, sans-serif;
  cursor: pointer;
}

/* ── BLOCKED WORKER CARD ── */
.blocked-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 16px;
  margin-bottom: 12px;
  box-shadow: none;
  opacity: 0;
  animation: riseIn 0.35s 0.18s forwards;
}

.worker-top {
  display: flex;
  gap: 13px;
  align-items: center;
}

.avatar-wrap {
  position: relative;
  width: 60px;
  height: 60px;
  flex: 0 0 60px;
}

.avatar {
  width: 60px;
  height: 60px;
  border-radius: 18px;
  object-fit: cover;
  border: 1px solid var(--border);
  background: #fff;
}

.block-badge {
  position: absolute;
  right: -5px;
  bottom: -5px;
  width: 24px;
  height: 24px;
  border-radius: 50%;
  background: var(--danger);
  color: #fff;
  border: 2px solid var(--surface);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 800;
}

.worker-main {
  flex: 1;
  min-width: 0;
}

.worker-name {
  font-size: 16px;
  font-weight: 800;
  color: var(--text);
  margin-bottom: 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.worker-meta {
  color: var(--muted);
  font-size: 12.5px;
  line-height: 1.4;
}

.status-pill {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  background: var(--danger-bg);
  color: var(--danger);
  border: 1px solid var(--danger-line);
  border-radius: 999px;
  padding: 6px 10px;
  font-size: 11px;
  font-weight: 800;
  margin-top: 9px;
}

.details {
  margin-top: 14px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.detail-row {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 11px;
  color: var(--text);
  font-size: 13px;
  font-weight: 600;
  line-height: 1.35;
  min-height: 66px;
}

.detail-label {
  display: block;
  color: var(--accent);
  font-size: 10.5px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.4px;
  margin-bottom: 5px;
}

/* ── BUTTONS ── */
.action-row {
  display: grid;
  grid-template-columns: 1fr 0.72fr;
  gap: 10px;
  margin-top: 14px;
}

.unblock-btn,
.small-btn {
  width: 100%;
  border-radius: 12px;
  padding: 13px 12px;
  font-family: 'Plus Jakarta Sans', Arial, sans-serif;
  font-size: 13px;
  font-weight: 800;
  cursor: pointer;
  transition: opacity 0.18s, transform 0.18s;
}

.unblock-btn {
  background: var(--accent);
  color: #fff;
  border: none;
}

.small-btn {
  background: #fff;
  color: var(--accent);
  border: 1px solid var(--border);
}

.unblock-btn:hover,
.small-btn:hover,
.back-btn:hover,
.refresh-btn:hover {
  opacity: 0.88;
  transform: translateY(-1px);
}

.unblock-btn:disabled {
  opacity: 0.6;
  cursor: not-allowed;
  transform: none;
}

/* ── EMPTY / LOADING STATES ── */
.state-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 28px 20px;
  text-align: center;
  opacity: 0;
  animation: riseIn 0.35s 0.18s forwards;
}

.state-icon {
  width: 54px;
  height: 54px;
  border-radius: 17px;
  background: var(--surface2);
  color: var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  margin: 0 auto 14px;
}

.state-title {
  font-size: 17px;
  font-weight: 800;
  color: var(--text);
  margin-bottom: 7px;
}

.state-text {
  color: var(--muted);
  font-size: 13px;
  line-height: 1.5;
}

.loading {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 20px;
  text-align: center;
  color: var(--muted);
  font-size: 13px;
}

/* ── TOAST ── */
.toast {
  position: fixed;
  left: 50%;
  bottom: 22px;
  transform: translateX(-50%);
  width: calc(100% - 34px);
  max-width: 430px;
  background: var(--dark);
  color: #fff;
  border-radius: 16px;
  padding: 13px 15px;
  font-size: 13px;
  font-weight: 700;
  display: none;
  box-shadow: 0 10px 25px rgba(0,0,0,0.22);
  z-index: 80;
}

.toast.show {
  display: block;
}

@media (max-width: 360px) {
  .details,
  .action-row {
    grid-template-columns: 1fr;
  }
}

@keyframes riseIn {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<div class="app">

  <div class="hero">
    <div class="hero-top">
      <button class="back-btn" onclick="window.history.back()">← Back</button>
      <div class="page-label">Customer Safety</div>
    </div>

    <h1>Manage Blocked List</h1>
    <p>
      Workers listed here cannot message you or send quotes while they remain blocked.
    </p>
  </div>

  <div class="content">

    <div class="summary-card">
      <div class="summary-row">
        <div>
          <div class="summary-title">Blocked workers</div>
          <div class="summary-count" id="blockedCount">0</div>
        </div>
        <div class="shield">🛡️</div>
      </div>

      <div class="summary-note">
        Removing someone from this list allows them to message you again and send quotes on your open tasks.
      </div>
    </div>

    <div class="section-header">
      <div class="section-title">Blocked People</div>
      <button class="refresh-btn" onclick="loadBlockedUsers()">Refresh</button>
    </div>

    <div id="blockedList">
      <div class="loading">Loading blocked users...</div>
    </div>

  </div>

</div>

<div class="toast" id="toast"></div>

<script>

const SUPABASE_URL = "https://dbcthtjmtlumidpbucrc.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_3h7cO2Z8CDxZyEKDLRzvtg_1UJCLldJ";

const supabaseClient = supabase.createClient(
  SUPABASE_URL,
  SUPABASE_ANON_KEY
);

const blockedList = document.getElementById("blockedList");
const blockedCount = document.getElementById("blockedCount");
const toast = document.getElementById("toast");

function showToast(message){
  toast.textContent = message;
  toast.classList.add("show");

  setTimeout(() => {
    toast.classList.remove("show");
  }, 2500);
}

function formatDate(value){
  if (!value) return "Not available";

  const date = new Date(value);

  if (isNaN(date.getTime())) {
    return "Not available";
  }

  return date.toLocaleDateString(undefined, {
    month:"short",
    day:"numeric",
    year:"numeric"
  });
}

function renderState(icon, title, text){
  blockedList.innerHTML = `
    <div class="state-box">
      <div class="state-icon">${icon}</div>
      <div class="state-title">${title}</div>
      <div class="state-text">${text}</div>
    </div>
  `;
}

function escapeHTML(value) {
  if (value === null || value === undefined) {
    return "";
  }

  return String(value)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function getBlockedWorkerId(blocked) {
  return (
    blocked.blocked_user_id ||
    blocked.worker_id ||
    blocked.blocked_worker_id ||
    blocked.blocked_id ||
    ""
  );
}

async function getWorkerProfile(workerId) {
  if (!workerId) {
    return null;
  }

  const { data: workerById } = await supabaseClient
    .from("worker_profiles")
    .select("*")
    .eq("id", workerId)
    .maybeSingle();

  if (workerById) {
    return workerById;
  }

  const { data: profileById } = await supabaseClient
    .from("profiles")
    .select("*")
    .eq("id", workerId)
    .maybeSingle();

  return profileById || null;
}

function getWorkerName(worker) {
  if (!worker) {
    return "Worker";
  }

  if (worker.full_name) {
    return worker.full_name;
  }

  const firstName =
    worker.first_name || "";

  const lastName =
    worker.last_name || "";

  if (firstName && lastName) {
    return `${firstName} ${lastName.charAt(0)}.`;
  }

  if (firstName) {
    return firstName;
  }

  return "Worker";
}

function getWorkerPhoto(worker) {
  return (
    worker?.profile_photo ||
    worker?.profile_photo_url ||
    worker?.photo_url ||
    worker?.avatar_url ||
    "https://github.com/businessappemail-bt/task-app/blob/main/taskmintlogo.png?raw=true"
  );
}

function getWorkerServices(worker) {
  return (
    worker?.services_offered ||
    worker?.services ||
    worker?.skills ||
    "Services not listed"
  );
}

function getWorkerArea(worker) {
  return (
    worker?.work_area ||
    worker?.service_area ||
    worker?.city ||
    "Work area not listed"
  );
}

async function loadBlockedUsers() {

  blockedList.innerHTML = `<div class="loading">Loading blocked users...</div>`;
  blockedCount.textContent = "0";

  const {
    data: { user },
    error: userError
  } = await supabaseClient.auth.getUser();

  if (userError || !user) {
    renderState(
      "!",
      "No active session found",
      "Log in again to view and manage your blocked list."
    );
    return;
  }

  const { data, error } = await supabaseClient
    .from("blocked_users")
    .select("*")
    .eq("customer_id", user.id)
    .order("created_at", { ascending:false });

  if (error) {
    console.log(error);

    renderState(
      "!",
      "Unable to load blocked users",
      "Check your blocked_users table and RLS policies."
    );
    return;
  }

  blockedCount.textContent = data ? data.length : 0;

  if (!data || data.length === 0) {
    renderState(
      "✓",
      "No blocked workers",
      "Anyone you block from messages or a worker profile will appear here."
    );
    return;
  }

  blockedList.innerHTML = "";

  for (const blocked of data) {

    const workerId = getBlockedWorkerId(blocked);
    const worker = await getWorkerProfile(workerId);
    const workerName = getWorkerName(worker);
    const services = getWorkerServices(worker);
    const area = getWorkerArea(worker);
    const photo = getWorkerPhoto(worker);

    const card = document.createElement("div");
    card.className = "blocked-card";

    card.innerHTML = `
      <div class="worker-top">

        <div class="avatar-wrap">
          <img class="avatar" src="${escapeHTML(photo)}" alt="${escapeHTML(workerName)}">
          <div class="block-badge">×</div>
        </div>

        <div class="worker-main">
          <div class="worker-name">${escapeHTML(workerName)}</div>
          <div class="worker-meta">${escapeHTML(services)}</div>
          <div class="status-pill">Blocked</div>
        </div>

      </div>

      <div class="details">

        <div class="detail-row">
          <span class="detail-label">Work Area</span>
          ${escapeHTML(area)}
        </div>

        <div class="detail-row">
          <span class="detail-label">Blocked Since</span>
          ${escapeHTML(formatDate(blocked.created_at))}
        </div>

      </div>

      <div class="action-row">
        <button class="unblock-btn">Remove Block</button>
        <button class="small-btn" type="button">Details</button>
      </div>
    `;

    card.querySelector(".small-btn").addEventListener("click", () => {
      showToast("This worker is currently blocked from messaging or quoting you.");
    });

    card.querySelector(".unblock-btn").addEventListener("click", async (event) => {

      const confirmUnblock = confirm(
        "Remove this worker from your blocked list? They will be able to message you and send quotes again."
      );

      if (!confirmUnblock) return;

      event.target.disabled = true;
      event.target.textContent = "Removing...";

      const { error: deleteError } = await supabaseClient
        .from("blocked_users")
        .delete()
        .eq("id", blocked.id)
        .eq("customer_id", user.id);

      if (deleteError) {
        console.log(deleteError);
        event.target.disabled = false;
        event.target.textContent = "Remove Block";
        showToast("Unable to remove this worker from your blocked list.");
        return;
      }

      showToast("Worker removed from blocked list.");
      loadBlockedUsers();

    });

    blockedList.appendChild(card);

  }

}

loadBlockedUsers();

</script>

</body>
</html>
