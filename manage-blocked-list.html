
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Manage Blocked List - TaskMint</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#eef3ef;
  color:#1f2933;
}

.app{
  max-width:430px;
  margin:0 auto;
  min-height:100vh;
  background:#f7faf7;
  padding-bottom:90px;
}

.hero{
  background:linear-gradient(135deg,#1f6f2a,#2f8f3a);
  color:white;
  padding:22px 18px 30px;
  border-bottom-left-radius:28px;
  border-bottom-right-radius:28px;
  box-shadow:0 8px 22px rgba(0,0,0,0.16);
}

.hero-top{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:22px;
}

.back-btn{
  background:rgba(255,255,255,0.16);
  color:white;
  border:1px solid rgba(255,255,255,0.35);
  border-radius:999px;
  padding:9px 13px;
  font-size:14px;
  font-weight:bold;
  cursor:pointer;
}

.page-label{
  font-size:13px;
  opacity:0.9;
  letter-spacing:0.3px;
}

.hero h1{
  margin:0;
  font-size:26px;
  line-height:1.15;
}

.hero p{
  margin:9px 0 0;
  font-size:14px;
  line-height:1.45;
  opacity:0.95;
}

.content{
  padding:18px;
}

.summary-card{
  background:white;
  margin-top:-30px;
  border-radius:22px;
  padding:18px;
  box-shadow:0 8px 24px rgba(31,111,42,0.14);
  border:1px solid #e2ece3;
}

.summary-row{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:14px;
}

.summary-title{
  font-size:14px;
  color:#667085;
  margin-bottom:5px;
}

.summary-count{
  font-size:30px;
  font-weight:800;
  color:#1f6f2a;
}

.summary-note{
  margin-top:12px;
  font-size:13px;
  color:#5d6b60;
  line-height:1.45;
}

.shield{
  width:52px;
  height:52px;
  border-radius:17px;
  background:#e8f6ea;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:25px;
}

.section-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin:24px 2px 12px;
}

.section-title{
  font-size:18px;
  font-weight:800;
}

.refresh-btn{
  border:none;
  background:#e8f6ea;
  color:#1f6f2a;
  font-weight:bold;
  border-radius:999px;
  padding:8px 12px;
  cursor:pointer;
}

.blocked-card{
  background:white;
  border:1px solid #e1e8e2;
  border-radius:22px;
  padding:16px;
  margin-bottom:14px;
  box-shadow:0 6px 18px rgba(0,0,0,0.06);
}

.worker-top{
  display:flex;
  gap:13px;
  align-items:center;
}

.avatar-wrap{
  position:relative;
  width:62px;
  height:62px;
  flex:0 0 62px;
}

.avatar{
  width:62px;
  height:62px;
  border-radius:50%;
  object-fit:cover;
  border:3px solid #e8f6ea;
  background:#f1f5f1;
}

.block-badge{
  position:absolute;
  right:-3px;
  bottom:-3px;
  width:24px;
  height:24px;
  border-radius:50%;
  background:#d93025;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:13px;
  border:2px solid white;
}

.worker-main{
  flex:1;
  min-width:0;
}

.worker-name{
  font-size:17px;
  font-weight:800;
  margin-bottom:5px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.worker-meta{
  font-size:13px;
  color:#667085;
  line-height:1.35;
}

.status-pill{
  display:inline-flex;
  align-items:center;
  gap:6px;
  background:#fff0ef;
  color:#b42318;
  border:1px solid #ffd7d3;
  border-radius:999px;
  padding:6px 9px;
  font-size:12px;
  font-weight:bold;
  margin-top:10px;
}

.details{
  margin-top:14px;
  display:grid;
  gap:8px;
}

.detail-row{
  background:#f7faf7;
  border:1px solid #edf2ed;
  border-radius:14px;
  padding:10px 12px;
  font-size:13px;
  color:#46534a;
}

.detail-label{
  display:block;
  font-size:11px;
  color:#7a897d;
  font-weight:bold;
  margin-bottom:3px;
  text-transform:uppercase;
  letter-spacing:0.3px;
}

.action-row{
  display:flex;
  gap:10px;
  margin-top:15px;
}

.unblock-btn{
  flex:1;
  background:#1f6f2a;
  color:white;
  border:none;
  border-radius:15px;
  padding:13px 12px;
  font-size:15px;
  font-weight:800;
  cursor:pointer;
}

.unblock-btn:disabled{
  opacity:0.6;
  cursor:not-allowed;
}

.small-btn{
  background:white;
  color:#1f6f2a;
  border:1px solid #bddbc2;
  border-radius:15px;
  padding:13px 12px;
  font-size:14px;
  font-weight:bold;
  cursor:pointer;
}

.state-box{
  background:white;
  border:1px solid #e1e8e2;
  border-radius:22px;
  padding:30px 20px;
  text-align:center;
  box-shadow:0 6px 18px rgba(0,0,0,0.05);
}

.state-icon{
  width:58px;
  height:58px;
  border-radius:20px;
  background:#e8f6ea;
  color:#1f6f2a;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  margin:0 auto 14px;
}

.state-title{
  font-size:18px;
  font-weight:800;
  margin-bottom:7px;
}

.state-text{
  font-size:14px;
  color:#667085;
  line-height:1.45;
}

.loading{
  padding:24px;
  text-align:center;
  color:#667085;
  font-size:14px;
}

.toast{
  position:fixed;
  left:50%;
  bottom:22px;
  transform:translateX(-50%);
  width:calc(100% - 34px);
  max-width:396px;
  background:#1f2933;
  color:white;
  border-radius:16px;
  padding:13px 15px;
  font-size:14px;
  display:none;
  box-shadow:0 10px 25px rgba(0,0,0,0.22);
  z-index:20;
}

.toast.show{
  display:block;
}
</style>
</head>
<body>

<div class="app">

  <div class="hero">
    <div class="hero-top">
      <button class="back-btn" onclick="window.history.back()">← Back</button>
      <div class="page-label">Customer Safety</div>
    </div>

    <h1>Manage Blocked List</h1>
    <p>
      Workers listed here cannot message you or send quotes while they remain blocked.
    </p>
  </div>

  <div class="content">

    <div class="summary-card">
      <div class="summary-row">
        <div>
          <div class="summary-title">Blocked workers</div>
          <div class="summary-count" id="blockedCount">0</div>
        </div>
        <div class="shield">🛡️</div>
      </div>

      <div class="summary-note">
        Removing someone from this list allows them to message you again and send quotes on your open tasks.
      </div>
    </div>

    <div class="section-header">
      <div class="section-title">Blocked People</div>
      <button class="refresh-btn" onclick="loadBlockedUsers()">Refresh</button>
    </div>

    <div id="blockedList">
      <div class="loading">Loading blocked users...</div>
    </div>

  </div>

</div>

<div class="toast" id="toast"></div>

<script>

const SUPABASE_URL = "https://dbcthtjmtlumidpbucrc.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_3h7cO2Z8CDxZyEKDLRzvtg_1UJCLldJ";

const supabaseClient = supabase.createClient(
  SUPABASE_URL,
  SUPABASE_ANON_KEY
);

const blockedList = document.getElementById("blockedList");
const blockedCount = document.getElementById("blockedCount");
const toast = document.getElementById("toast");

function showToast(message){
  toast.textContent = message;
  toast.classList.add("show");

  setTimeout(() => {
    toast.classList.remove("show");
  }, 2500);
}

function formatDate(value){
  if (!value) return "Not available";

  const date = new Date(value);

  if (isNaN(date.getTime())) {
    return "Not available";
  }

  return date.toLocaleDateString(undefined, {
    month:"short",
    day:"numeric",
    year:"numeric"
  });
}

function renderState(icon, title, text){
  blockedList.innerHTML = `
    <div class="state-box">
      <div class="state-icon">${icon}</div>
      <div class="state-title">${title}</div>
      <div class="state-text">${text}</div>
    </div>
  `;
}

function escapeHTML(value) {
  if (value === null || value === undefined) {
    return "";
  }

  return String(value)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function getBlockedWorkerId(blocked) {
  return (
    blocked.blocked_user_id ||
    blocked.worker_id ||
    blocked.blocked_worker_id ||
    blocked.blocked_id ||
    ""
  );
}

async function getWorkerProfile(workerId) {
  if (!workerId) {
    return null;
  }

  const { data: workerById } = await supabaseClient
    .from("worker_profiles")
    .select("*")
    .eq("id", workerId)
    .maybeSingle();

  if (workerById) {
    return workerById;
  }

  const { data: profileById } = await supabaseClient
    .from("profiles")
    .select("*")
    .eq("id", workerId)
    .maybeSingle();

  return profileById || null;
}

function getWorkerName(worker) {
  if (!worker) {
    return "Worker";
  }

  if (worker.full_name) {
    return worker.full_name;
  }

  const firstName =
    worker.first_name || "";

  const lastName =
    worker.last_name || "";

  if (firstName && lastName) {
    return `${firstName} ${lastName.charAt(0)}.`;
  }

  if (firstName) {
    return firstName;
  }

  return "Worker";
}

function getWorkerPhoto(worker) {
  return (
    worker?.profile_photo ||
    worker?.profile_photo_url ||
    worker?.photo_url ||
    worker?.avatar_url ||
    "https://github.com/businessappemail-bt/task-app/blob/main/taskmintlogo.png?raw=true"
  );
}

function getWorkerServices(worker) {
  return (
    worker?.services_offered ||
    worker?.services ||
    worker?.skills ||
    "Services not listed"
  );
}

function getWorkerArea(worker) {
  return (
    worker?.work_area ||
    worker?.service_area ||
    worker?.city ||
    "Work area not listed"
  );
}

async function loadBlockedUsers() {

  blockedList.innerHTML = `<div class="loading">Loading blocked users...</div>`;
  blockedCount.textContent = "0";

  const {
    data: { user },
    error: userError
  } = await supabaseClient.auth.getUser();

  if (userError || !user) {
    renderState(
      "!",
      "No active session found",
      "Log in again to view and manage your blocked list."
    );
    return;
  }

  const { data, error } = await supabaseClient
    .from("blocked_users")
    .select("*")
    .eq("customer_id", user.id)
    .order("created_at", { ascending:false });

  if (error) {
    console.log(error);

    renderState(
      "!",
      "Unable to load blocked users",
      "Check your blocked_users table and RLS policies."
    );
    return;
  }

  blockedCount.textContent = data ? data.length : 0;

  if (!data || data.length === 0) {
    renderState(
      "✓",
      "No blocked workers",
      "Anyone you block from messages or a worker profile will appear here."
    );
    return;
  }

  blockedList.innerHTML = "";

  for (const blocked of data) {

    const workerId = getBlockedWorkerId(blocked);
    const worker = await getWorkerProfile(workerId);
    const workerName = getWorkerName(worker);
    const services = getWorkerServices(worker);
    const area = getWorkerArea(worker);
    const photo = getWorkerPhoto(worker);

    const card = document.createElement("div");
    card.className = "blocked-card";

    card.innerHTML = `
      <div class="worker-top">

        <div class="avatar-wrap">
          <img class="avatar" src="${escapeHTML(photo)}" alt="${escapeHTML(workerName)}">
          <div class="block-badge">×</div>
        </div>

        <div class="worker-main">
          <div class="worker-name">${escapeHTML(workerName)}</div>
          <div class="worker-meta">${escapeHTML(services)}</div>
          <div class="status-pill">Blocked</div>
        </div>

      </div>

      <div class="details">

        <div class="detail-row">
          <span class="detail-label">Work Area</span>
          ${escapeHTML(area)}
        </div>

        <div class="detail-row">
          <span class="detail-label">Blocked Since</span>
          ${escapeHTML(formatDate(blocked.created_at))}
        </div>

      </div>

      <div class="action-row">
        <button class="unblock-btn">Remove Block</button>
        <button class="small-btn" type="button">Details</button>
      </div>
    `;

    card.querySelector(".small-btn").addEventListener("click", () => {
      showToast("This worker is currently blocked from messaging or quoting you.");
    });

    card.querySelector(".unblock-btn").addEventListener("click", async (event) => {

      const confirmUnblock = confirm(
        "Remove this worker from your blocked list? They will be able to message you and send quotes again."
      );

      if (!confirmUnblock) return;

      event.target.disabled = true;
      event.target.textContent = "Removing...";

      const { error: deleteError } = await supabaseClient
        .from("blocked_users")
        .delete()
        .eq("id", blocked.id)
        .eq("customer_id", user.id);

      if (deleteError) {
        console.log(deleteError);
        event.target.disabled = false;
        event.target.textContent = "Remove Block";
        showToast("Unable to remove this worker from your blocked list.");
        return;
      }

      showToast("Worker removed from blocked list.");
      loadBlockedUsers();

    });

    blockedList.appendChild(card);

  }

}

loadBlockedUsers();

</script>

</body>
</html>
