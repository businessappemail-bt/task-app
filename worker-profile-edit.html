<!DOCTYPE html>
<html>
<head>
  <title>Edit Worker Profile - TaskMint</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
  <h1>Edit Public Worker Profile</h1>

  <label>Experience Description</label><br>
  <textarea id="experienceDescription" rows="6" placeholder="Describe your experience, skills, and the type of work you do."></textarea>

  <br><br>

  <label>Services Offered</label><br>
  <input id="servicesOffered" type="text" placeholder="Cleaning, moving, yard work, painting">

  <br><br>

  <label>Service Area</label><br>
  <input id="serviceArea" type="text" placeholder="Villa Rica, Douglasville, Atlanta">

  <br><br>

  <button>Save Profile</button>

  <br><br>

  <button onclick="window.location.href='worker-dashboard.html'">
    Back to Dashboard
  </button>
</body>
</html>
