<!DOCTYPE html>
<html>
<head>
<title>Add Payment - TaskMint</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
margin: 0;
font-family: Arial, sans-serif;
background: #f5f5f5;
padding-bottom: 80px;
}

.container {
max-width: 420px;
margin: 0 auto;
background: white;
min-height: 100vh;
}

.header {
position: relative;
text-align: center;
padding: 18px;
font-size: 22px;
font-weight: bold;
border-bottom: 1px solid #ddd;
}

.back {
position: absolute;
left: 15px;
top: 14px;
font-size: 28px;
color: green;
cursor: pointer;
}

.section {
padding: 20px;
font-size: 13px;
color: #666;
text-transform: uppercase;
font-weight: bold;
background: #f8f8f8;
border-bottom: 1px solid #eee;
}

.row {
display: flex;
justify-content: space-between;
align-items: center;
padding: 18px 20px;
border-bottom: 1px solid #eee;
cursor: pointer;
background: white;
}

.left {
display: flex;
align-items: center;
gap: 12px;
font-size: 18px;
font-weight: 600;
}

.logo {
width: 30px;
height: 30px;
object-fit: contain;
}

.arrow {
font-size: 22px;
color: green;
}

.note {
padding: 18px;
font-size: 14px;
color: #777;
}

.nav {
position: fixed;
bottom: 0;
width: 100%;
background: white;
border-top: 1px solid #ddd;
display: flex;
justify-content: center;
}

.nav-inner {
max-width: 420px;
width: 100%;
display: flex;
justify-content: space-around;
padding: 10px 0;
}

.nav a {
text-decoration: none;
color: #777;
font-size: 14px;
}

.nav a.active {
color: green;
font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<span class="back" onclick="goBack()">‹</span>
Add Payment
</div>

<div class="section">Choose Payment Method</div>

<!-- CREDIT CARD -->
<div class="row" onclick="goToCard()">
<div class="left">
<img class="logo" src="https://img.icons8.com/color/48/bank-card-back-side.png">
Credit Card
</div>
<div class="arrow">›</div>
</div>

<!-- APPLE PAY -->
<div class="row" onclick="applePay()">
<div class="left">
<img class="logo" src="https://img.icons8.com/ios-filled/50/mac-os.png">
Apple Pay
</div>
<div class="arrow">›</div>
</div>

<!-- PAYPAL -->
<div class="row" onclick="paypal()">
<div class="left">
<img class="logo" src="https://img.icons8.com/color/48/paypal.png">
PayPal
</div>
<div class="arrow">›</div>
</div>

<!-- CASH APP -->
<div class="row" onclick="cashapp()">
<div class="left">
<img class="logo" src="https://img.icons8.com/color/48/cash-app.png">
Cash App
</div>
<div class="arrow">›</div>
</div>

<!-- ZELLE -->
<div class="row" onclick="zelle()">
<div class="left">
<img class="logo" src="https://img.icons8.com/color/48/money-transfer.png">
Zelle
</div>
<div class="arrow">›</div>
</div>

<div class="note">
Your payment method will be used when a job is accepted. Secure payment processing will be connected before live transactions.
</div>

</div>

<!-- NAV -->
<div class="nav">
<div class="nav-inner">
<a href="customer-home.html">Home</a>
<a href="my-jobs.html">My Jobs</a>
<a href="messages.html">Messages</a>
<a href="profile.html" class="active">Profile</a>
</div>
</div>

<script>
function goBack() {
window.location.href = "profile.html";
}

function goToCard() {
window.location.href = "credit-card.html";
}

function applePay() {
alert("Apple Pay will be connected using Stripe.");
}

function paypal() {
alert("PayPal checkout will be connected.");
}

function cashapp() {
alert("Cash App Pay will be connected.");
}

function zelle() {
window.location.href = "zelle.html";
}
</script>

</body>
</html>
