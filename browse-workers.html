<!DOCTYPE html>
<html>
<head>
<title>Browse Workers - TaskMint</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background:
    radial-gradient(circle at top left, rgba(25,182,76,0.16), transparent 32%),
    linear-gradient(180deg, #eef8f1 0%, #f5f5f5 100%);
  color: #111;
  padding-bottom: 95px;
}

.container {
  max-width: 430px;
  margin: 0 auto;
  padding: 18px;
}

.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 14px;
}

.back,
.refresh {
  color: #0b7a28;
  font-weight: 900;
  cursor: pointer;
  font-size: 14px;
}

.hero {
  background: linear-gradient(135deg, #0b7a28, #19b64c);
  color: white;
  border-radius: 28px;
  padding: 22px;
  margin-bottom: 16px;
  box-shadow: 0 14px 30px rgba(11,122,40,0.22);
  position: relative;
  overflow: hidden;
  animation: fadeUp 0.45s ease;
}

.hero::before {
  content: "";
  position: absolute;
  width: 170px;
  height: 170px;
  border-radius: 50%;
  background: rgba(255,255,255,0.12);
  top: -70px;
  right: -60px;
  animation: pulseGlow 5s ease-in-out infinite;
}

.hero h1 {
  margin: 0 0 8px;
  font-size: 30px;
  line-height: 1.1;
  position: relative;
  z-index: 2;
}

.hero p {
  margin: 0;
  font-size: 14px;
  line-height: 1.5;
  opacity: 0.96;
  position: relative;
  z-index: 2;
}

.filter-card,
.worker-card {
  background: white;
  border-radius: 22px;
  border: 1px solid #edf1ee;
  box-shadow: 0 8px 24px rgba(0,0,0,0.08);
  animation: fadeUp 0.45s ease;
}

.filter-card {
  padding: 14px;
  margin-bottom: 14px;
}

.filter-title {
  font-size: 16px;
  font-weight: 900;
  margin-bottom: 10px;
}

.filter-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

select,
input {
  width: 100%;
  padding: 12px;
  border-radius: 14px;
  border: 1px solid #d9dfda;
  font-size: 13px;
  outline: none;
}

select:focus,
input:focus {
  border-color: #0b7a28;
  box-shadow: 0 0 0 4px rgba(11,122,40,0.10);
}

.worker-card {
  margin-bottom: 16px;
  overflow: hidden;
}

.worker-top {
  display: flex;
  gap: 12px;
  padding: 16px;
}

.worker-photo {
  width: 82px;
  height: 82px;
  border-radius: 22px;
  object-fit: cover;
  border: 3px solid #e7f7ec;
  flex-shrink: 0;
}

.worker-info {
  flex: 1;
}

.worker-name {
  font-size: 18px;
  font-weight: 900;
  margin-bottom: 4px;
}

.worker-location {
  color: #666;
  font-size: 13px;
  margin-bottom: 8px;
}

.rating-row {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

.rating-pill,
.gender-pill {
  background: #e7f7ec;
  color: #0b7a28;
  padding: 6px 10px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 900;
}

.gender-pill {
  background: #f4f4f4;
  color: #333;
}

.section {
  padding: 0 16px 16px;
}

.section-title {
  color: #0b7a28;
  font-size: 12px;
  font-weight: 900;
  text-transform: uppercase;
  margin-bottom: 8px;
  letter-spacing: 0.4px;
}

.chips {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.chip {
  background: #f7faf8;
  border: 1px solid #dfece3;
  border-radius: 999px;
  padding: 8px 12px;
  font-size: 12px;
  font-weight: 700;
}

.action-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  padding: 0 16px 16px;
}

button {
  width: 100%;
  border: none;
  border-radius: 14px;
  padding: 12px;
  font-size: 12px;
  font-weight: 900;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  transform: translateY(-1px);
  box-shadow: 0 5px 12px rgba(0,0,0,0.09);
}

.primary-btn {
  background: linear-gradient(135deg, #0b7a28, #19b64c);
  color: white;
}

.secondary-btn {
  background: white;
  color: #0b7a28;
  border: 1px solid #cdebd5;
}

.saved-btn {
  background: #111;
  color: white;
}

.empty {
  background: white;
  border-radius: 22px;
  padding: 24px;
  text-align: center;
  color: #666;
  border: 1px solid #edf1ee;
  box-shadow: 0 8px 24px rgba(0,0,0,0.08);
}

#status {
  text-align: center;
  font-size: 13px;
  font-weight: 900;
  margin-bottom: 12px;
  color: #0b7a28;
}

.workers-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.workers-grid .worker-card {
  margin-bottom: 0;
  border-radius: 20px;
}

.workers-grid .worker-top {
  display: block;
  padding: 12px;
  text-align: center;
}

.workers-grid .worker-photo {
  width: 76px;
  height: 76px;
  border-radius: 22px;
  margin: 0 auto 8px;
  display: block;
}

.workers-grid .worker-name {
  font-size: 14px;
  line-height: 1.2;
}

.workers-grid .worker-location {
  font-size: 11px;
  margin-bottom: 7px;
}

.workers-grid .rating-row {
  justify-content: center;
}

.workers-grid .section {
  padding: 0 10px 10px;
}

.workers-grid .section-title {
  font-size: 10px;
  margin-bottom: 6px;
}

.workers-grid .chip {
  font-size: 10px;
  padding: 6px 8px;
}

.workers-grid .action-row {
  grid-template-columns: 1fr;
  padding: 0 10px 12px;
  gap: 6px;
}

.workers-grid button {
  padding: 10px;
  font-size: 11px;
}

.nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  max-width: 430px;
  margin: 0 auto;
  background: rgba(255,255,255,0.95);
  backdrop-filter: blur(12px);
  border-top: 1px solid #ddd;
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  padding: 10px 6px;
}

.nav a {
  text-decoration: none;
  color: #555;
  font-size: 11px;
  font-weight: bold;
  text-align: center;
}

.nav-icon {
  display: block;
  font-size: 20px;
  margin-bottom: 3px;
}

.active {
  color: #0b7a28 !important;
}

@keyframes fadeUp {
  from {
    opacity: 0;
    transform: translateY(16px);
  }

  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes pulseGlow {
  0% { transform: scale(1); }
  50% { transform: scale(1.12); }
  100% { transform: scale(1); }
}
</style>
</head>

<body>

<div class="container">

  <div class="top-bar">
    <div class="back" onclick="window.location.href='customer-home.html'">← Back</div>
    <div class="refresh" onclick="loadWorkers()">Refresh</div>
  </div>

  <div class="hero">
    <h1>Browse Workers</h1>
    <p>Discover local workers, compare ratings and services, and save favorites for future jobs.</p>
  </div>

  <div class="filter-card">

    <div class="filter-title">Filter Workers</div>

    <div class="filter-grid">

      <input
        id="cityFilter"
        placeholder="City"
        oninput="applyFilters()"
      >

      <input
        id="stateFilter"
        placeholder="State"
        oninput="applyFilters()"
      >

      <input
        id="serviceFilter"
        placeholder="Service"
        oninput="applyFilters()"
      >

      <select
        id="genderFilter"
        onchange="applyFilters()"
      >
        <option value="">All genders</option>
        <option value="Male">Male</option>
        <option value="Female">Female</option>
      </select>

    </div>

    <button
      class="secondary-btn"
      onclick="clearFilters()"
      style="margin-top:10px;"
    >
      Clear Filters
    </button>

  </div>

  <p id="status"></p>

  <div id="workersList"></div>

</div>

<div class="nav">
  <a href="customer-home.html">
    <span class="nav-icon">🏠</span>
    Home
  </a>

  <a href="post-job.html">
    <span class="nav-icon">＋</span>
    Post
  </a>

  <a href="browse-workers.html" class="active">
    <span class="nav-icon">👷</span>
    Workers
  </a>

  <a href="view-open-task.html">
    <span class="nav-icon">📌</span>
    Tasks
  </a>

  <a href="message-center.html">
    <span class="nav-icon">💬</span>
    Messages
  </a>
</div>

<script>
const supabaseClient = window.supabase.createClient(
  "https://dbcthtjmtlumidpbucrc.supabase.co",
  "sb_publishable_3h7cO2Z8CDxZyEKDLRzvtg_1UJCLldJ"
);

let allWorkers = [];
let currentUserId = "";

function escapeHTML(value) {
  if (value === null || value === undefined) {
    return "";
  }

  return String(value)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}


function getWorkerName(worker) {
  const firstName =
    worker.first_name ||
    "";

  let lastName =
    worker.last_name ||
    "";

  if (!lastName && worker.full_name) {
    const parts = worker.full_name.trim().split(" ");
    lastName = parts.length > 1 ? parts[parts.length - 1] : "";
  }

  if (!lastName && worker.display_name) {
    const parts = worker.display_name.trim().split(" ");
    lastName = parts.length > 1 ? parts[parts.length - 1] : "";
  }

  const lastInitial =
    lastName
      ? lastName.charAt(0).toUpperCase() + "."
      : "";

  if (firstName) {
    return `${firstName} ${lastInitial}`.trim();
  }

  if (worker.full_name) {
    const parts = worker.full_name.trim().split(" ");
    return parts.length > 1
      ? `${parts[0]} ${parts[parts.length - 1].charAt(0).toUpperCase()}.`
      : parts[0];
  }

  return "Worker";
}
function randomizeArray(array) {
  return [...array].sort(() => Math.random() - 0.5);
}

async function getCurrentUser() {
  const { data } =
    await supabaseClient.auth.getSession();

  if (data.session && data.session.user) {
    localStorage.setItem(
      "taskmintUserId",
      data.session.user.id
    );

    return data.session.user;
  }

  const savedUserId =
    localStorage.getItem("taskmintUserId");

  if (savedUserId) {
    return { id: savedUserId };
  }

  window.location.href = "login.html";
  return null;
}

async function loadWorkers() {

  const workersList =
    document.getElementById("workersList");

  workersList.className = "";
  workersList.innerHTML =
    `<div class="empty">Loading workers...</div>`;

  const user =
    await getCurrentUser();

  if (!user) {
    return;
  }

  currentUserId =
    user.id;

const { data: workers, error } =
  await supabaseClient
    .from("worker_profiles")
    .select("*")
    .eq("is_worker_approved", true);

  if (error) {
    workersList.innerHTML =
      `<div class="empty">${escapeHTML(error.message)}</div>`;

    return;
  }

  const { data: profiles } =
    await supabaseClient
      .from("profiles")
      .select("*");

  const profileMap = {};

  (profiles || []).forEach(profile => {
    profileMap[profile.id] = profile;
  });

  const mergedWorkers =
    (workers || []).map(worker => {
      const linkedProfile =
        profileMap[worker.user_id] ||
        profileMap[worker.profile_id] ||
        profileMap[worker.id] ||
        {};

      return {
        ...linkedProfile,
        ...worker,

        full_name:
          worker.full_name ||
          worker.display_name ||
          linkedProfile.full_name ||
          linkedProfile.display_name ||
          `${worker.first_name || ""} ${worker.last_name || ""}`.trim() ||
          `${linkedProfile.first_name || ""} ${linkedProfile.last_name || ""}`.trim() ||
          worker.name ||
          "Worker",

        profile_photo_url:
          worker.profile_photo_url ||
          worker.profile_image_url ||
          worker.photo_url ||
          worker.avatar_url ||
          linkedProfile.profile_photo_url ||
          linkedProfile.profile_image_url ||
          linkedProfile.photo_url ||
          linkedProfile.avatar_url ||
          "",

        city:
          worker.city ||
          linkedProfile.city ||
          "",

        state:
          worker.state ||
          linkedProfile.state ||
          ""
      };
    });

  allWorkers =
    randomizeArray(mergedWorkers);

  applyFilters();
}

function getServices(worker) {

  if (Array.isArray(worker.services_offered)) {
    return worker.services_offered;
  }

  if (typeof worker.services_offered === "string") {
    return worker.services_offered
      .split(",")
      .map(item => item.trim())
      .filter(Boolean);
  }

  return [];
}

function getServiceAreas(worker) {

  if (Array.isArray(worker.service_areas)) {
    return worker.service_areas;
  }

  if (typeof worker.service_areas === "string") {
    return worker.service_areas
      .split(",")
      .map(item => item.trim())
      .filter(Boolean);
  }

  return [];
}

function applyFilters() {

  const city =
    document.getElementById("cityFilter").value
      .toLowerCase()
      .trim();

  const state =
    document.getElementById("stateFilter").value
      .toLowerCase()
      .trim();

  const service =
    document.getElementById("serviceFilter").value
      .toLowerCase()
      .trim();

  const gender =
    document.getElementById("genderFilter").value;

  let filtered =
    allWorkers.filter(worker => {

      const workerCity =
        String(worker.city || "")
          .toLowerCase();

      const workerState =
        String(worker.state || "")
          .toLowerCase();

      const services =
        getServices(worker)
          .join(" ")
          .toLowerCase();

      const workerGender =
        String(worker.gender || "");

      const cityMatch =
        !city || workerCity.includes(city);

      const stateMatch =
        !state || workerState.includes(state);

      const serviceMatch =
        !service || services.includes(service);

      const genderMatch =
        !gender || workerGender === gender;

      return (
        cityMatch &&
        stateMatch &&
        serviceMatch &&
        genderMatch
      );
    });

  renderWorkers(filtered);
}

function clearFilters() {

  document.getElementById("cityFilter").value = "";
  document.getElementById("stateFilter").value = "";
  document.getElementById("serviceFilter").value = "";
  document.getElementById("genderFilter").value = "";

  renderWorkers(allWorkers);
}

async function saveWorker(workerId) {

  const status =
    document.getElementById("status");

  status.innerText = "";

  const { error } =
    await supabaseClient
      .from("saved_workers")
      .insert([
        {
          customer_id: currentUserId,
          worker_id: workerId
        }
      ]);

  if (error) {

    if (
      error.message &&
      error.message.toLowerCase().includes("duplicate")
    ) {
      status.innerText =
        "Worker already saved.";
      return;
    }

    status.innerText =
      error.message;

    return;
  }

  status.innerText =
    "Worker saved.";
}

function viewWorkerProfile(workerId) {

  window.location.href =
    `worker-public-profile.html?worker_id=${encodeURIComponent(workerId)}&workerId=${encodeURIComponent(workerId)}`;
}

function renderWorkers(workers) {

  const workersList =
    document.getElementById("workersList");

  if (!workers || workers.length === 0) {

    workersList.className = "";
    workersList.innerHTML =
      `<div class="empty">No workers match your filters.</div>`;

    return;
  }

  workersList.className = "workers-grid";
  workersList.innerHTML = "";

  workers.forEach(worker => {

    const card =
      document.createElement("div");

    card.className =
      "worker-card";

    const services =
      getServices(worker);

    const serviceAreas =
      getServiceAreas(worker);

    const photo =
      worker.profile_photo_url ||
      worker.profile_image_url ||
      worker.photo_url ||
      worker.avatar_url ||
      worker.image_url ||
      "https://cdn-icons-png.flaticon.com/512/149/149071.png";

    card.innerHTML = `
      <div class="worker-top">

        <img
          class="worker-photo"
          src="${escapeHTML(photo)}"
          onerror="this.src='https://cdn-icons-png.flaticon.com/512/149/149071.png'"
        >

       <div class="worker-info">

  <div class="worker-name">
    ${escapeHTML(getWorkerName(worker))}
  </div>

          <div class="worker-location">
            ${escapeHTML(worker.city || "")},
            ${escapeHTML(worker.state || "")}
          </div>

          <div class="rating-row">

            <div class="rating-pill">
              ⭐ ${escapeHTML(
                String(
                  worker.average_rating ||
                  worker.rating ||
                  "5.0"
                )
              )}
            </div>

            ${
              worker.gender
                ? `
                <div class="gender-pill">
                  ${escapeHTML(worker.gender)}
                </div>
                `
                : ""
            }

          </div>

        </div>

      </div>

      <div class="section">

        <div class="section-title">
          Services Offered
        </div>

        <div class="chips">

          ${
            services.length > 0
              ? services.map(service => `
                  <div class="chip">
                    ${escapeHTML(service)}
                  </div>
                `).join("")
              : `
                  <div class="chip">
                    Services not listed
                  </div>
                `
          }

        </div>

      </div>

      <div class="section">

        <div class="section-title">
          Service Areas
        </div>

        <div class="chips">

          ${
            serviceAreas.length > 0
              ? serviceAreas.map(area => `
                  <div class="chip">
                    ${escapeHTML(area)}
                  </div>
                `).join("")
              : `
                  <div class="chip">
                    Areas not listed
                  </div>
                `
          }

        </div>

      </div>

      <div class="action-row">

        <button
          class="primary-btn"
          onclick="viewWorkerProfile('${worker.id}')"
        >
          View Profile
        </button>

        <button
          class="saved-btn"
          onclick="saveWorker('${worker.id}')"
        >
          Save Worker
        </button>

      </div>
    `;

    workersList.appendChild(card);
  });
}

loadWorkers();
</script>

</body>
</html>
