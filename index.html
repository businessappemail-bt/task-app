<!DOCTYPE html>
<html>
<head>
  <title>TaskMint</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f5f5f5;
      text-align: center;
    }

    .container {
      padding: 60px 20px;
    }

    h1 {
      font-size: 36px;
      margin-bottom: 10px;
    }

    p {
      color: #555;
      margin-bottom: 30px;
    }

    .btn {
      display: block;
      width: 80%;
      max-width: 300px;
      margin: 10px auto;
      padding: 15px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
      cursor: pointer;
    }

    .primary {
      background: green;
      color: white;
    }

    .secondary {
      background: white;
      border: 1px solid #ccc;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>TaskMint</h1>
    <p>Post jobs. Get help. Earn money.</p>

    <button class="btn primary" onclick="goToTasks()">Get Started</button>
  </div>

  <script>
    function goToTasks() {
      window.location.href = "tasks.html";
    }
  </script>
</body>
</html>
