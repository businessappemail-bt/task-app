<!DOCTYPE html>
<html>
<head>
  <title>Messages - TaskMint</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f5f5f5;
      padding-bottom: 80px;
    }

    .container {
      max-width: 420px;
      margin: 0 auto;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .empty {
      text-align: center;
      color: #777;
      margin-top: 40px;
    }

    .nav {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: white;
      border-top: 1px solid #ddd;
      display: flex;
      justify-content: space-around;
      padding: 10px 0;
    }

    .nav a {
      text-decoration: none;
      color: #555;
    }

    .nav a.active {
      color: green;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Messages</h1>

    <div id="messagesContainer"></div>
    <div id="emptyState" class="empty">No messages yet.</div>
  </div>

  <div class="nav">
    <a href="customer-home.html">Home</a>
    <a href="my-jobs.html">My Jobs</a>
    <a href="messages.html" class="active">Messages</a>
    <a href="profile.html">Profile</a>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
   const supabaseClient = window.supabase.createClient(
  "https://dbcthtjmtlumidpbucrc.supabase.co",
  "sb_publishable_3h7cO2Z8CDxZyEKDLRzvtg_1UJCLldJ"

    );

    async function loadMessages() {
      const container = document.getElementById("messagesContainer");
      const empty = document.getElementById("emptyState");

      const { data: sessionData } = await supabaseClient.auth.getSession();

      if (!sessionData.session) {
        window.location.href = "login.html";
        return;
      }

      const user = sessionData.session.user;

      const { data, error } = await supabaseClient
        .from("messages")
        .select("*")
        .or(`sender_id.eq.${user.id},receiver_id.eq.${user.id}`)
        .order("created_at", { ascending: false });

      if (error) {
        empty.innerText = "Error loading messages";
        return;
      }

      if (!data || data.length === 0) {
        empty.style.display = "block";
        return;
      }

      empty.style.display = "none";

      container.innerHTML = "";

      data.forEach(msg => {
        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
          <div><strong>${msg.content}</strong></div>
          <div style="font-size:12px;color:#777;margin-top:5px;">
            ${new Date(msg.created_at).toLocaleString()}
          </div>
        `;

        container.appendChild(div);
      });
    }

    loadMessages();
  </script>
</body>
</html>
