<!DOCTYPE html>
<html>
<head>
<title>Request Quote - TaskMint</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial,sans-serif;background:linear-gradient(180deg,#eef8f1,#f5f5f5);color:#111;padding-bottom:30px}
.container{max-width:430px;margin:0 auto;padding:18px}
.back{color:#0b7a28;font-weight:900;cursor:pointer;font-size:14px;margin-bottom:14px}
.hero{background:linear-gradient(135deg,#0b7a28,#19b64c);color:white;border-radius:26px;padding:20px;margin-bottom:14px;box-shadow:0 12px 28px rgba(11,122,40,.2)}
.hero h1{margin:0 0 6px;font-size:28px}
.hero p{margin:0;font-size:14px;line-height:1.45;opacity:.95}
.card{background:white;border:1px solid #edf1ee;border-radius:22px;padding:16px;box-shadow:0 8px 24px rgba(0,0,0,.08);margin-bottom:14px}
label{font-size:12px;font-weight:900;color:#0b7a28;text-transform:uppercase;display:block;margin:12px 0 6px}
input,select,textarea{width:100%;padding:13px;border-radius:15px;border:1px solid #dfe5e0;font-size:15px;outline:none}
textarea{min-height:130px;resize:none}
input:focus,select:focus,textarea:focus{border-color:#0b7a28;box-shadow:0 0 0 4px rgba(11,122,40,.1)}
button{width:100%;border:none;border-radius:16px;padding:14px;background:#0b7a28;color:white;font-weight:900;font-size:15px;cursor:pointer;margin-top:14px}
.status{text-align:center;font-size:13px;font-weight:900;margin-top:10px}
.notice{background:#fff7e6;border:1px solid #ffd27a;color:#7a4b00;border-radius:16px;padding:12px;font-size:13px;line-height:1.4;font-weight:700}
</style>
</head>
<body>
<div class="container">
<div class="back" onclick="history.back()">← Back</div>

<div class="hero">
<h1>Request a Quote</h1>
<p>This request goes directly to the selected worker and will not appear in the public open task feed.</p>
</div>

<div class="notice" id="workerNotice">Loading selected worker...</div>

<div class="card">
<label>Task title</label>
<input id="title" placeholder="Example: Assemble bedroom dresser">

<label>Category</label>
<select id="category">
<option value="">Select category</option>
<option>Moving Help</option>
<option>TV Mounting</option>
<option>Furniture Assembly</option>
<option>Cleaning</option>
<option>Yard Work</option>
<option>Delivery Help</option>
<option>Other</option>
</select>

<label>Task details</label>
<textarea id="description" maxlength="1200" placeholder="Describe what you need done, timing, stairs, tools, size, or anything important."></textarea>

<label>City</label>
<input id="city" placeholder="City">

<label>State</label>
<input id="state" placeholder="State">

<label>Date needed</label>
<input id="taskDate" type="date">

<button onclick="submitRequest()">Send Direct Quote Request</button>
<div id="status" class="status"></div>
</div>
</div>

<script>
const supabaseClient=window.supabase.createClient("https://dbcthtjmtlumidpbucrc.supabase.co","sb_publishable_3h7cO2Z8CDxZyEKDLRzvtg_1UJCLldJ");
let workerId="";
let currentUser=null;

function getParam(name){return new URLSearchParams(window.location.search).get(name)||""}
function workerName(worker){const first=worker.first_name||"";const last=worker.last_name||"";const lastInitial=last?last.charAt(0).toUpperCase()+".":"";return first?`${first} ${lastInitial}`.trim():(worker.full_name||worker.display_name||"this worker")}

async function loadPage(){
workerId=getParam("worker_id")||localStorage.getItem("selectedWorkerId")||"";
const{data}=await supabaseClient.auth.getUser();
currentUser=data&&data.user?data.user:null;

if(!workerId){document.getElementById("workerNotice").innerText="No worker was selected.";return}

const{data:worker}=await supabaseClient.from("workers").select("*").eq("id",workerId).maybeSingle();
document.getElementById("workerNotice").innerText=worker?`This request will only be sent to ${workerName(worker)}.`:"This request will only be sent to the selected worker.";
}

async function submitRequest(){
const status=document.getElementById("status");
status.innerText="";

if(!currentUser){status.style.color="#b00020";status.innerText="Please log in to request a quote.";return}
if(!workerId){status.style.color="#b00020";status.innerText="Worker profile is missing.";return}

const title=document.getElementById("title").value.trim();
const category=document.getElementById("category").value.trim();
const description=document.getElementById("description").value.trim();
const city=document.getElementById("city").value.trim();
const state=document.getElementById("state").value.trim();
const taskDate=document.getElementById("taskDate").value;

if(!title||!category||description.length<10){status.style.color="#b00020";status.innerText="Fill out the title, category, and task details.";return}

const{error}=await supabaseClient.from("direct_task_requests").insert({
customer_id:currentUser.id,
worker_id:workerId,
title:title,
category:category,
description:description,
city:city,
state:state,
task_date:taskDate||null,
status:"requested",
is_public:false,
created_at:new Date().toISOString()
});

if(error){status.style.color="#b00020";status.innerText=error.message;return}

status.style.color="#0b7a28";
status.innerText="Direct quote request sent.";
}

loadPage();
</script>
</body>
</html>
