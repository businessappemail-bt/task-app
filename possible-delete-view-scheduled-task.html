<!DOCTYPE html>
<html>
<head>
<title>Scheduled Tasks - TaskMint</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background:
    radial-gradient(circle at top left, rgba(25,182,76,0.16), transparent 32%),
    linear-gradient(180deg, #eef8f1 0%, #f5f5f5 100%);
  color: #111;
  padding-bottom: 90px;
}

.container {
  max-width: 430px;
  margin: 0 auto;
  padding: 18px;
}

.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 14px;
}

.back,
.refresh {
  color: #0b7a28;
  font-weight: 900;
  cursor: pointer;
  font-size: 14px;
}

.hero {
  background: linear-gradient(135deg, #0b7a28, #19b64c);
  color: white;
  border-radius: 28px;
  padding: 22px;
  margin-bottom: 16px;
  box-shadow: 0 14px 30px rgba(11,122,40,0.22);
  position: relative;
  overflow: hidden;
  animation: fadeUp 0.45s ease;
}

.hero::before {
  content: "";
  position: absolute;
  width: 170px;
  height: 170px;
  border-radius: 50%;
  background: rgba(255,255,255,0.12);
  top: -70px;
  right: -60px;
  animation: pulseGlow 5s ease-in-out infinite;
}

.hero h1 {
  margin: 0 0 8px;
  font-size: 30px;
  line-height: 1.1;
  position: relative;
  z-index: 2;
}

.hero p {
  margin: 0;
  font-size: 14px;
  line-height: 1.5;
  opacity: 0.96;
  position: relative;
  z-index: 2;
}

.summary-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 16px;
}

.summary-box,
.filter-card,
.task-card {
  background: white;
  border: 1px solid #edf1ee;
  border-radius: 22px;
  padding: 14px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.08);
  animation: fadeUp 0.45s ease;
}

.summary-box {
  animation: floatCard 4s ease-in-out infinite;
}

.summary-box:nth-child(2) {
  animation-delay: 0.5s;
}

.summary-label {
  color: #0b7a28;
  font-size: 11px;
  font-weight: 900;
  text-transform: uppercase;
  letter-spacing: 0.4px;
}

.summary-value {
  font-size: 18px;
  font-weight: 900;
  margin-top: 4px;
}

.filter-card {
  margin-bottom: 14px;
}

.filter-title {
  font-size: 16px;
  font-weight: 900;
  margin-bottom: 10px;
}

.filter-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

select,
input {
  width: 100%;
  padding: 11px;
  border: 1px solid #d9dfda;
  border-radius: 14px;
  font-size: 13px;
  outline: none;
  background: white;
}

select:focus,
input:focus {
  border-color: #0b7a28;
  box-shadow: 0 0 0 4px rgba(11,122,40,0.10);
}

.task-card {
  margin-bottom: 14px;
  padding: 16px;
}

.task-top {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  align-items: flex-start;
}

.task-title {
  font-size: 18px;
  font-weight: 900;
  margin-bottom: 4px;
}

.task-sub {
  color: #666;
  font-size: 12px;
  line-height: 1.35;
}

.status-pill {
  background: #e7f7ec;
  color: #0b7a28;
  border-radius: 999px;
  padding: 7px 10px;
  font-size: 11px;
  font-weight: 900;
  text-transform: capitalize;
  white-space: nowrap;
}

.info-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-top: 12px;
}

.info-box {
  background: #f7faf8;
  border: 1px solid #e3eee6;
  border-radius: 16px;
  padding: 10px;
  min-height: 68px;
}

.info-label {
  color: #0b7a28;
  font-size: 11px;
  font-weight: 900;
  text-transform: uppercase;
  letter-spacing: 0.4px;
  margin-bottom: 5px;
}

.info-value {
  font-size: 13px;
  font-weight: 800;
  line-height: 1.35;
}

.code-note {
  background: #fff8e6;
  border: 1px solid #ffe0a3;
  color: #6f4b00;
  border-radius: 16px;
  padding: 12px;
  margin-top: 12px;
  font-size: 13px;
  line-height: 1.45;
  font-weight: 800;
}

.arrival-code {
  display: inline-block;
  background: white;
  color: #111;
  border: 1px dashed #d39b26;
  border-radius: 12px;
  padding: 8px 12px;
  font-size: 22px;
  font-weight: 900;
  letter-spacing: 4px;
  margin: 8px 0;
}

.action-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-top: 12px;
}

button {
  width: 100%;
  padding: 11px;
  border: none;
  border-radius: 13px;
  font-size: 12px;
  font-weight: 900;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  transform: translateY(-1px);
  box-shadow: 0 5px 12px rgba(0,0,0,0.09);
}

.primary-btn {
  background: linear-gradient(135deg, #0b7a28, #19b64c);
  color: white;
}

.secondary-btn {
  background: white;
  color: #0b7a28;
  border: 1px solid #cdebd5;
}

.cancel-btn {
  background: #b00020;
  color: white;
}

.empty {
  background: white;
  padding: 22px;
  border-radius: 22px;
  text-align: center;
  color: #666;
  border: 1px solid #edf1ee;
  box-shadow: 0 8px 24px rgba(0,0,0,0.08);
}

#status {
  text-align: center;
  color: #b00020;
  font-size: 13px;
  font-weight: 900;
  margin: 10px 0;
  line-height: 1.4;
}

.nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  max-width: 430px;
  margin: 0 auto;
  background: rgba(255,255,255,0.95);
  backdrop-filter: blur(12px);
  border-top: 1px solid #ddd;
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  padding: 10px 6px;
}

.nav a {
  text-decoration: none;
  color: #555;
  font-size: 11px;
  font-weight: bold;
  text-align: center;
}

.nav-icon {
  display: block;
  font-size: 20px;
  margin-bottom: 3px;
}

.active {
  color: #0b7a28 !important;
}

@keyframes fadeUp {
  from {
    opacity: 0;
    transform: translateY(16px);
  }

  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes floatCard {
  0% { transform: translateY(0); }
  50% { transform: translateY(-4px); }
  100% { transform: translateY(0); }
}

@keyframes pulseGlow {
  0% { transform: scale(1); }
  50% { transform: scale(1.12); }
  100% { transform: scale(1); }
}
</style>
</head>

<body>
<div class="container">

  <div class="top-bar">
    <div class="back" onclick="window.location.href='customer-home.html'">← Back</div>
    <div class="refresh" onclick="loadScheduledTasks()">Refresh</div>
  </div>

  <div class="hero">
    <h1>Scheduled Tasks</h1>
    <p>View accepted and paid jobs, message assigned workers, and keep arrival codes organized.</p>
  </div>

  <div class="summary-row">
    <div class="summary-box">
      <div class="summary-label">Scheduled</div>
      <div class="summary-value" id="scheduledCount">0</div>
    </div>

    <div class="summary-box">
      <div class="summary-label">Paid Total</div>
      <div class="summary-value" id="paidTotal">$0.00</div>
    </div>
  </div>

  <div class="filter-card">
    <div class="filter-title">Filter Tasks</div>

    <div class="filter-grid">
      <select id="jobTypeFilter" onchange="applyFilters()">
        <option value="">All job types</option>
      </select>

      <input id="dateFilter" type="date" onchange="applyFilters()">
    </div>

    <button class="secondary-btn" onclick="clearFilters()">Clear Filters</button>
  </div>

  <p id="status"></p>

  <div id="tasksList"></div>
</div>

<div class="nav">
  <a href="customer-home.html"><span class="nav-icon">🏠</span>Home</a>
  <a href="post-job.html"><span class="nav-icon">＋</span>Post</a>
  <a href="view-open-task.html"><span class="nav-icon">📌</span>Open</a>
  <a href="view-scheduled-task.html" class="active"><span class="nav-icon">📅</span>Scheduled</a>
  <a href="message-center.html"><span class="nav-icon">💬</span>Messages</a>
</div>

<script>
const supabaseClient = window.supabase.createClient(
  "https://dbcthtjmtlumidpbucrc.supabase.co",
  "sb_publishable_3h7cO2Z8CDxZyEKDLRzvtg_1UJCLldJ"
);

let allScheduledTasks = [];
let currentUserId = "";

function escapeHTML(value) {
  if (value === null || value === undefined) {
    return "";
  }

  return String(value)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function formatMoney(value) {
  const numberValue =
    Number(value || 0);

  if (isNaN(numberValue)) {
    return "$0.00";
  }

  return "$" + numberValue.toFixed(2);
}

function formatDate(value) {
  if (!value) {
    return "Not listed";
  }

  if (value === "Flexible") {
    return "Flexible";
  }

  const date =
    new Date(value);

  if (isNaN(date.getTime())) {
    return value;
  }

  return date.toLocaleDateString();
}

function getTaskDate(task) {
  if (task.date_flexible) {
    return "Flexible";
  }

  return (
    task.scheduled_date ||
    task.task_date ||
    task.date_needed ||
    ""
  );
}

function getPaidAmount(task) {
  return (
    task.paid_amount ??
    task.amount_paid ??
    task.quote_amount ??
    task.accepted_quote_amount ??
    task.total_amount ??
    task.amount ??
    0
  );
}

function getAssignedWorkerId(task) {
  return (
    task.assigned_worker_id ||
    task.worker_id ||
    task.accepted_worker_id ||
    ""
  );
}

async function getCurrentUser() {
  const { data } =
    await supabaseClient.auth.getSession();

  if (data.session && data.session.user) {
    localStorage.setItem(
      "taskmintUserId",
      data.session.user.id
    );

    return data.session.user;
  }

  const savedUserId =
    localStorage.getItem("taskmintUserId");

  if (savedUserId) {
    return { id: savedUserId };
  }

  window.location.href = "login.html";
  return null;
}

async function loadScheduledTasks() {
  const status =
    document.getElementById("status");

  const tasksList =
    document.getElementById("tasksList");

  status.innerText = "";
  tasksList.innerHTML =
    `<div class="empty">Loading scheduled tasks...</div>`;

  const user =
    await getCurrentUser();

  if (!user) {
    return;
  }

  currentUserId =
    user.id;

  const { data: tasks, error } =
    await supabaseClient
      .from("tasks")
      .select("*")
      .eq("customer_id", currentUserId)
      .in("status", ["accepted", "paid", "scheduled", "in_progress"])
      .order("task_date", { ascending: true });

  if (error) {
    tasksList.innerHTML =
      `<div class="empty">${escapeHTML(error.message)}</div>`;
    return;
  }

  allScheduledTasks =
    tasks || [];

  await attachQuoteAmounts();
  await populateJobTypeFilter();
  applyFilters();
}

async function attachQuoteAmounts() {
  for (const task of allScheduledTasks) {
    if (getPaidAmount(task)) {
      continue;
    }

    const quoteId =
      task.accepted_quote_id ||
      task.quote_id ||
      "";

    if (quoteId) {
      const { data: quote } =
        await supabaseClient
          .from("worker_quotes")
          .select("*")
          .eq("id", quoteId)
          .maybeSingle();

      if (quote) {
        task.quote_amount =
          quote.quote_amount ??
          quote.quote_price ??
          quote.offer_amount ??
          quote.total_amount ??
          quote.quote ??
          quote.amount ??
          quote.price ??
          0;
      }
    }
  }
}

async function populateJobTypeFilter() {
  const select =
    document.getElementById("jobTypeFilter");

  const currentValue =
    select.value;

  const types =
    [...new Set(
      allScheduledTasks
        .map(task => task.category || task.title || "")
        .filter(Boolean)
    )].sort();

  select.innerHTML =
    `<option value="">All job types</option>`;

  types.forEach(type => {
    const option =
      document.createElement("option");

    option.value = type;
    option.innerText = type;

    select.appendChild(option);
  });

  select.value =
    currentValue;
}

function applyFilters() {
  const typeFilter =
    document.getElementById("jobTypeFilter").value;

  const dateFilter =
    document.getElementById("dateFilter").value;

  let filtered =
    allScheduledTasks.slice();

  if (typeFilter) {
    filtered =
      filtered.filter(task =>
        (task.category || task.title || "") === typeFilter
      );
  }

  if (dateFilter) {
    filtered =
      filtered.filter(task => {
        const taskDate =
          getTaskDate(task);

        if (!taskDate || taskDate === "Flexible") {
          return false;
        }

        return String(taskDate).slice(0, 10) === dateFilter;
      });
  }

  renderTasks(filtered);
}

function clearFilters() {
  document.getElementById("jobTypeFilter").value = "";
  document.getElementById("dateFilter").value = "";

  renderTasks(allScheduledTasks);
}

async function getWorkerName(workerId) {

  if (!workerId) {
    return "Assigned worker";
  }

  const { data: profile } =
    await supabaseClient
      .from("profiles")
      .select("first_name, last_name, full_name, display_name")
      .eq("id", workerId)
      .maybeSingle();

  const { data: workerProfile } =
    await supabaseClient
      .from("worker_profiles")
      .select("full_name, display_name")
      .eq("id", workerId)
      .maybeSingle();

  const { data: workerProfileByAuth } =
    await supabaseClient
      .from("worker_profiles")
      .select("full_name, display_name")
      .eq("auth_user_id", workerId)
      .maybeSingle();

  const person =
    Object.assign(
      {},
      profile || {},
      workerProfile || {},
      workerProfileByAuth || {}
    );

  return (
    person.full_name ||
    person.display_name ||
    `${person.first_name || ""} ${person.last_name || ""}`.trim() ||
    "Assigned worker"
  );

}

async function renderTasks(tasks) {
  const tasksList =
    document.getElementById("tasksList");

  const scheduledCount =
    document.getElementById("scheduledCount");

  const paidTotal =
    document.getElementById("paidTotal");

  scheduledCount.innerText =
    String(tasks.length);

  const total =
    tasks.reduce((sum, task) => {
      return sum + Number(getPaidAmount(task) || 0);
    }, 0);

  paidTotal.innerText =
    formatMoney(total);

  if (!tasks || tasks.length === 0) {
    tasksList.innerHTML =
      `<div class="empty">No scheduled tasks match this filter.</div>`;
    return;
  }

  tasksList.innerHTML = "";

  for (const task of tasks) {
    const workerId =
      getAssignedWorkerId(task);

    const workerName =
      await getWorkerName(workerId);

    const taskDate =
      getTaskDate(task);

    const amountPaid =
      getPaidAmount(task);

    const card =
      document.createElement("div");

    card.className =
      "task-card";

    card.innerHTML = `
      <div class="task-top">
        <div>
          <div class="task-title">
            ${escapeHTML(task.category || task.title || "Task")}
          </div>

          <div class="task-sub">
            Order # TM-${String(task.id).slice(0, 8).toUpperCase()}
          </div>
        </div>

        <div class="status-pill">
          ${escapeHTML(task.status || "scheduled")}
        </div>
      </div>

      <div class="info-grid">
        <div class="info-box">
          <div class="info-label">Scheduled Date</div>
          <div class="info-value">
            ${escapeHTML(formatDate(taskDate))}
          </div>
        </div>

        <div class="info-box">
          <div class="info-label">Worker</div>
          <div class="info-value">
            ${escapeHTML(workerName)}
          </div>
        </div>

        <div class="info-box">
          <div class="info-label">Amount Paid</div>
          <div class="info-value">
            ${escapeHTML(formatMoney(amountPaid))}
          </div>
        </div>

        <div class="info-box">
          <div class="info-label">Location</div>
          <div class="info-value">
            ${escapeHTML(task.city || "")}, ${escapeHTML(task.state || "")}
          </div>
        </div>
      </div>

      <div class="code-note">
        <div>Arrival Code</div>
        <div class="arrival-code">${escapeHTML(task.arrival_code || "Not generated")}</div>
        Only give this code to the worker once they have arrived for the work.
      </div>

      <div class="action-row">
        <button class="primary-btn" onclick="messageWorker('${task.id}', '${workerId}')">
          Message
        </button>

        <button class="secondary-btn" onclick="editTask('${task.id}')">
          Edit Task
        </button>
      </div>

      <button class="cancel-btn" onclick="cancelScheduledTask('${task.id}')">
        Cancel Task
      </button>
    `;

    tasksList.appendChild(card);
  }
}

function messageWorker(taskId, workerId) {
  if (!workerId) {
    alert("No worker is assigned to this task.");
    return;
  }

  window.location.href =
    `message-center.html?task_id=${encodeURIComponent(taskId)}&worker_id=${encodeURIComponent(workerId)}`;
}

function editTask(taskId) {
  window.location.href =
    `post-job.html?edit_task_id=${encodeURIComponent(taskId)}`;
}

async function cancelScheduledTask(taskId) {
  const confirmCancel =
    confirm("Cancel this scheduled task? This will remove it from scheduled tasks.");

  if (!confirmCancel) {
    return;
  }

  const status =
    document.getElementById("status");

  status.style.color = "#b00020";
  status.innerText = "";

  const { error } =
    await supabaseClient
      .from("tasks")
      .update({
        status: "cancelled"
      })
      .eq("id", taskId)
      .eq("customer_id", currentUserId);

  if (error) {
    status.innerText =
      error.message;
    return;
  }

  status.style.color = "#0b7a28";
  status.innerText =
    "Scheduled task cancelled.";

  await loadScheduledTasks();
}

loadScheduledTasks();
</script>
</body>
</html>
