<!DOCTYPE html>
<html>
<head>
<title>View Open Task - TaskMint</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --bg: #ffffff;
  --surface: #f2f7f4;
  --surface2: #e6f4eb;
  --border: #e2ebe5;
  --accent: #0b7a28;
  --text: #111111;
  --muted: #6b7870;
  --danger: #b00020;
  --warning-bg: #fffbeb;
  --warning-border: #f0c040;
  --warning-text: #7a4f00;
}

body {
  margin: 0;
  font-family: 'Plus Jakarta Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  padding-bottom: 40px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.container {
  width: 100%;
  max-width: 470px;
  padding: 20px 16px 30px;
}

.top-bar {
  position: sticky;
  top: 0;
  z-index: 40;
  width: 100%;
  max-width: 470px;
  background: rgba(255,255,255,0.97);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 13px 20px;
  margin: -20px -16px 20px;
}

.back,
.refresh {
  color: var(--accent);
  font-weight: 800;
  cursor: pointer;
  font-size: 14px;
}

.refresh {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 999px;
  padding: 8px 11px;
  font-size: 12px;
}

.hero {
  background: var(--accent);
  color: white;
  border-radius: 22px;
  padding: 24px 20px;
  margin-bottom: 14px;
  box-shadow: 0 8px 24px rgba(11,122,40,0.22);
  position: relative;
  overflow: hidden;
  opacity: 0;
  animation: riseIn 0.35s 0.05s forwards;
}

.hero::before {
  content: "";
  position: absolute;
  width: 155px;
  height: 155px;
  border-radius: 50%;
  background: rgba(255,255,255,0.10);
  top: -65px;
  right: -55px;
}

.hero::after {
  content: "";
  position: absolute;
  width: 92px;
  height: 92px;
  border-radius: 50%;
  background: rgba(255,255,255,0.07);
  bottom: -45px;
  left: -35px;
}

.hero h1 {
  margin: 0 0 7px;
  font-size: 29px;
  font-weight: 800;
  line-height: 1.08;
  letter-spacing: -0.5px;
  position: relative;
  z-index: 2;
}

.hero p {
  margin: 0;
  font-size: 13px;
  line-height: 1.5;
  color: rgba(255,255,255,0.82);
  position: relative;
  z-index: 2;
}

.summary-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 12px;
  opacity: 0;
  animation: riseIn 0.35s 0.1s forwards;
}

.summary-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 15px;
}

.summary-label {
  color: var(--accent);
  font-size: 10.5px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.6px;
}

.summary-value {
  font-size: 26px;
  line-height: 1;
  font-weight: 800;
  margin-top: 7px;
}

.task-card,
.worker-card {
  background: var(--surface);
  border-radius: 20px;
  padding: 16px;
  margin-bottom: 12px;
  border: 1px solid var(--border);
  opacity: 0;
  animation: riseIn 0.35s 0.12s forwards;
}

.task-top,
.worker-summary {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  align-items: flex-start;
}

.task-title {
  font-size: 18px;
  font-weight: 800;
  margin-bottom: 5px;
  letter-spacing: -0.2px;
}

.task-sub {
  color: var(--muted);
  font-size: 12px;
  line-height: 1.35;
}

.customer-line {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: var(--text);
  font-size: 12px;
  font-weight: 800;
  margin-top: 6px;
}

.customer-line span {
  color: var(--accent);
}

.status-pill {
  background: var(--surface2);
  color: var(--accent);
  border-radius: 999px;
  padding: 7px 10px;
  font-size: 11px;
  font-weight: 800;
  text-transform: capitalize;
  white-space: nowrap;
}

.quote-pill {
  background: var(--text);
  color: white;
  border-radius: 999px;
  padding: 7px 10px;
  font-size: 12px;
  font-weight: 800;
  white-space: nowrap;
}

.compact-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-top: 12px;
}

.info-box {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 11px;
  min-height: 70px;
}

.info-label {
  color: var(--accent);
  font-size: 10.5px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.6px;
  margin-bottom: 6px;
}

.info-value {
  font-size: 13px;
  font-weight: 700;
  line-height: 1.35;
}

.details-toggle {
  margin-top: 12px;
  color: var(--accent);
  font-size: 13px;
  font-weight: 800;
  cursor: pointer;
}

.details-box,
.worker-details {
  display: none;
  margin-top: 10px;
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 12px;
  font-size: 12px;
  line-height: 1.4;
  white-space: normal;
}

.code-note {
  background: var(--warning-bg);
  border: 1px solid var(--warning-border);
  color: var(--warning-text);
  border-radius: 16px;
  padding: 13px;
  margin-top: 12px;
  font-size: 12.5px;
  line-height: 1.5;
  font-weight: 700;
}

.arrival-code {
  display: inline-block;
  background: white;
  color: var(--text);
  border: 1px dashed #d39b26;
  border-radius: 12px;
  padding: 8px 12px;
  font-size: 22px;
  font-weight: 800;
  letter-spacing: 4px;
  margin: 8px 0;
}

.action-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-top: 12px;
}

button {
  width: 100%;
  padding: 11px;
  border: none;
  border-radius: 13px;
  font-size: 12px;
  font-weight: 800;
  cursor: pointer;
  transition: opacity 0.18s, transform 0.18s, box-shadow 0.18s;
  font-family: 'Plus Jakarta Sans', sans-serif;
}

button:hover {
  opacity: 0.9;
  transform: translateY(-1px);
  box-shadow: 0 6px 14px rgba(11,122,40,0.10);
}

.worker-actions {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-top: 10px;
}

.worker-actions button {
  padding: 10px;
  font-size: 11px;
  border-radius: 12px;
}

.quote-info {
  margin: 8px 0;
}

.quote-info p {
  margin: 5px 0;
  font-size: 12px;
  line-height: 1.4;
  color: var(--text);
}

.tap-message {
  margin-top: 8px;
  color: var(--accent);
  font-size: 12px;
  font-weight: 800;
}

.message-btn,
.primary-btn,
.accept-btn {
  background: var(--accent);
  color: white;
}

.public-profile-btn {
  background: var(--text);
  color: white;
}

.edit-btn {
  background: white;
  color: var(--accent);
  border: 1px solid var(--border);
}

.cancel-btn,
.decline-btn,
.dispute-btn {
  background: var(--danger);
  color: white;
}

.dispute-btn {
  margin-top: 10px;
}

.dispute-btn:disabled {
  background: #cfd6d1;
  color: #606a64;
  cursor: not-allowed;
}

.empty {
  background: var(--surface);
  padding: 24px 18px;
  border-radius: 20px;
  text-align: center;
  color: var(--muted);
  border: 1px solid var(--border);
  font-size: 13px;
  line-height: 1.45;
}

.status-bar {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 5px;
  margin: 16px 0 8px;
  font-size: 9.5px;
  color: var(--muted);
}

.step {
  text-align: center;
}

.dot {
  width: 11px;
  height: 11px;
  border-radius: 50%;
  background: #cfd6d1;
  margin: 0 auto 6px;
}

.active .dot {
  background: var(--accent);
}

.active {
  color: var(--accent);
  font-weight: 800;
}

.applicants {
  display: none;
  margin-top: 14px;
  border-top: 1px solid var(--border);
  padding-top: 14px;
}

.worker-header {
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 0;
}

.worker-avatar {
  width: 54px;
  height: 54px;
  border-radius: 18px;
  object-fit: cover;
  background: var(--surface2);
  flex-shrink: 0;
}

.worker-name {
  font-size: 15px;
  font-weight: 800;
  margin-bottom: 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.worker-rating {
  font-size: 13px;
  color: var(--muted);
  font-weight: 700;
}

.worker-card {
  cursor: pointer;
  background: #fff;
}

.worker-card p {
  font-size: 13px;
  color: var(--text);
  line-height: 1.4;
  margin: 8px 0;
}

.review {
  background: #fff;
  padding: 8px;
  border-radius: 12px;
  margin-top: 6px;
  border: 1px solid var(--border);
}

.hidden {
  display: none;
}

#status {
  text-align: center;
  color: var(--danger);
  font-size: 13px;
  font-weight: 800;
  margin: 10px 0;
}

@keyframes riseIn {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

@media (max-width: 360px) {
  .hero h1 {
    font-size: 25px;
  }

  .compact-grid,
  .action-row,
  .worker-actions {
    grid-template-columns: 1fr;
  }

  .status-bar {
    font-size: 9px;
  }
}
</style>
</head>

<body>
<div class="container">

  <div class="top-bar">
    <div class="back" onclick="window.location.assign('customer-home.html')">← Back</div>
    <div class="refresh" onclick="loadOpenTasks()">Refresh</div>
  </div>

  <div class="hero">
    <h1>Open Tasks</h1>
    <p>Review worker quotes, accept the right worker, or decline offers that do not fit.</p>
  </div>

  <div class="summary-row">
    <div class="summary-box">
      <div class="summary-label">Open Tasks</div>
      <div class="summary-value" id="openCount">0</div>
    </div>

    <div class="summary-box">
      <div class="summary-label">Worker Interest</div>
      <div class="summary-value" id="interestCount">0</div>
    </div>
  </div>

  <p id="status"></p>

  <div id="tasksList"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseClient = window.supabase.createClient(
  "https://dbcthtjmtlumidpbucrc.supabase.co",
  "sb_publishable_3h7cO2Z8CDxZyEKDLRzvtg_1UJCLldJ"
);

let currentCustomerId = null;

async function redirectToLogin(message) {
  await supabaseClient.auth.signOut();
  localStorage.clear();
  sessionStorage.clear();

  if (message) {
    alert(message);
  }

  window.location.href = "login.html";
}

async function requireValidCustomerSession() {
  const { data: sessionData, error: sessionError } =
    await supabaseClient.auth.getSession();

  if (sessionError || !sessionData.session || !sessionData.session.user) {
    await redirectToLogin("You must be logged in.");
    return null;
  }

  const user =
    sessionData.session.user;

  const { data: profile, error: profileError } =
    await supabaseClient
      .from("profiles")
      .select("id, account_type")
      .eq("id", user.id)
      .maybeSingle();

  if (profileError || !profile) {
    await redirectToLogin("This account no longer exists.");
    return null;
  }

  if (profile.account_type && profile.account_type !== "customer") {
    await redirectToLogin("This page is for customer accounts only.");
    return null;
  }

  currentCustomerId =
    user.id;

  localStorage.setItem("taskmintUserId", user.id);

  return user.id;
}

function escapeHTML(value) {
  if (value === null || value === undefined) {
    return "";
  }

  return String(value)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function formatDate(value) {
  if (!value) {
    return "Not listed";
  }

  if (value === "Flexible") {
    return "Flexible";
  }

  const rawValue = String(value).trim();

  const dateMatch =
    rawValue.match(/^(\d{4})-(\d{2})-(\d{2})/);

  if (dateMatch) {
    const [, year, month, day] = dateMatch;

    return `${Number(month)}/${Number(day)}/${year}`;
  }

  const date = new Date(rawValue);

  if (isNaN(date.getTime())) {
    return value;
  }

  return `${date.getMonth() + 1}/${date.getDate()}/${date.getFullYear()}`;
}

function formatStatus(status) {
  if (!status) {
    return "open";
  }

  return String(status).replaceAll("_", " ");
}

function formatMoney(value) {
  if (value === null || value === undefined || value === "") {
    return "No quote";
  }

  const numberValue = Number(value);

  if (isNaN(numberValue)) {
    return String(value);
  }

  return "$" + numberValue.toFixed(2);
}

function getQuoteAmount(app) {
  return (
    app.quote_amount ??
    app.quote_price ??
    app.offer_amount ??
    app.total_amount ??
    app.quote ??
    app.amount ??
    app.price ??
    ""
  );
}

function getWorkerSelectedFlexibleDate(app) {
  return (
    app.selected_flexible_date ||
    app.flexible_date_selected ||
    app.worker_selected_date ||
    app.selected_date ||
    app.proposed_date ||
    app.scheduled_date ||
    ""
  );
}

function renderWorkerSelectedFlexibleDate(app) {
  const selectedDate =
    getWorkerSelectedFlexibleDate(app);

  if (!selectedDate) {
    return "";
  }

  return `
    <p><strong>Worker Selected Date:</strong> ${escapeHTML(formatDate(selectedDate))}</p>
  `;
}

function uniqueValues(values) {
  return values
    .filter(value => value !== null && value !== undefined && value !== "")
    .map(value => String(value))
    .filter((value, index, array) => array.indexOf(value) === index);
}

async function fetchSingleByColumn(tableName, columnName, value) {
  if (!value) {
    return null;
  }

  const { data, error } =
    await supabaseClient
      .from(tableName)
      .select("*")
      .eq(columnName, value)
      .maybeSingle();

  if (error || !data) {
    return null;
  }

  return data;
}

async function getWorkerData(app) {
  const possibleWorkerIds =
    uniqueValues([
      app.worker_id,
      app.worker_profile_id,
      app.profile_id,
      app.worker_user_id,
      app.user_id,
      app.submitted_by,
      app.created_by
    ]);

  let workerProfile = null;
  let profile = null;

  for (const id of possibleWorkerIds) {
    if (!workerProfile) {
      workerProfile =
        await fetchSingleByColumn("worker_profiles", "id", id);
    }

    if (!profile) {
      profile =
        await fetchSingleByColumn("profiles", "id", id);
    }

    if (workerProfile || profile) {
      break;
    }
  }

  return Object.assign({}, app || {}, profile || {}, workerProfile || {});
}

function getWorkerDisplayName(worker, app) {

  const firstName =
    worker.first_name ||
    worker.first ||
    worker.worker_first_name ||
    app.worker_first_name ||
    app.first_name ||
    "";

  const lastInitial =
    worker.worker_last_initial ||
    app.worker_last_initial ||
    (
      worker.last_name
        ? String(worker.last_name).charAt(0).toUpperCase()
        : ""
    );

  if (firstName) {
    return `${firstName} ${lastInitial ? lastInitial + "." : ""}`.trim();
  }

  const fullName =
    worker.full_name ||
    worker.display_name ||
    app.worker_display_name ||
    app.display_name ||
    "Worker";

  const parts =
    String(fullName).trim().split(/\s+/);

  if (parts.length > 1) {
    return `${parts[0]} ${parts[parts.length - 1].charAt(0).toUpperCase()}.`;
  }

  return parts[0];
}

function getStatusStep(status) {
  if (status === "accepted") return "accepted";
  if (status === "in_progress") return "in_progress";
  if (status === "completed") return "completed";
  if (status === "paid") return "paid";
  return "created";
}

function statusBar(status) {
  const current = getStatusStep(status);

  const steps = [
    { key: "created", label: "Created" },
    { key: "accepted", label: "Accepted" },
    { key: "in_progress", label: "In Progress" },
    { key: "completed", label: "Completed" },
    { key: "paid", label: "Paid" }
  ];

  const currentIndex =
    steps.findIndex(step => step.key === current);

  return `
    <div class="status-bar">
      ${steps.map((step, index) => `
        <div class="step ${index <= currentIndex ? "active" : ""}">
          <div class="dot"></div>
          ${step.label}
        </div>
      `).join("")}
    </div>
  `;
}

async function getCustomerId() {
  if (currentCustomerId) {
    return currentCustomerId;
  }

  return await requireValidCustomerSession();
}

function getTaskDetails(task) {
  if (task.task_details && typeof task.task_details === "object") {
    return Object.keys(task.task_details)
      .map(key => {
        const label =
          key.replaceAll("_", " ").replace(/\b\w/g, char => char.toUpperCase());

        return `${label}: ${task.task_details[key]}`;
      })
      .join("\n")
  }

  return task.description || task.additional_notes || "No details listed.";
}

function getTaskSourceLabel(task) {
  return task.is_direct_request ? "Direct Quote Request" : "Open Task";
}

function getCustomerDisplayName(task) {
  const customerName =
    task.customer_name ||
    task.customer_full_name ||
    task.client_name ||
    task.posted_by_name ||
    "";

  if (customerName) {
    return customerName;
  }

  const firstName =
    task.customer_first_name ||
    task.first_name ||
    "";

  const lastName =
    task.customer_last_name ||
    task.last_name ||
    "";

  const combinedName =
    `${firstName} ${lastName}`.trim();

  if (combinedName) {
    return combinedName;
  }

  return "Customer";
}

function getTaskQuoteFilter(query, task) {
  if (task.is_direct_request) {
    return query.eq("direct_request_id", task.id);
  }

  return query.eq("task_id", task.id);
}

function getApplicantsId(task) {
  return task.is_direct_request
    ? `applicants-direct-${task.id}`
    : `applicants-${task.id}`;
}

function getDetailsId(task) {
  return task.is_direct_request
    ? `details-direct-${task.id}`
    : `details-${task.id}`;
}

async function loadOpenTasks() {
  const customerId =
    await getCustomerId();

  const tasksList =
    document.getElementById("tasksList");

  const status =
    document.getElementById("status");

  status.innerText = "";
  tasksList.innerHTML =
    `<div class="empty">Loading your open tasks...</div>`;

  if (!customerId) {
    tasksList.innerHTML =
      `<div class="empty">You must be logged in.</div>`;
    return;
  }

  const { data: publicTasks, error } =
    await supabaseClient
      .from("tasks")
      .select("*")
      .eq("customer_id", customerId)
      .eq("status", "open")
      .order("created_at", { ascending: false });

  if (error) {
    tasksList.innerHTML =
      `<div class="empty">${escapeHTML(error.message)}</div>`;
    return;
  }

  const { data: directRequests, error: directError } =
    await supabaseClient
      .from("direct_task_requests")
      .select("*")
      .eq("customer_id", customerId)
      .in("status", ["requested", "quoted"])
      .order("created_at", { ascending: false });

  if (directError) {
    tasksList.innerHTML =
      `<div class="empty">${escapeHTML(directError.message)}</div>`;
    return;
  }

  const tasks =
    [
      ...(publicTasks || []).map(task => ({
        ...task,
        is_direct_request: false
      })),
      ...(directRequests || []).map(task => ({
        ...task,
        is_direct_request: true
      }))
    ].sort((a, b) => {
      return new Date(b.created_at || 0) - new Date(a.created_at || 0);
    });

  if (!tasks || tasks.length === 0) {
    document.getElementById("openCount").innerText = "0";
    document.getElementById("interestCount").innerText = "0";

    tasksList.innerHTML =
      `<div class="empty">No open tasks yet.</div>`;
    return;
  }

  document.getElementById("openCount").innerText =
    String(tasks.length);

  tasksList.innerHTML = "";

  let totalInterest = 0;

  for (const task of tasks) {
    let countQuery =
      supabaseClient
        .from("worker_quotes")
        .select("*", { count: "exact", head: true })
        .neq("status", "declined");

    countQuery =
      getTaskQuoteFilter(countQuery, task);

    const { count } =
      await countQuery;

    totalInterest += Number(count || 0);

    const assignedWorkerId =
      task.assigned_worker_id ||
      task.assigned_worker_j ||
      "";

    const card =
      document.createElement("div");

    card.className = "task-card";

    const detailsId =
      getDetailsId(task);

    const applicantsId =
      getApplicantsId(task);

    const dateDisplay =
      task.date_flexible
        ? "Flexible"
        : formatDate(task.task_date || task.date_needed);

    const arrivalCode =
      task.arrival_code || "Not generated";

    card.innerHTML = `
      <div class="task-top">
        <div>
          <div class="task-title">
            ${escapeHTML(task.category || task.title || "Task")}
          </div>

          <div class="task-sub">
            Order # TM-${String(task.id).slice(0, 8).toUpperCase()} •
            ${task.created_at ? new Date(task.created_at).toLocaleDateString() : ""}
          </div>

          <div class="customer-line">
            Customer: <span>${escapeHTML(getCustomerDisplayName(task))}</span>
          </div>
        </div>

        <div class="status-pill">
          ${escapeHTML(formatStatus(task.status || "open"))}
        </div>
      </div>

      <div class="compact-grid">
        <div class="info-box">
          <div class="info-label">Location</div>
          <div class="info-value">
            ${escapeHTML(task.city || "")}, ${escapeHTML(task.state || "")}
          </div>
        </div>

        <div class="info-box">
          <div class="info-label">Date Needed</div>
          <div class="info-value">
            ${escapeHTML(dateDisplay)}
          </div>
        </div>

        <div class="info-box">
          <div class="info-label">Interested</div>
          <div class="info-value">
            ${count || 0} worker${Number(count || 0) === 1 ? "" : "s"}
          </div>
        </div>

        <div class="info-box">
          <div class="info-label">Request Type</div>
          <div class="info-value">
            ${escapeHTML(getTaskSourceLabel(task))}
          </div>
        </div>
      </div>

      <div class="details-toggle" onclick="event.stopPropagation(); toggleDetails('${detailsId}')">
        View task details
      </div>

      <div class="details-box" id="${detailsId}">
  ${
    getTaskDetails(task)
      .split("\n")
      .map(detail => `
        <div style="
          background:#ffffff;
          border:1px solid #e3eee6;
          border-radius:12px;
          padding:10px;
          margin-bottom:8px;
          line-height:1.35;
          font-size:12px;
          font-weight:700;
        ">
          ${escapeHTML(detail)}
        </div>
      `)
      .join("")
  }
</div>

      <div class="code-note">
        <div>Arrival Code</div>
        <div class="arrival-code">${escapeHTML(arrivalCode)}</div>
        Only give this code to the worker once they have arrived for the work.
      </div>

      ${statusBar(task.status)}

      <div class="action-row">
        <button class="edit-btn" onclick="event.stopPropagation(); editTask('${task.id}', ${task.is_direct_request ? "true" : "false"})">
          Edit Task
        </button>

        <button class="cancel-btn" onclick="event.stopPropagation(); cancelTask('${task.id}', ${task.is_direct_request ? "true" : "false"})">
          Cancel Task
        </button>
      </div>

      ${task.status === "in_progress" || task.status === "completed" || task.status === "paid" ? `
        <button class="dispute-btn" onclick="event.stopPropagation(); openDispute('${task.id}', '${assignedWorkerId}')">
          Open Dispute
        </button>
      ` : `
        <button class="dispute-btn" disabled onclick="event.stopPropagation();">
          Disputes unlock once work begins
        </button>
      `}

      <button class="primary-btn" onclick="event.stopPropagation(); toggleApplicants('${task.id}', ${task.is_direct_request ? "true" : "false"})">
        View Interested Workers
      </button>

      <div class="applicants" id="${applicantsId}">
        Loading applicants...
      </div>
    `;

    tasksList.appendChild(card);
  }

  document.getElementById("interestCount").innerText =
    String(totalInterest);
}

function toggleDetails(detailsId) {
  const box =
    document.getElementById(detailsId);

  if (!box) {
    return;
  }

  box.style.display =
    box.style.display === "block" ? "none" : "block";
}

function toggleWorkerDetails(detailsId) {
  const box =
    document.getElementById(detailsId);

  if (!box) {
    return;
  }

  box.style.display =
    box.style.display === "block" ? "none" : "block";
}

async function toggleApplicants(taskId, isDirectRequest = false) {
  const box =
    document.getElementById(
      isDirectRequest
        ? `applicants-direct-${taskId}`
        : `applicants-${taskId}`
    );

  if (!box) {
    return;
  }

  if (box.style.display === "block") {
    box.style.display = "none";
    return;
  }

  box.style.display = "block";
  box.innerHTML = "Loading interested workers...";

  let applicationsQuery =
    supabaseClient
      .from("worker_quotes")
      .select("*")
      .neq("status", "declined");

  if (isDirectRequest) {
    applicationsQuery =
      applicationsQuery.eq("direct_request_id", taskId);
  } else {
    applicationsQuery =
      applicationsQuery.eq("task_id", taskId);
  }

  const { data: applications, error } =
    await applicationsQuery;

  if (error) {
    box.innerHTML =
      `<p>${escapeHTML(error.message)}</p>`;
    return;
  }

  if (!applications || applications.length === 0) {
    box.innerHTML =
      `<p>No workers have shown interest yet.</p>`;
    return;
  }

  box.innerHTML = "";

  for (const app of applications) {
    const worker =
      await getWorkerData(app);

    const workerId =
      app.worker_id ||
      app.worker_profile_id ||
      worker.id ||
      worker.profile_id ||
      worker.worker_id ||
      worker.user_id ||
      app.user_id ||
      app.worker_user_id ||
      app.id;

    const revieweeId =
      worker.user_id ||
      worker.profile_id ||
      worker.worker_id ||
      worker.id ||
      workerId;

    const { data: reviews } =
      await supabaseClient
        .from("reviews")
        .select("*")
        .eq("worker_id", workerId);

    let rating =
      "No rating yet";

    if (reviews && reviews.length > 0) {
      const total =
        reviews.reduce((sum, review) => sum + Number(review.rating || 0), 0);

      rating =
        (total / reviews.length).toFixed(1);
    }

    const { count: completedJobsCount } =
      await supabaseClient
        .from("tasks")
        .select("*", { count: "exact", head: true })
        .eq("worker_id", workerId)
        .eq("payment_status", "paid");

    const quoteAmount =
      getQuoteAmount(app);

    const quoteStatus =
      app.status || "pending";

    const workerName =
      getWorkerDisplayName(worker, app);

    const workerPhoto =
      worker.profile_photo_url ||
      worker.photo_url ||
      worker.avatar_url ||
      worker.image_url ||
      "taskmintlogo.png";

    const workerCard =
      document.createElement("div");

    // FIX: use the safe workerId (never undefined) for the details element id
    const workerDetailsId =
      `worker-details-${taskId}-${workerId}`;

    workerCard.className =
      "worker-card";

    workerCard.innerHTML = `
      <div class="worker-summary" onclick="event.stopPropagation(); toggleWorkerDetails('${workerDetailsId}')">
        <div class="worker-header">
          <img
            src="${escapeHTML(workerPhoto)}"
            class="worker-avatar"
            onerror="this.src='taskmintlogo.png'"
          >

          <div>
            <div class="worker-name">
              ${escapeHTML(workerName)}
            </div>

            <div class="worker-rating">
              ⭐ ${escapeHTML(rating)}
            </div>
          </div>
        </div>

        <div class="quote-pill">
          ${escapeHTML(formatMoney(quoteAmount))}
        </div>
      </div>

      <div class="tap-message">
        Tap worker card to expand
      </div>

      <div class="worker-details" id="${workerDetailsId}">
        <div class="quote-info">
          <p><strong>Quote Status:</strong> ${escapeHTML(quoteStatus)}</p>
          ${renderWorkerSelectedFlexibleDate(app)}
          <p><strong>Jobs Completed:</strong> ${completedJobsCount || 0}</p>
          <p><strong>Reviews:</strong> ${reviews ? reviews.length : 0}</p>
          <p><strong>Worker Message:</strong> ${escapeHTML(app.message || "No message provided.")}</p>
        </div>

        <div class="worker-actions">
          <button class="public-profile-btn" onclick="event.stopPropagation(); viewWorkerPublicProfile('${workerId}')">
            Public Profile
          </button>

          <button class="message-btn" onclick="event.stopPropagation(); messageWorker('${workerId}', '${taskId}')">
            Message
          </button>

          <button class="accept-btn" onclick="event.stopPropagation(); acceptQuote('${taskId}', '${workerId}', '${app.id || ""}', '${quoteAmount}', ${isDirectRequest ? "true" : "false"})">
            Accept Quote
          </button>

          <button class="decline-btn" onclick="event.stopPropagation(); declineQuote('${app.id || ""}', '${taskId}', ${isDirectRequest ? "true" : "false"})">
            Decline Quote
          </button>
        </div>
      </div>
    `;

    box.appendChild(workerCard);
  }
}

function viewWorkerPublicProfile(workerId) {
  localStorage.setItem("selectedWorkerId", workerId);
  localStorage.setItem("selectedWorkerProfileId", workerId);
  window.location.href =
    `worker-public-profile.html?workerId=${encodeURIComponent(workerId)}`;
}

function messageWorker(workerId, taskId) {
  window.location.href =
    `message-center.html?worker_id=${workerId}&task_id=${taskId}`;
}

function openDispute(taskId, workerId) {
  window.location.href =
    `dispute-center.html?task_id=${taskId}&worker_id=${workerId || ""}`;
}

function editTask(taskId, isDirectRequest = false) {
  if (isDirectRequest) {
    window.location.href =
      `request-worker-quote.html?direct_request_id=${encodeURIComponent(taskId)}`;
    return;
  }

  window.location.href =
    `post-job.html?edit_task_id=${encodeURIComponent(taskId)}`;
}

function acceptQuote(taskId, workerId, quoteId, quoteAmount, isDirectRequest = false) {
  const confirmAccept =
    confirm("Continue to payment and assign this worker if payment succeeds?");

  if (!confirmAccept) {
    return;
  }

  const sourceType =
    isDirectRequest ? "direct_task_request" : "public_task";

  window.location.href =
    `customer-pay-quote.html?task_id=${encodeURIComponent(taskId)}&worker_id=${encodeURIComponent(workerId)}&quote_id=${encodeURIComponent(quoteId)}&quote_amount=${encodeURIComponent(quoteAmount || 0)}&source_type=${encodeURIComponent(sourceType)}`;
}

async function declineQuote(quoteId, taskId, isDirectRequest = false) {
  if (!quoteId) {
    alert("This quote could not be found.");
    return;
  }

  const confirmDecline =
    confirm("Decline and remove this quote from your view?");

  if (!confirmDecline) {
    return;
  }

  const status =
    document.getElementById("status");

  status.style.color = "#b00020";
  status.innerText = "";

  const { error } =
    await supabaseClient
      .from("worker_quotes")
      .update({ status: "declined" })
      .eq("id", quoteId);

  if (error) {
    status.innerText = error.message;
    return;
  }

  status.style.color = "#0b7a28";
  status.innerText = "Quote declined and removed from your view.";

  const applicantsBox =
    document.getElementById(
      isDirectRequest
        ? `applicants-direct-${taskId}`
        : `applicants-${taskId}`
    );

  if (applicantsBox) {
    applicantsBox.style.display = "none";
    applicantsBox.innerHTML = "Loading applicants...";
  }

  await loadOpenTasks();
}

async function cancelTask(taskId, isDirectRequest = false) {
  const confirmCancel =
    confirm("Cancel this task? Workers will no longer be able to send quotes.");

  if (!confirmCancel) {
    return;
  }

  const status =
    document.getElementById("status");

  status.style.color = "#b00020";
  status.innerText = "";

  const tableName =
    isDirectRequest ? "direct_task_requests" : "tasks";

  let cancelResult =
    await supabaseClient
      .from(tableName)
      .update({ status: "cancelled" })
      .eq("id", taskId);

  if (cancelResult.error) {
    cancelResult =
      await supabaseClient
        .from(tableName)
        .update({ status: "canceled" })
        .eq("id", taskId);
  }

  if (cancelResult.error) {
    status.innerText =
      cancelResult.error.message;
    return;
  }

  let quoteUpdate =
    supabaseClient
      .from("worker_quotes")
      .update({ status: "declined" });

  if (isDirectRequest) {
    quoteUpdate =
      quoteUpdate.eq("direct_request_id", taskId);
  } else {
    quoteUpdate =
      quoteUpdate.eq("task_id", taskId);
  }

  const { error: quoteError } =
    await quoteUpdate;

  if (quoteError) {
    status.innerText = quoteError.message;
    return;
  }

  status.style.color = "#0b7a28";
  status.innerText = "Task cancelled.";

  await loadOpenTasks();
}

async function startPage() {
  const validCustomerId =
    await requireValidCustomerSession();

  if (!validCustomerId) {
    return;
  }

  await loadOpenTasks();
}

startPage();
</script>
