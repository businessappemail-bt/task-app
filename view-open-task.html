<!DOCTYPE html>
<html>
<head>
<title>View Open Task - TaskMint</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background:
    radial-gradient(circle at top left, rgba(25,182,76,0.16), transparent 32%),
    linear-gradient(180deg, #eef8f1 0%, #f5f5f5 100%);
  color: #111;
  padding-bottom: 40px;
}

.container {
  max-width: 430px;
  margin: 0 auto;
  padding: 18px;
}

.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 14px;
}

.back,
.refresh {
  color: #0b7a28;
  font-weight: 900;
  cursor: pointer;
  font-size: 14px;
}

.hero {
  background: linear-gradient(135deg, #0b7a28, #19b64c);
  color: white;
  border-radius: 28px;
  padding: 22px;
  margin-bottom: 16px;
  box-shadow: 0 14px 30px rgba(11,122,40,0.22);
  position: relative;
  overflow: hidden;
  animation: fadeUp 0.45s ease;
}

.hero::before {
  content: "";
  position: absolute;
  width: 170px;
  height: 170px;
  border-radius: 50%;
  background: rgba(255,255,255,0.12);
  top: -70px;
  right: -60px;
  animation: pulseGlow 5s ease-in-out infinite;
}

.hero h1 {
  margin: 0 0 8px;
  font-size: 30px;
  line-height: 1.1;
  position: relative;
  z-index: 2;
}

.hero p {
  margin: 0;
  font-size: 14px;
  line-height: 1.5;
  opacity: 0.96;
  position: relative;
  z-index: 2;
}

.summary-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 16px;
}

.summary-box {
  background: white;
  border: 1px solid #edf1ee;
  border-radius: 18px;
  padding: 13px;
  box-shadow: 0 6px 16px rgba(0,0,0,0.06);
  animation: floatCard 4s ease-in-out infinite;
}

.summary-box:nth-child(2) {
  animation-delay: 0.5s;
}

.summary-label {
  color: #0b7a28;
  font-size: 11px;
  font-weight: 900;
  text-transform: uppercase;
  letter-spacing: 0.4px;
}

.summary-value {
  font-size: 18px;
  font-weight: 900;
  margin-top: 4px;
}

.task-card,
.worker-card {
  background: white;
  border-radius: 24px;
  padding: 16px;
  margin-bottom: 14px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.08);
  border: 1px solid #edf1ee;
  animation: fadeUp 0.45s ease;
}

.task-top,
.worker-summary {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  align-items: flex-start;
}

.task-title {
  font-size: 18px;
  font-weight: 900;
  margin-bottom: 4px;
}

.task-sub {
  color: #666;
  font-size: 12px;
  line-height: 1.35;
}

.status-pill {
  background: #e7f7ec;
  color: #0b7a28;
  border-radius: 999px;
  padding: 7px 10px;
  font-size: 11px;
  font-weight: 900;
  text-transform: capitalize;
  white-space: nowrap;
}

.quote-pill {
  background: #111;
  color: white;
  border-radius: 999px;
  padding: 7px 10px;
  font-size: 12px;
  font-weight: 900;
  white-space: nowrap;
}

.compact-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-top: 12px;
}

.info-box {
  background: #f7faf8;
  border: 1px solid #e3eee6;
  border-radius: 16px;
  padding: 10px;
  min-height: 70px;
}

.info-label {
  color: #0b7a28;
  font-size: 11px;
  font-weight: 900;
  text-transform: uppercase;
  letter-spacing: 0.4px;
  margin-bottom: 5px;
}

.info-value {
  font-size: 13px;
  font-weight: 800;
  line-height: 1.35;
}

.details-toggle {
  margin-top: 12px;
  color: #0b7a28;
  font-size: 13px;
  font-weight: 900;
  cursor: pointer;
}

.details-box,
.worker-details {
  display: none;
  margin-top: 8px;
  background: #f7faf8;
  border: 1px solid #e3eee6;
  border-radius: 14px;
  padding: 10px;
  font-size: 12px;
  line-height: 1.3;
  white-space: normal;
}

.code-note {
  background: #fff8e6;
  border: 1px solid #ffe0a3;
  color: #6f4b00;
  border-radius: 16px;
  padding: 12px;
  margin-top: 12px;
  font-size: 13px;
  line-height: 1.45;
  font-weight: 800;
}

.arrival-code {
  display: inline-block;
  background: white;
  color: #111;
  border: 1px dashed #d39b26;
  border-radius: 12px;
  padding: 8px 12px;
  font-size: 22px;
  font-weight: 900;
  letter-spacing: 4px;
  margin: 8px 0;
}

.action-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-top: 12px;
}

button {
  width: 100%;
  padding: 10px;
  border: none;
  border-radius: 12px;
  font-size: 12px;
  font-weight: 900;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  transform: translateY(-1px);
  box-shadow: 0 5px 12px rgba(0,0,0,0.09);
}

.worker-actions {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-top: 8px;
}

.worker-actions button {
  padding: 9px;
  font-size: 11px;
  border-radius: 11px;
}

.quote-info {
  margin: 8px 0;
}

.quote-info p {
  margin: 4px 0;
  font-size: 12px;
  line-height: 1.3;
}

.tap-message {
  margin-top: 6px;
  color: #0b7a28;
  font-size: 12px;
  font-weight: 900;
}

.message-btn,
.primary-btn,
.accept-btn {
  background: linear-gradient(135deg, #0b7a28, #19b64c);
  color: white;
}

.public-profile-btn {
  background: #111;
  color: white;
}

.edit-btn {
  background: white;
  color: #0b7a28;
  border: 1px solid #cdebd5;
}

.cancel-btn,
.decline-btn,
.dispute-btn {
  background: #b00020;
  color: white;
}

.dispute-btn:disabled {
  background: #ccc;
  cursor: not-allowed;
}

.empty {
  background: white;
  padding: 22px;
  border-radius: 22px;
  text-align: center;
  color: #666;
  border: 1px solid #edf1ee;
  box-shadow: 0 8px 24px rgba(0,0,0,0.08);
}

.status-bar {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 5px;
  margin: 16px 0 8px;
  font-size: 10px;
  color: #777;
}

.step {
  text-align: center;
}

.dot {
  width: 11px;
  height: 11px;
  border-radius: 50%;
  background: #ccc;
  margin: 0 auto 6px;
}

.active .dot {
  background: #0b7a28;
}

.active {
  color: #0b7a28;
  font-weight: bold;
}

.applicants {
  display: none;
  margin-top: 14px;
  border-top: 1px solid #edf1ee;
  padding-top: 14px;
}

.worker-header {
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 0;
}

.worker-avatar {
  width: 54px;
  height: 54px;
  border-radius: 18px;
  object-fit: cover;
  background: #ddd;
  flex-shrink: 0;
}

.worker-name {
  font-size: 15px;
  font-weight: 900;
  margin-bottom: 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.worker-rating {
  font-size: 13px;
  color: #555;
  font-weight: 800;
}

.worker-card {
  cursor: pointer;
}

.worker-card p {
  font-size: 13px;
  color: #444;
  line-height: 1.4;
  margin: 8px 0;
}

.review {
  background: white;
  padding: 8px;
  border-radius: 12px;
  margin-top: 6px;
  border: 1px solid #e3eee6;
}

.hidden {
  display: none;
}

#status {
  text-align: center;
  color: #b00020;
  font-size: 13px;
  font-weight: 900;
  margin: 10px 0;
}

@keyframes fadeUp {
  from {
    opacity: 0;
    transform: translateY(16px);
  }

  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes floatCard {
  0% { transform: translateY(0); }
  50% { transform: translateY(-4px); }
  100% { transform: translateY(0); }
}

@keyframes pulseGlow {
  0% { transform: scale(1); }
  50% { transform: scale(1.12); }
  100% { transform: scale(1); }
}
</style>
</head>

<body>
<div class="container">

  <div class="top-bar">
    <div class="back" onclick="window.location.href='customer-home.html'">← Back</div>
    <div class="refresh" onclick="loadOpenTasks()">Refresh</div>
  </div>

  <div class="hero">
    <h1>Open Tasks</h1>
    <p>Review worker quotes, accept the right worker, or decline offers that do not fit.</p>
  </div>

  <div class="summary-row">
    <div class="summary-box">
      <div class="summary-label">Open Tasks</div>
      <div class="summary-value" id="openCount">0</div>
    </div>

    <div class="summary-box">
      <div class="summary-label">Worker Interest</div>
      <div class="summary-value" id="interestCount">0</div>
    </div>
  </div>

  <p id="status"></p>

  <div id="tasksList"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseClient = window.supabase.createClient(
  "https://dbcthtjmtlumidpbucrc.supabase.co",
  "sb_publishable_3h7cO2Z8CDxZyEKDLRzvtg_1UJCLldJ"
);

function escapeHTML(value) {
  if (value === null || value === undefined) {
    return "";
  }

  return String(value)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function formatDate(value) {
  if (!value) {
    return "Not listed";
  }

  if (value === "Flexible") {
    return "Flexible";
  }

  const date = new Date(value);

  if (isNaN(date.getTime())) {
    return value;
  }

  return date.toLocaleDateString();
}

function formatStatus(status) {
  if (!status) {
    return "open";
  }

  return String(status).replaceAll("_", " ");
}

function formatMoney(value) {
  if (value === null || value === undefined || value === "") {
    return "No quote";
  }

  const numberValue = Number(value);

  if (isNaN(numberValue)) {
    return String(value);
  }

  return "$" + numberValue.toFixed(2);
}

function getQuoteAmount(app) {
  return (
    app.quote_amount ??
    app.amount ??
    app.price ??
    app.quote_price ??
    app.offer_amount ??
    app.total_amount ??
    app.quote ??
    ""
  );
}

function getStatusStep(status) {
  if (status === "accepted") return "accepted";
  if (status === "in_progress") return "in_progress";
  if (status === "completed") return "completed";
  if (status === "paid") return "paid";
  return "created";
}

function statusBar(status) {
  const current = getStatusStep(status);

  const steps = [
    { key: "created", label: "Created" },
    { key: "accepted", label: "Accepted" },
    { key: "in_progress", label: "In Progress" },
    { key: "completed", label: "Completed" },
    { key: "paid", label: "Paid" }
  ];

  const currentIndex =
    steps.findIndex(step => step.key === current);

  return `
    <div class="status-bar">
      ${steps.map((step, index) => `
        <div class="step ${index <= currentIndex ? "active" : ""}">
          <div class="dot"></div>
          ${step.label}
        </div>
      `).join("")}
    </div>
  `;
}

async function getCustomerId() {
  const { data } =
    await supabaseClient.auth.getSession();

  if (data.session && data.session.user) {
    localStorage.setItem("taskmintUserId", data.session.user.id);
    return data.session.user.id;
  }

  return localStorage.getItem("taskmintUserId");
}

function getTaskDetails(task) {
  if (task.task_details && typeof task.task_details === "object") {
    return Object.keys(task.task_details)
      .map(key => {
        const label =
          key.replaceAll("_", " ").replace(/\b\w/g, char => char.toUpperCase());

        return `${label}: ${task.task_details[key]}`;
      })
      .join("\n")
  }

  return task.description || "No details listed.";
}

async function loadOpenTasks() {
  const customerId =
    await getCustomerId();

  const tasksList =
    document.getElementById("tasksList");

  const status =
    document.getElementById("status");

  status.innerText = "";
  tasksList.innerHTML =
    `<div class="empty">Loading your open tasks...</div>`;

  if (!customerId) {
    tasksList.innerHTML =
      `<div class="empty">You must be logged in.</div>`;
    return;
  }

  const { data: tasks, error } =
    await supabaseClient
      .from("tasks")
      .select("*")
      .eq("customer_id", customerId)
      .in("status", ["open", "accepted", "in_progress"])
      .order("created_at", { ascending: false });

  if (error) {
    tasksList.innerHTML =
      `<div class="empty">${escapeHTML(error.message)}</div>`;
    return;
  }

  if (!tasks || tasks.length === 0) {
    document.getElementById("openCount").innerText = "0";
    document.getElementById("interestCount").innerText = "0";

    tasksList.innerHTML =
      `<div class="empty">No open tasks yet.</div>`;
    return;
  }

  document.getElementById("openCount").innerText =
    String(tasks.length);

  tasksList.innerHTML = "";

  let totalInterest = 0;

  for (const task of tasks) {
    const { count } =
      await supabaseClient
        .from("worker_quotes")
        .select("*", { count: "exact", head: true })
        .eq("task_id", task.id);

    totalInterest += Number(count || 0);

    const assignedWorkerId =
      task.assigned_worker_id ||
      task.assigned_worker_j ||
      "";

    const card =
      document.createElement("div");

    card.className = "task-card";

    const detailsId =
      `details-${task.id}`;

    const applicantsId =
      `applicants-${task.id}`;

    const dateDisplay =
      task.date_flexible
        ? "Flexible"
        : formatDate(task.task_date || task.date_needed);

    const arrivalCode =
      task.arrival_code || "Not generated";

    card.innerHTML = `
      <div class="task-top">
        <div>
          <div class="task-title">
            ${escapeHTML(task.category || task.title || "Task")}
          </div>

          <div class="task-sub">
            Order # TM-${String(task.id).slice(0, 8).toUpperCase()} •
            ${task.created_at ? new Date(task.created_at).toLocaleDateString() : ""}
          </div>
        </div>

        <div class="status-pill">
          ${escapeHTML(formatStatus(task.status || "open"))}
        </div>
      </div>

      <div class="compact-grid">
        <div class="info-box">
          <div class="info-label">Location</div>
          <div class="info-value">
            ${escapeHTML(task.city || "")}, ${escapeHTML(task.state || "")}
          </div>
        </div>

        <div class="info-box">
          <div class="info-label">Date Needed</div>
          <div class="info-value">
            ${escapeHTML(dateDisplay)}
          </div>
        </div>

        <div class="info-box">
          <div class="info-label">Interested</div>
          <div class="info-value">
            ${count || 0} worker${Number(count || 0) === 1 ? "" : "s"}
          </div>
        </div>

        <div class="info-box">
          <div class="info-label">Zip Code</div>
          <div class="info-value">
            ${escapeHTML(task.zip_code || "Not listed")}
          </div>
        </div>
      </div>

      <div class="details-toggle" onclick="event.stopPropagation(); toggleDetails('${detailsId}')">
        View task details
      </div>

      <div class="details-box" id="${detailsId}">
  ${
    getTaskDetails(task)
      .split("\n")
      .map(detail => `
        <div style="
          background:#ffffff;
          border:1px solid #e3eee6;
          border-radius:12px;
          padding:10px;
          margin-bottom:8px;
          line-height:1.35;
          font-size:12px;
          font-weight:700;
        ">
          ${escapeHTML(detail)}
        </div>
      `)
      .join("")
  }
</div>

      <div class="code-note">
        <div>Arrival Code</div>
        <div class="arrival-code">${escapeHTML(arrivalCode)}</div>
        Only give this code to the worker once they have arrived for the work.
      </div>

      ${statusBar(task.status)}

      <div class="action-row">
        <button class="edit-btn" onclick="event.stopPropagation(); editTask('${task.id}')">
          Edit Task
        </button>

        <button class="cancel-btn" onclick="event.stopPropagation(); cancelTask('${task.id}')">
          Cancel Task
        </button>
      </div>

      ${task.status === "in_progress" || task.status === "completed" || task.status === "paid" ? `
        <button class="dispute-btn" onclick="event.stopPropagation(); openDispute('${task.id}', '${assignedWorkerId}')">
          Open Dispute
        </button>
      ` : `
        <button class="dispute-btn" disabled onclick="event.stopPropagation();">
          Disputes unlock once work begins
        </button>
      `}

      <button class="primary-btn" onclick="event.stopPropagation(); toggleApplicants('${task.id}')">
        View Interested Workers
      </button>

      <div class="applicants" id="${applicantsId}">
        Loading applicants...
      </div>
    `;

    tasksList.appendChild(card);
  }

  document.getElementById("interestCount").innerText =
    String(totalInterest);
}

function toggleDetails(detailsId) {
  const box =
    document.getElementById(detailsId);

  if (!box) {
    return;
  }

  box.style.display =
    box.style.display === "block" ? "none" : "block";
}

function toggleWorkerDetails(detailsId) {
  const box =
    document.getElementById(detailsId);

  if (!box) {
    return;
  }

  box.style.display =
    box.style.display === "block" ? "none" : "block";
}

async function toggleApplicants(taskId) {
  const box =
    document.getElementById(`applicants-${taskId}`);

  if (!box) {
    return;
  }

  if (box.style.display === "block") {
    box.style.display = "none";
    return;
  }

  box.style.display = "block";
  box.innerHTML = "Loading interested workers...";

  const { data: applications, error } =
    await supabaseClient
      .from("worker_quotes")
      .select("*")
      .eq("task_id", taskId)
      .neq("status", "declined");

  if (error) {
    box.innerHTML =
      `<p>${escapeHTML(error.message)}</p>`;
    return;
  }

  if (!applications || applications.length === 0) {
    box.innerHTML =
      `<p>No workers have shown interest yet.</p>`;
    return;
  }

  box.innerHTML = "";

  for (const app of applications) {
    const workerId =
      app.worker_id ||
      app.user_id ||
      app.worker_user_id;

    const { data: workerProfile } =
      await supabaseClient
        .from("worker_profiles")
        .select("*")
        .eq("id", workerId)
        .maybeSingle();

    const { data: profile } =
      await supabaseClient
        .from("profiles")
        .select("*")
        .eq("id", workerId)
        .maybeSingle();

    const worker =
      Object.assign({}, profile || {}, workerProfile || {});

    const { data: reviews } =
      await supabaseClient
        .from("reviews")
        .select("*")
        .eq("reviewee_user_id", workerId);

    let rating =
      "No rating yet";

    if (reviews && reviews.length > 0) {
      const total =
        reviews.reduce((sum, review) => sum + Number(review.rating || 0), 0);

      rating =
        (total / reviews.length).toFixed(1);
    }

    const quoteAmount =
      getQuoteAmount(app);

    const quoteStatus =
      app.status || "pending";

    const workerName =
      worker.full_name ||
      worker.display_name ||
      `${worker.first_name || ""} ${worker.last_name || ""}`.trim() ||
      "Worker";

    const workerPhoto =
      worker.profile_photo_url ||
      worker.photo_url ||
      worker.avatar_url ||
      worker.image_url ||
      "taskmintlogo.png";

    const workerCard =
      document.createElement("div");

    const workerDetailsId =
      `worker-details-${taskId}-${workerId}`;

    workerCard.className =
      "worker-card";

    workerCard.innerHTML = `
      <div class="worker-summary" onclick="event.stopPropagation(); toggleWorkerDetails('${workerDetailsId}')">
        <div class="worker-header">
          <img
            src="${escapeHTML(workerPhoto)}"
            class="worker-avatar"
            onerror="this.src='taskmintlogo.png'"
          >

          <div>
            <div class="worker-name">
              ${escapeHTML(workerName)}
            </div>

            <div class="worker-rating">
              ⭐ ${escapeHTML(rating)}
            </div>
          </div>
        </div>

        <div class="quote-pill">
          ${escapeHTML(formatMoney(quoteAmount))}
        </div>
      </div>

      <div class="tap-message">
        Tap worker card to expand
      </div>

      <div class="worker-details" id="${workerDetailsId}">
        <div class="quote-info">
          <p><strong>Quote Status:</strong> ${escapeHTML(quoteStatus)}</p>
          <p><strong>Jobs Completed:</strong> ${escapeHTML(worker.total_jobs || 0)}</p>
          <p><strong>Reviews:</strong> ${reviews ? reviews.length : 0}</p>
          <p><strong>Worker Message:</strong> ${escapeHTML(app.message || "No message provided.")}</p>
        </div>

        <div class="worker-actions">
          <button class="public-profile-btn" onclick="event.stopPropagation(); viewWorkerPublicProfile('${workerId}')">
            Public Profile
          </button>

          <button class="message-btn" onclick="event.stopPropagation(); messageWorker('${workerId}', '${taskId}')">
            Message
          </button>

          <button class="accept-btn" onclick="event.stopPropagation(); acceptQuote('${taskId}', '${workerId}', '${app.id || ""}', '${quoteAmount}')">
            Accept Quote
          </button>

          <button class="decline-btn" onclick="event.stopPropagation(); declineQuote('${app.id || ""}', '${taskId}')">
            Decline Quote
          </button>
        </div>
      </div>
    `;

    box.appendChild(workerCard);
  }
}

function viewWorkerPublicProfile(workerId) {
  localStorage.setItem("selectedWorkerId", workerId);
  localStorage.setItem("selectedWorkerProfileId", workerId);
  window.location.href =
    `worker-public-profile.html?workerId=${encodeURIComponent(workerId)}`;
}

function messageWorker(workerId, taskId) {
  window.location.href =
    `message-center.html?worker_id=${workerId}&task_id=${taskId}`;
}

function openDispute(taskId, workerId) {
  window.location.href =
    `dispute-center.html?task_id=${taskId}&worker_id=${workerId || ""}`;
}

function editTask(taskId) {
  window.location.href =
    `edit-task.html?task_id=${taskId}`;
}

function acceptQuote(taskId, workerId, quoteId, quoteAmount) {
  const confirmAccept =
    confirm("Continue to payment and assign this worker if payment succeeds?");

  if (!confirmAccept) {
    return;
  }

  window.location.href =
    `customer-pay-quote.html?task_id=${encodeURIComponent(taskId)}&worker_id=${encodeURIComponent(workerId)}&quote_id=${encodeURIComponent(quoteId)}&quote_amount=${encodeURIComponent(quoteAmount || 0)}`;
}

async function declineQuote(quoteId, taskId) {
  if (!quoteId) {
    alert("This quote could not be found.");
    return;
  }

  const confirmDecline =
    confirm("Decline and remove this quote? This will remove it from your view and the worker's quote list.");

  if (!confirmDecline) {
    return;
  }

  const status =
    document.getElementById("status");

  status.style.color = "#b00020";
  status.innerText = "";

  const { error } =
    await supabaseClient
      .from("worker_quotes")
      .delete()
      .eq("id", quoteId);

  if (error) {
    status.innerText = error.message;
    return;
  }

  status.style.color = "#0b7a28";
  status.innerText = "Quote declined and removed.";

  await loadOpenTasks();
}

async function cancelTask(taskId) {
  const confirmCancel =
    confirm("Cancel this task? Workers will no longer be able to send quotes.");

  if (!confirmCancel) {
    return;
  }

  const status =
    document.getElementById("status");

  status.style.color = "#b00020";
  status.innerText = "";

  const { error } =
    await supabaseClient
      .from("tasks")
      .update({ status: "cancelled" })
      .eq("id", taskId);

  if (error) {
    status.innerText = error.message;
    return;
  }

  status.style.color = "#0b7a28";
  status.innerText = "Task cancelled.";

  await loadOpenTasks();
}

loadOpenTasks();
</script>
</body>
</html>
