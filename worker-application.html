<!DOCTYPE html>
<html>
<head>
<title>I want to accept task!</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin:0; font-family:Arial; background:#f4f4f4; padding-bottom:80px; }
.container { max-width:420px; margin:0 auto; background:white; min-height:100vh; }
.header { position:relative; text-align:center; padding:18px; font-size:20px; font-weight:bold; border-bottom:1px solid #ddd; }
.back { position:absolute; left:15px; top:14px; font-size:26px; cursor:pointer; color:green; }

.form { padding:20px; }
.input { margin-bottom:15px; }
.input label { display:block; font-size:14px; margin-bottom:5px; }
.input input, .input textarea, .input select {
width:100%; padding:10px; border:1px solid #ccc; border-radius:6px;
}

.checkbox { margin-bottom:10px; }

.btn {
width:100%; padding:14px; background:green; color:white;
border:none; border-radius:8px; font-size:16px; cursor:pointer;
}

.success { color:green; text-align:center; margin-top:15px; }
</style>
</head>

<body>

<div class="container">

<div class="header">
<span class="back" onclick="window.location.href='profile.html'">‹</span>
I want to accept task!
</div>

<div class="form">

<div class="input">
<label>Full Name</label>
<input id="full_name">
</div>

<div class="input">
<label>Email</label>
<input id="email">
</div>

<div class="input">
<label>Phone Number</label>
<input id="phone">
</div>

<div class="input">
<label>City</label>
<input id="city">
</div>

<div class="input">
<label>State</label>
<input id="state">
</div>

<div class="input">
<label>Experience</label>
<textarea id="experience"></textarea>
</div>

<div class="checkbox">
<input type="checkbox" id="transport"> Has transportation
</div>

<div class="checkbox">
<input type="checkbox" id="enterHomes"> Can enter homes
</div>

<div class="checkbox">
<input type="checkbox" id="lift"> Can lift heavy items
</div>

<button class="btn" onclick="submitApplication()">Submit Application</button>

<div class="success" id="statusMsg"></div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabaseClient = supabase.createClient(
"https://dbcthtjmtlumidpbucrc.supabase.co",
"sb_publishable_3h7cO2Z8CDxZyEKDLRzvtg_1UJCLldJ"
);

async function submitApplication() {
const user = (await supabaseClient.auth.getUser()).data.user;

if (!user) {
alert("You must be logged in");
return;
}

const { error } = await supabaseClient
.from("worker_applications")
.insert([{
user_id: user.id,
full_name: document.getElementById("full_name").value,
email: document.getElementById("email").value,
phone_number: document.getElementById("phone").value,
city: document.getElementById("city").value,
state: document.getElementById("state").value,
task_experience: document.getElementById("experience").value,
has_transportation: document.getElementById("transport").checked,
can_enter_homes: document.getElementById("enterHomes").checked,
can_lift_heavy_items: document.getElementById("lift").checked,
application_status: "pending"
}]);

if (error) {
document.getElementById("statusMsg").innerText = "Error submitting application";
} else {
document.getElementById("statusMsg").innerText = "Application submitted!";
}
}
</script>

</body>
</html>
