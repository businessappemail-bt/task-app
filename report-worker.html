<!DOCTYPE html>
<html>
<head>
<title>Report Worker - TaskMint</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial,sans-serif;background:linear-gradient(180deg,#fff2f2,#f5f5f5);color:#111;padding-bottom:30px}
.container{max-width:430px;margin:0 auto;padding:18px}
.back{color:#b00020;font-weight:900;cursor:pointer;font-size:14px;margin-bottom:14px}
.hero{background:linear-gradient(135deg,#7a0018,#b00020);color:white;border-radius:26px;padding:20px;margin-bottom:14px;box-shadow:0 12px 28px rgba(176,0,32,.2)}
.hero h1{margin:0 0 6px;font-size:28px}
.hero p{margin:0;font-size:14px;line-height:1.45;opacity:.95}
.card{background:white;border:1px solid #f0dada;border-radius:22px;padding:16px;box-shadow:0 8px 24px rgba(0,0,0,.08);margin-bottom:14px}
label{font-size:12px;font-weight:900;color:#b00020;text-transform:uppercase;display:block;margin:12px 0 6px}
select,textarea,input{width:100%;padding:13px;border-radius:15px;border:1px solid #e4cccc;font-size:15px;outline:none;background:white}
textarea{min-height:150px;resize:none}
select:focus,textarea:focus,input:focus{border-color:#b00020;box-shadow:0 0 0 4px rgba(176,0,32,.1)}
button{width:100%;border:none;border-radius:16px;padding:14px;background:#b00020;color:white;font-weight:900;font-size:15px;cursor:pointer;margin-top:14px}
.status{text-align:center;font-size:13px;font-weight:900;margin-top:10px}
.notice{background:#fff7e6;border:1px solid #ffd27a;color:#7a4b00;border-radius:16px;padding:12px;font-size:13px;line-height:1.4;font-weight:700}
</style>
</head>
<body>
<div class="container">
<div class="back" onclick="history.back()">← Back</div>

<div class="hero">
<h1>Report Worker</h1>
<p>Submit a report if a worker profile, message, quote, or interaction needs TaskMint review.</p>
</div>

<div class="notice" id="workerNotice">Loading selected worker...</div>

<div class="card">
<label>Report reason</label>
<select id="reasonType">
<option value="">Select reason</option>
<option>Unsafe behavior</option>
<option>Harassment or inappropriate message</option>
<option>Fake profile information</option>
<option>Payment concern</option>
<option>No-show or unreliable behavior</option>
<option>Fraud or scam concern</option>
<option>Other</option>
</select>

<label>Details</label>
<textarea id="details" maxlength="1500" placeholder="Explain what happened. Include dates, task details, or messages if relevant."></textarea>

<label>Related task/order number</label>
<input id="relatedTask" placeholder="Optional">

<button onclick="submitReport()">Submit Report</button>
<div id="status" class="status"></div>
</div>
</div>

<script>
const supabaseClient=window.supabase.createClient("https://dbcthtjmtlumidpbucrc.supabase.co","sb_publishable_3h7cO2Z8CDxZyEKDLRzvtg_1UJCLldJ");
let workerId="";
let currentUser=null;

function getParam(name){return new URLSearchParams(window.location.search).get(name)||""}
function workerName(worker){const first=worker.first_name||"";const last=worker.last_name||"";const lastInitial=last?last.charAt(0).toUpperCase()+".":"";return first?`${first} ${lastInitial}`.trim():(worker.full_name||worker.display_name||"this worker")}

async function loadPage(){
workerId=getParam("worker_id")||localStorage.getItem("selectedWorkerId")||"";
const{data}=await supabaseClient.auth.getUser();
currentUser=data&&data.user?data.user:null;

if(!workerId){document.getElementById("workerNotice").innerText="No worker was selected.";return}

const{data:worker}=await supabaseClient.from("worker_profiles").select("*").eq("id",workerId).maybeSingle();
document.getElementById("workerNotice").innerText=worker?`Report for ${workerName(worker)}.`:"Report for selected worker.";
}

async function submitReport(){
const status=document.getElementById("status");
status.innerText="";

if(!currentUser){status.style.color="#b00020";status.innerText="Please log in to submit a report.";return}
if(!workerId){status.style.color="#b00020";status.innerText="Worker profile is missing.";return}

const reasonType=document.getElementById("reasonType").value.trim();
const details=document.getElementById("details").value.trim();
const relatedTask=document.getElementById("relatedTask").value.trim();

if(!reasonType||details.length<10){status.style.color="#b00020";status.innerText="Select a reason and enter report details.";return}

const{error}=await supabaseClient.from("reports").insert({
reporter_id:currentUser.id,
worker_id:workerId,
reason_type:reasonType,
details:details,
related_task:relatedTask||null,
status:"open",
created_at:new Date().toISOString()
});

if(error){status.style.color="#b00020";status.innerText=error.message;return}

status.style.color="#0b7a28";
status.innerText="Report submitted.";
document.getElementById("reasonType").value="";
document.getElementById("details").value="";
document.getElementById("relatedTask").value="";
}

loadPage();
</script>
</body>
</html>
