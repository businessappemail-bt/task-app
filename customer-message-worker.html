<!DOCTYPE html>
<html>
<head>
<title>Message Worker - TaskMint</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
 
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
:root {
  --bg:      #ffffff;
  --surface: #f2f7f4;
  --surface2:#e6f4eb;
  --border:  #e2ebe5;
  --accent:  #0b7a28;
  --text:    #111111;
  --muted:   #6b7870;
  --danger:  #b00020;
}
 
body {
  margin: 0;
  font-family: 'Plus Jakarta Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  padding-bottom: 30px;
  display: flex;
  flex-direction: column;
  align-items: center;
}
 
.top-bar, .container {
  width: 100%;
  max-width: 470px;
}
 
/* ── TOP BAR ── */
.top-bar {
  position: sticky;
  top: 0;
  z-index: 40;
  background: rgba(255,255,255,0.97);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 13px 20px;
}
 
.back {
  color: var(--accent);
  font-weight: 700;
  cursor: pointer;
  font-size: 14px;
}
 
/* ── CONTAINER ── */
.container {
  padding: 20px 16px 30px;
}
 
/* ── HERO ── */
.hero {
  background: var(--accent);
  border-radius: 20px;
  padding: 22px 20px;
  margin-bottom: 14px;
  box-shadow: 0 6px 20px rgba(11,122,40,0.20);
  opacity: 0;
  animation: riseIn 0.35s 0.05s forwards;
}
 
.hero h1 {
  margin: 0 0 6px;
  font-size: 26px;
  font-weight: 800;
  color: #fff;
  line-height: 1.1;
  letter-spacing: -0.4px;
}
 
.hero p {
  margin: 0;
  font-size: 13px;
  line-height: 1.5;
  color: rgba(255,255,255,0.80);
}
 
/* ── CARD ── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 16px;
  margin-bottom: 12px;
  opacity: 0;
  animation: riseIn 0.35s 0.1s forwards;
}
 
/* ── WORKER ROW ── */
.worker-row {
  display: flex;
  gap: 14px;
  align-items: center;
}
 
.avatar {
  width: 52px;
  height: 52px;
  border-radius: 15px;
  object-fit: cover;
  background: var(--surface2);
  flex-shrink: 0;
}
 
.name {
  font-weight: 800;
  font-size: 15px;
  margin-bottom: 3px;
}
 
.sub {
  font-size: 12px;
  color: var(--muted);
  line-height: 1.35;
}
 
/* ── TEXTAREA ── */
textarea {
  width: 100%;
  min-height: 140px;
  padding: 13px 14px;
  border-radius: 13px;
  border: 1px solid var(--border);
  font-size: 14px;
  font-family: 'Plus Jakarta Sans', sans-serif;
  resize: none;
  outline: none;
  background: #fff;
  color: var(--text);
}
 
textarea:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(11,122,40,0.10);
}
 
/* ── BUTTON ── */
button {
  width: 100%;
  border: none;
  border-radius: 12px;
  padding: 13px;
  margin-top: 10px;
  background: var(--accent);
  color: #fff;
  font-weight: 700;
  font-size: 14px;
  font-family: 'Plus Jakarta Sans', sans-serif;
  cursor: pointer;
  transition: opacity 0.18s, transform 0.18s;
}
 
button:hover {
  opacity: 0.88;
  transform: translateY(-1px);
}
 
.status {
  text-align: center;
  font-size: 13px;
  font-weight: 700;
  margin-top: 10px;
  min-height: 20px;
}
 
@keyframes riseIn {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}
</style>
</head>
 
<body>
 
<!-- TOP BAR -->
<div class="top-bar">
  <div class="back" onclick="history.back()">← Back</div>
</div>
 
<div class="container">
 
  <!-- HERO -->
  <div class="hero">
    <h1>Message Worker</h1>
    <p>Send a direct message to this worker about availability, services, or a task you may want help with.</p>
  </div>
 
  <!-- WORKER CARD -->
  <div class="card">
    <div class="worker-row">
      <img
        id="workerPhoto"
        class="avatar"
        src="https://cdn-icons-png.flaticon.com/512/149/149071.png"
      >
      <div>
        <div class="name" id="workerName">Loading worker...</div>
        <div class="sub" id="workerSub">Worker profile</div>
      </div>
    </div>
  </div>
 
  <!-- MESSAGE CARD -->
  <div class="card">
    <textarea
      id="messageText"
      maxlength="1000"
      placeholder="Type your message..."
    ></textarea>
 
    <button onclick="sendMessage()">Send Message</button>
 
    <div id="status" class="status"></div>
  </div>
 
</div>
 
<script>
 
const supabaseClient =
window.supabase.createClient(
"https://dbcthtjmtlumidpbucrc.supabase.co",
"sb_publishable_3h7cO2Z8CDxZyEKDLRzvtg_1UJCLldJ"
);
 
let workerId = "";
let currentUser = null;
 
function getParam(name){
return new URLSearchParams(window.location.search).get(name) || "";
}
 
function escapeHTML(value){
return String(value || "")
.replaceAll("&","&amp;")
.replaceAll("<","&lt;")
.replaceAll(">","&gt;")
.replaceAll('"',"&quot;")
.replaceAll("'","&#039;");
}
 
function getWorkerName(worker){
 
const first =
worker.first_name || "";
 
const last =
worker.last_name || "";
 
const lastInitial =
last
? last.charAt(0).toUpperCase() + "."
: "";
 
return first
? `${first} ${lastInitial}`.trim()
: (
worker.full_name ||
worker.display_name ||
"Worker"
);
 
}
 
async function loadPage(){
 
workerId =
getParam("worker_id") ||
localStorage.getItem("selectedWorkerId") ||
"";
 
const { data } =
await supabaseClient.auth.getUser();
 
currentUser =
data && data.user
? data.user
: null;
 
if(!workerId){
 
document.getElementById("workerName").innerText =
"Worker not found";
 
return;
 
}
 
let worker = null;
 
const { data: workerById } =
await supabaseClient
.from("worker_profiles")
.select("*")
.eq("id", workerId)
.maybeSingle();
 
worker =
workerById || null;
 
if(!worker){
 
const { data: workerByAuthId } =
await supabaseClient
.from("worker_profiles")
.select("*")
.eq("auth_user_id", workerId)
.maybeSingle();
 
worker =
workerByAuthId || null;
 
}
 
if(worker){
 
workerId =
worker.id;
 
localStorage.setItem(
"selectedWorkerId",
workerId
);
 
localStorage.setItem(
"selectedWorkerProfileId",
workerId
);
 
document.getElementById("workerName").innerText =
getWorkerName(worker);
 
document.getElementById("workerSub").innerText =
worker.city ||
worker.email ||
"Worker profile";
 
document.getElementById("workerPhoto").src =
worker.profile_photo_url ||
worker.photo_url ||
worker.avatar_url ||
"https://cdn-icons-png.flaticon.com/512/149/149071.png";
 
}else{
 
document.getElementById("workerName").innerText =
"Worker not found";
 
}
 
}
 
async function sendMessage(){
 
const status =
document.getElementById("status");
 
const text =
document.getElementById("messageText").value.trim();
 
status.innerText = "";
 
if(!currentUser){
 
status.style.color = "#b00020";
 
status.innerText =
"Please log in to send a message.";
 
return;
 
}
 
if(!workerId){
 
status.style.color = "#b00020";
 
status.innerText =
"Worker profile is missing.";
 
return;
 
}
 
if(text.length < 2){
 
status.style.color = "#b00020";
 
status.innerText =
"Enter a message.";
 
return;
 
}
 
status.style.color = "#666";
 
status.innerText =
"Sending...";
 
try{
 
let conversation = null;
 
const { data: existingConversation } =
await supabaseClient
.from("task_conversations")
.select("*")
.eq("customer_id", currentUser.id)
.eq("worker_id", workerId)
.is("task_id", null)
.is("quote_request_id", null)
.maybeSingle();
 
if(existingConversation){
 
conversation =
existingConversation;
 
}else{
 
const {
data: newConversation,
error: conversationError
} =
await supabaseClient
.from("task_conversations")
.insert({
customer_id: currentUser.id,
worker_id: workerId,
task_id: null,
quote_request_id: null,
conversation_type: "direct_message",
customer_unread_count: 0,
updated_at: new Date().toISOString()
})
.select()
.single();
 
if(conversationError){
 
status.style.color = "#b00020";
 
status.innerText =
conversationError.message;
 
return;
 
}
 
conversation =
newConversation;
 
}
 
const {
error: messageError
} =
await supabaseClient
.from("task_messages")
.insert({
conversation_id: conversation.id,
task_id: null,
customer_id: currentUser.id,
worker_id: workerId,
receiver_id: workerId,
sender_id: currentUser.id,
sender_type: "customer",
message: text,
is_read: false,
created_at: new Date().toISOString()
});
 
if(messageError){
 
status.style.color = "#b00020";
 
status.innerText =
messageError.message;
 
return;
 
}
 
await supabaseClient
.from("task_conversations")
.update({
customer_unread_count:
Number(conversation.customer_unread_count || 0),
updated_at: new Date().toISOString()
})
.eq("id", conversation.id);
 
localStorage.setItem(
"selectedConversationId",
conversation.id
);
 
status.style.color = "#0b7a28";
 
status.innerText =
"Message sent.";
 
document.getElementById("messageText").value = "";
 
}catch(error){
 
console.error(error);
 
status.style.color = "#b00020";
 
status.innerText =
error.message || "Unable to send message.";
 
}
 
}
 
loadPage();
 
</script>
 
</body>
</html>
