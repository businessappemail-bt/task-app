<!DOCTYPE html>
<html>
<head>
<title>Customer Notifications - TaskMint</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #ffffff;
  --surface: #f2f7f4;
  --surface2:#e6f4eb;
  --border:  #e2ebe5;
  --accent:  #0b7a28;
  --text:    #111111;
  --muted:   #6b7870;
  --danger:  #b00020;
}

body {
  margin: 0;
  font-family: 'Plus Jakarta Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  padding-bottom: 90px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.top-bar, .container {
  width: 100%;
  max-width: 470px;
}

/* ── TOP BAR ── */
.top-bar {
  position: sticky;
  top: 0;
  z-index: 40;
  background: rgba(255,255,255,0.97);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 13px 20px;
}

.back {
  color: var(--accent);
  font-weight: 700;
  cursor: pointer;
  font-size: 14px;
}

/* ── CONTAINER ── */
.container {
  padding: 20px 16px 30px;
}

/* ── HERO ── */
.header-card {
  background: var(--accent);
  border-radius: 20px;
  padding: 22px 20px;
  margin-bottom: 16px;
  box-shadow: 0 6px 20px rgba(11,122,40,0.20);
  opacity: 0;
  animation: riseIn 0.35s 0.05s forwards;
}

.header-card h1 {
  margin: 0 0 6px;
  font-size: 26px;
  font-weight: 800;
  color: #fff;
  line-height: 1.1;
  letter-spacing: -0.4px;
}

.header-card p {
  margin: 0;
  font-size: 13px;
  line-height: 1.5;
  color: rgba(255,255,255,0.80);
}

/* ── SUMMARY GRID ── */
.summary-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 14px;
  opacity: 0;
  animation: riseIn 0.35s 0.1s forwards;
}

.summary-card {
  background: var(--surface);
  border-radius: 18px;
  padding: 16px;
  border: 1px solid var(--border);
}

.summary-icon {
  width: 40px;
  height: 40px;
  border-radius: 13px;
  background: var(--surface2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  margin-bottom: 10px;
}

.summary-number {
  font-size: 32px;
  font-weight: 800;
  color: var(--text);
  line-height: 1;
}

.summary-label {
  margin-top: 6px;
  color: var(--muted);
  font-size: 12px;
  font-weight: 600;
}

/* ── NOTICE CARD ── */
.notice-card {
  background: var(--surface);
  border-radius: 18px;
  padding: 16px;
  border: 1px solid var(--border);
  margin-bottom: 14px;
  opacity: 0;
  animation: riseIn 0.35s 0.15s forwards;
}

.notice-title {
  font-size: 15px;
  font-weight: 800;
  margin-bottom: 6px;
}

.notice-text {
  color: var(--muted);
  font-size: 13px;
  line-height: 1.5;
}

/* ── QUICK ACTIONS ── */
.quick-actions {
  display: grid;
  gap: 10px;
  opacity: 0;
  animation: riseIn 0.35s 0.2s forwards;
}

.action-btn {
  width: 100%;
  padding: 13px;
  border: none;
  border-radius: 12px;
  font-size: 13.5px;
  font-weight: 700;
  cursor: pointer;
  font-family: 'Plus Jakarta Sans', sans-serif;
  transition: opacity 0.18s, transform 0.18s;
}

.action-btn:hover {
  opacity: 0.88;
  transform: translateY(-1px);
}

.message-btn {
  background: var(--accent);
  color: #fff;
}

.quote-btn {
  background: var(--text);
  color: #fff;
}

.status {
  text-align: center;
  margin-top: 12px;
  color: var(--accent);
  font-size: 13px;
  font-weight: 700;
}

.error {
  color: var(--danger);
}

/* ── NAV ── */
.nav {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 470px;
  background: rgba(255,255,255,0.97);
  backdrop-filter: blur(16px);
  border-top: 1px solid var(--border);
  box-shadow: 0 -3px 16px rgba(0,0,0,0.06);
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  padding: 10px 6px 14px;
  z-index: 50;
}

.nav a {
  text-decoration: none;
  color: var(--muted);
  font-size: 10px;
  font-weight: 600;
  text-align: center;
  transition: color 0.18s;
}

.nav a:hover { color: var(--accent); }

.nav-icon {
  display: block;
  font-size: 20px;
  margin-bottom: 3px;
}

.active { color: var(--accent) !important; }

@keyframes riseIn {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="top-bar">
  <div class="back" onclick="goBack()">← Back</div>
</div>

<div class="container">

  <!-- HERO -->
  <div class="header-card">
    <h1>Notifications</h1>
    <p>See how many new messages and quotes are waiting for you.</p>
  </div>

  <!-- SUMMARY -->
  <div class="summary-grid">
    <div class="summary-card">
      <div class="summary-icon">💬</div>
      <div class="summary-number" id="messageCount">0</div>
      <div class="summary-label">New Messages</div>
    </div>

    <div class="summary-card">
      <div class="summary-icon">💸</div>
      <div class="summary-number" id="quoteCount">0</div>
      <div class="summary-label">New Quotes</div>
    </div>
  </div>

  <!-- NOTICE -->
  <div class="notice-card">
    <div class="notice-title" id="noticeTitle">Checking updates...</div>
    <div class="notice-text" id="noticeText">
      TaskMint is checking your unread messages and new quotes.
    </div>
  </div>

  <!-- ACTIONS -->
  <div class="quick-actions">
    <button class="action-btn message-btn" onclick="goToPage('message-center.html')">
      View Messages
    </button>

    <button class="action-btn quote-btn" onclick="goToPage('view-open-task.html')">
      View Quotes
    </button>
  </div>

  <div id="status" class="status"></div>

</div>

<!-- NAV -->
<div class="nav">
  <a href="customer-home.html"><span class="nav-icon">🏠</span>Home</a>
  <a href="view-open-task.html"><span class="nav-icon">📌</span>Tasks</a>
  <a href="browse-workers.html"><span class="nav-icon">👷</span>Workers</a>
  <a href="message-center.html"><span class="nav-icon">💬</span>Messages</a>
  <a href="profile.html" class="active"><span class="nav-icon">👤</span>Profile</a>
</div>

<script>
const supabaseClient = window.supabase.createClient(
  "https://dbcthtjmtlumidpbucrc.supabase.co",
  "sb_publishable_3h7cO2Z8CDxZyEKDLRzvtg_1UJCLldJ"
);

let currentUserId = "";

function goBack() {
  if (window.history.length > 1) {
    window.history.back();
  } else {
    window.location.href = "customer-home.html";
  }
}

function goToPage(page) {
  window.location.href = page;
}

async function getCurrentUser() {
  const { data } =
    await supabaseClient.auth.getSession();

  if (data.session && data.session.user) {
    currentUserId =
      data.session.user.id;

    localStorage.setItem("taskmintUserId", currentUserId);
    return data.session.user;
  }

  const savedUserId =
    localStorage.getItem("taskmintUserId");

  if (savedUserId) {
    currentUserId =
      savedUserId;

    return { id: savedUserId };
  }

  window.location.href = "login.html";
  return null;
}

async function countRows(tableName, filters) {
  let query =
    supabaseClient
      .from(tableName)
      .select("id", {
        count: "exact",
        head: true
      });

  filters.forEach(function(filter) {
    if (filter.type === "eq") {
      query =
        query.eq(filter.column, filter.value);
    }

    if (filter.type === "in") {
      query =
        query.in(filter.column, filter.value);
    }
  });

  const { count, error } =
    await query;

  if (error) {
    return null;
  }

  return count || 0;
}

async function getFirstWorkingCount(options) {
  for (const option of options) {
    const result =
      await countRows(option.table, option.filters);

    if (result !== null) {
      return result;
    }
  }

  return 0;
}

function getHiddenConversationIds() {
  try {
    return JSON.parse(localStorage.getItem("taskmintHiddenConversations") || "[]");
  } catch (error) {
    return [];
  }
}

function isConversationHidden(conversationIdValue) {
  return getHiddenConversationIds().includes(conversationIdValue);
}

async function getVisibleConversationIdsForCustomer() {
  const { data: conversations, error } =
    await supabaseClient
      .from("task_conversations")
      .select("id, worker_id")
      .or(`customer_id.eq.${currentUserId},worker_id.eq.${currentUserId}`);

  if (error || !conversations) {
    return [];
  }

  const { data: blockedWorkers } =
    await supabaseClient
      .from("blocked_users")
      .select("worker_id")
      .eq("customer_id", currentUserId);

  const blockedWorkerIds =
    (blockedWorkers || [])
      .map(block => String(block.worker_id || ""))
      .filter(Boolean);

  return conversations
    .filter(convo =>
      !blockedWorkerIds.includes(String(convo.worker_id || "")) &&
      !isConversationHidden(convo.id)
    )
    .map(convo => convo.id)
    .filter(Boolean);
}

async function getVisibleUnreadMessageCount() {
  const visibleConversationIds =
    await getVisibleConversationIdsForCustomer();

  if (!visibleConversationIds.length) {
    return 0;
  }

  const { count, error } =
    await supabaseClient
      .from("task_messages")
      .select("id", {
        count: "exact",
        head: true
      })
      .eq("receiver_id", currentUserId)
      .eq("is_read", false)
      .in("conversation_id", visibleConversationIds);

  if (error) {
    return 0;
  }

  return count || 0;
}

async function loadNotifications() {
  const user =
    await getCurrentUser();

  if (!user) {
    return;
  }

  const status =
    document.getElementById("status");

  status.className = "status";
  status.innerText = "Loading notifications...";

  let messageCount = 0;
  let quoteCount = 0;

  messageCount =
    await getVisibleUnreadMessageCount();

  const { count: workerQuoteCount } =
    await supabaseClient
      .from("worker_quotes")
      .select("id", {
        count: "exact",
        head: true
      })
      .eq("customer_id", currentUserId)
      .in("status", [
        "pending",
        "sent",
        "new"
      ]);

  if (workerQuoteCount) {
    quoteCount += workerQuoteCount;
  }

  document.getElementById("messageCount").innerText =
    messageCount;

  document.getElementById("quoteCount").innerText =
    quoteCount;

  const total =
    messageCount + quoteCount;

  if (total > 0) {
    document.getElementById("noticeTitle").innerText =
      "You have new activity";

    document.getElementById("noticeText").innerText =
      "You have " + messageCount + " new messages and " + quoteCount + " new quotes.";
  } else {
    document.getElementById("noticeTitle").innerText =
      "No new activity";

    document.getElementById("noticeText").innerText =
      "You do not have any new messages or quotes right now.";
  }

  status.innerText =
    "Updated just now.";
}

window.addEventListener("pageshow", function() {
  loadNotifications();
});

loadNotifications();
</script>

</body>
</html>
