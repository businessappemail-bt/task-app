<style>

<script>
const supabaseClient = window.supabase.createClient(
  "https://dbcthtjmtlumidpbucrc.supabase.co",
  "sb_publishable_3h7cO2Z8CDxZyEKDLRzvtg_1UJCLldJ"
);

const DEFAULT_WORKER_PHOTO =
  "https://github.com/businessappemail-bt/task-app/blob/main/taskmintlogo.png?raw=true";

function escapeHTML(value) {
  if (value === null || value === undefined) {
    return "";
  }

  return String(value)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function formatDate(value) {
  if (!value) {
    return "Not listed";
  }

  const rawValue =
    String(value).trim();

  const dateMatch =
    rawValue.match(/^(\d{4})-(\d{2})-(\d{2})/);

  if (dateMatch) {
    const [, year, month, day] =
      dateMatch;

    return `${Number(month)}/${Number(day)}/${year}`;
  }

  const date = new Date(rawValue);

  if (Number.isNaN(date.getTime())) {
    return value;
  }

  return `${date.getMonth() + 1}/${date.getDate()}/${date.getFullYear()}`;
}

function formatMoney(value) {
  if (value === null || value === undefined || value === "") {
    return "$0.00";
  }

  const numberValue = Number(value);

  if (Number.isNaN(numberValue)) {
    return String(value);
  }

  return "$" + numberValue.toFixed(2);
}

function formatStatus(value) {
  return String(value || "closed").replaceAll("_", " ");
}

function getCustomerIdFromSession() {
  return supabaseClient.auth.getSession()
    .then(({ data }) => {
      if (data.session && data.session.user) {
        localStorage.setItem("taskmintUserId", data.session.user.id);
        return data.session.user.id;
      }

      return localStorage.getItem("taskmintUserId");
    });
}

async function getAuthenticatedCustomerId() {
  const { data, error } =
    await supabaseClient.auth.getUser();

  if (error || !data || !data.user) {
    return "";
  }

  return data.user.id;
}

function getFirstAvailable(record, keys, fallback = "") {
  if (!record) {
    return fallback;
  }

  for (const key of keys) {
    if (
      record[key] !== null &&
      record[key] !== undefined &&
      String(record[key]).trim() !== ""
    ) {
      return record[key];
    }
  }

  return fallback;
}

function getTaskTitle(task) {
  return getFirstAvailable(task, [
    "title",
    "task_title",
    "category",
    "service_type"
  ], "Task");
}

function getTaskCategory(task) {
  return getFirstAvailable(task, [
    "category",
    "task_category",
    "service_type"
  ], "Other");
}

function getTaskDate(task) {
  return getFirstAvailable(task, [
    "task_date",
    "date_needed",
    "needed_by",
    "scheduled_date",
    "scheduled_start"
  ], "");
}

function getDaysUntilTask(task) {
  const dateValue =
    getTaskDate(task);

  if (!dateValue) {
    return null;
  }

  const taskDate =
    new Date(dateValue);

  if (Number.isNaN(taskDate.getTime())) {
    return null;
  }

  const today =
    new Date();

  today.setHours(0, 0, 0, 0);
  taskDate.setHours(0, 0, 0, 0);

  return Math.ceil((taskDate.getTime() - today.getTime()) / (1000 * 60 * 60 * 24));
}

function canShowFullAddress(task) {
  const daysUntil =
    getDaysUntilTask(task);

  return daysUntil !== null && daysUntil <= 7;
}

function getTaskLocation(task) {
  const address =
    getFirstAvailable(task, [
      "address",
      "full_address",
      "task_address",
      "street_address"
    ], "");

  const city =
    getFirstAvailable(task, [
      "city",
      "task_city"
    ], "");

  const state =
    getFirstAvailable(task, [
      "state",
      "task_state"
    ], "");

  const zip =
    getFirstAvailable(task, [
      "zip_code",
      "zip"
    ], "");

  const generalLocation =
    `${city}${state ? ", " + state : ""}`.trim() || "Location not listed";

  if (!canShowFullAddress(task)) {
    return `${generalLocation} — full address unlocks 7 days before the scheduled task date.`;
  }

  if (address) {
    return `${address}${city ? ", " + city : ""}${state ? ", " + state : ""}${zip ? " " + zip : ""}`;
  }

  return `${city}${state ? ", " + state : ""}${zip ? " " + zip : ""}`.trim() || "Location not listed";
}

function getTaskDetails(task) {
  if (task.task_details && typeof task.task_details === "object") {
    return Object.keys(task.task_details)
      .map(key => {
        const label =
          key.replaceAll("_", " ").replace(/\b\w/g, char => char.toUpperCase());

        const value =
          Array.isArray(task.task_details[key])
            ? task.task_details[key].join(", ")
            : task.task_details[key];

        return `${label}: ${value || "Not answered"}`;
      })
      .join("\n");
  }

  return task.description || task.additional_notes || task.notes || "No task details listed.";
}

function getWorkerId(task) {
  return (
    task.assigned_worker_id ||
    task.accepted_worker_id ||
    task.worker_id ||
    task.completed_by_worker_id ||
    ""
  );
}

function getQuoteId(task) {
  return (
    task.accepted_quote_id ||
    task.paid_quote_id ||
    task.selected_quote_id ||
    task.quote_id ||
    ""
  );
}

function getAmountPaid(task, quote, payment) {
  return (
    payment?.amount ||
    payment?.amount_paid ||
    payment?.quote_amount ||
    task.amount_paid ||
    task.total_paid ||
    task.quote_amount ||
    quote?.quote_amount ||
    quote?.amount ||
    quote?.price ||
    0
  );
}

function parseTaskDateLocal(value) {
  if (!value) {
    return null;
  }

  const rawValue =
    String(value).trim();

  const dateMatch =
    rawValue.match(/^(\d{4})-(\d{2})-(\d{2})/);

  if (!dateMatch) {
    return null;
  }

  return new Date(
    Number(dateMatch[1]),
    Number(dateMatch[2]) - 1,
    Number(dateMatch[3]),
    0,
    0,
    0,
    0
  );
}

function getCancellationFeeDetails(task, amountPaid, workerId) {
  if (!workerId) {
    return {
      percent: 0,
      feeAmount: 0,
      refundAmount: Number(amountPaid || 0),
      message: "No worker is assigned to this task. There is no cancellation fee."
    };
  }

  const taskDate =
    parseTaskDateLocal(getTaskDate(task));

  if (!taskDate) {
    return {
      percent: 0,
      feeAmount: 0,
      refundAmount: Number(amountPaid || 0),
      message: "No scheduled task date was found. There is no cancellation fee."
    };
  }

  const today =
    new Date();

  const todayLocal =
    new Date(
      today.getFullYear(),
      today.getMonth(),
      today.getDate(),
      0,
      0,
      0,
      0
    );

  const millisecondsPerDay =
    24 * 60 * 60 * 1000;

  const daysUntilTask =
    Math.ceil(
      (taskDate.getTime() - todayLocal.getTime()) / millisecondsPerDay
    );

  let percent = 0;
  let message = "Cancel 7+ days before the scheduled task: no cancellation fee.";

  if (daysUntilTask >= 7) {
    percent = 0;
    message = "Cancel 7+ days before the scheduled task: no cancellation fee.";
  } else if (daysUntilTask >= 3 && daysUntilTask < 7) {
    percent = 10;
    message = "Cancel 3-7 days before the scheduled task: 10% cancellation fee.";
  } else if (daysUntilTask >= 1 && daysUntilTask < 3) {
    percent = 20;
    message = "Cancel 24-72 hours before the scheduled task: 20% cancellation fee.";
  } else {
    percent = 30;
    message = "Same day cancellations: 30% cancellation fee.";
  }

  const paidAmount =
    Number(amountPaid || 0);

  const feeAmount =
    Number((paidAmount * (percent / 100)).toFixed(2));

  const refundAmount =
    Number(Math.max(paidAmount - feeAmount, 0).toFixed(2));

  return {
    percent,
    feeAmount,
    refundAmount,
    message
  };
}


function getPaymentStatus(task, quote, payment) {
  return (
    payment?.payment_status ||
    payment?.status ||
    task.payment_status ||
    task.quote_payment_status ||
    task.escrow_status ||
    quote?.payment_status ||
    quote?.status ||
    "Not listed"
  );
}

function isPaymentCompleted(task, quote, payment) {
  const status =
    String(getPaymentStatus(task, quote, payment)).toLowerCase();

  return (
    status === "paid" ||
    status === "completed" ||
    status === "released" ||
    status === "escrowed" ||
    status === "held" ||
    status === "succeeded"
  );
}

function isAcceptedActiveTask(task) {
  const status =
    String(task.status || "").toLowerCase();

  return [
    "accepted",
    "scheduled",
    "in_progress",
    "worker_completed",
    "dispute_open",
    "dispute_closed"
  ].includes(status);
}

function isDisputeOpen(task) {
  const status =
    String(task.status || "").toLowerCase();

  const disputeStatus =
    String(task.dispute_status || "").toLowerCase();

  return (
    status === "dispute_open" ||
    disputeStatus === "open" ||
    disputeStatus === "reviewing"
  );
}

function getLiveTaskStatus(task, quote, assignment, paymentCompleted) {
  if (isDisputeOpen(task)) {
    return "Dispute Open";
  }

  const taskStatus =
    String(task.status || "").toLowerCase();

  const quoteStatus =
    String(quote?.status || "").toLowerCase();

  const assignmentStatus =
    String(assignment?.assignment_status || "").toLowerCase();

  if (
    taskStatus === "completed" ||
    taskStatus === "customer_completed" ||
    quoteStatus === "completed" ||
    quoteStatus === "customer_completed"
  ) {
    return "Completed";
  }

  if (
    taskStatus === "worker_completed" ||
    quoteStatus === "worker_completed"
  ) {
    return "Worker Completed";
  }

  if (
    taskStatus === "in_progress" ||
    quoteStatus === "in_progress" ||
    assignmentStatus === "in_progress" ||
    assignment?.arrival_verified === true ||
    task.worker_arrival_confirmed === true ||
    task.arrival_verified === true
  ) {
    return "In Progress";
  }

  if (taskStatus === "closed" || taskStatus === "resolved" || taskStatus === "dispute_closed") {
    return "Closed";
  }

  if (
    taskStatus === "accepted" ||
    taskStatus === "scheduled" ||
    quoteStatus === "accepted" ||
    paymentCompleted
  ) {
    return "Accepted";
  }

  return "Accepted";
}

function getStatusPillClass(statusText) {
  const status =
    String(statusText || "").toLowerCase();

  if (status.includes("dispute")) {
    return "dispute";
  }

  if (status === "completed" || status === "closed") {
    return "closed";
  }

  return "";
}

function getProgressIndex(statusText) {
  const status =
    String(statusText || "").toLowerCase();

  if (status === "completed" || status === "closed") {
    return 4;
  }

  if (status === "worker completed") {
    return 3;
  }

  if (status === "in progress") {
    return 2;
  }

  return 1;
}

function renderProgressTracker(statusText) {
  const progressIndex =
    getProgressIndex(statusText);

  const steps = [
    "Accepted",
    "In Progress",
    "Worker Done",
    "Completed"
  ];

  return `
    <div class="progress-box">
      <div class="progress-title">Task Progress</div>
      <div class="progress-steps">
        ${steps.map((step, index) => {
          const active = index + 1 <= progressIndex;

          return `
            <div class="progress-step ${active ? "active" : ""}">
              <div class="progress-dot">${active ? "✓" : ""}</div>
              ${step}
            </div>
          `;
        }).join("")}
      </div>
    </div>
  `;
}

function getArrivalCode(assignment, task) {
  return (
    assignment?.arrival_code ||
    task.arrival_code ||
    task.customer_arrival_code ||
    ""
  );
}

function renderArrivalCodeBox(arrivalCode, statusText) {
  const status =
    String(statusText || "").toLowerCase();

  if (
    !arrivalCode ||
    status === "closed" ||
    status === "completed" ||
    status === "worker completed"
  ) {
    return "";
  }

  return `
    <div class="arrival-code-box">
      Arrival Code
      <div class="arrival-code">${escapeHTML(arrivalCode)}</div>
      <div style="font-size:12px;font-weight:700;margin-top:6px;">
        Give this code to the worker when they arrive so the task can move to In Progress.
      </div>
    </div>
  `;
}

function renderCustomerCompletionButton(task, quote, assignment, statusText, workerId) {
  const status =
    String(statusText || "").toLowerCase();

  if (status === "completed") {
    return `
      <div class="complete-note">
        You marked this task complete. This task will move to your past tasks.
      </div>
    `;
  }

  if (status === "closed" || status.includes("dispute")) {
    return "";
  }

  if (status === "in progress") {
    return `
      <div class="complete-note">
        The worker has started this task. The customer completion button unlocks after the worker marks the task complete.
      </div>
    `;
  }

  if (status !== "worker completed") {
    return "";
  }

  return `
    <div class="rating-review-box">
      <div class="rating-review-title">
        Rate the worker before completing this task
      </div>

      <div class="rating-review-help">
        A rating is required. A written review is optional.
      </div>

      <select class="rating-select" id="rating-${escapeHTML(task.id)}">
        <option value="">Select rating</option>
        <option value="5">★★★★★ 5 - Excellent</option>
        <option value="4">★★★★☆ 4 - Good</option>
        <option value="3">★★★☆☆ 3 - Okay</option>
        <option value="2">★★☆☆☆ 2 - Poor</option>
        <option value="1">★☆☆☆☆ 1 - Bad</option>
      </select>

      <textarea
        class="review-textarea"
        id="review-${escapeHTML(task.id)}"
        placeholder="Optional: leave a review about the worker">
      </textarea>

      <button
        class="complete-btn"
        onclick="markTaskComplete('${escapeHTML(task.source_type)}', '${escapeHTML(task.id)}', '${escapeHTML(quote?.id || getQuoteId(task) || "")}', '${escapeHTML(assignment?.id || "")}', '${escapeHTML(workerId || getWorkerId(task) || "")}')">
        Submit Rating & Confirm Task Complete
      </button>
    </div>
  `;
}

function getWorkerName(worker, quote, task) {
  const direct =
    quote?.worker_display_name ||
    task.worker_display_name ||
    worker?.display_name ||
    worker?.full_name;

  if (direct) {
    return direct;
  }

  const first =
    worker?.first_name ||
    "";

  const last =
    worker?.last_name ||
    "";

  const lastInitial =
    last ? last.charAt(0).toUpperCase() + "." : "";

  return first ? `${first} ${lastInitial}`.trim() : "Worker";
}

function getWorkerPhoto(worker) {
  return (
    worker?.profile_photo_url ||
    worker?.photo_url ||
    worker?.avatar_url ||
    worker?.image_url ||
    DEFAULT_WORKER_PHOTO
  );
}

async function fetchSingleById(table, id) {
  if (!id) {
    return null;
  }

  const { data, error } =
    await supabaseClient
      .from(table)
      .select("*")
      .eq("id", id)
      .maybeSingle();

  if (error || !data) {
    return null;
  }

  return data;
}

async function fetchWorker(workerId) {
  if (!workerId) {
    return null;
  }

  const { data: workerRecord } =
    await supabaseClient
      .from("worker_profiles")
      .select("*")
      .eq("id", workerId)
      .maybeSingle();

  if (workerRecord) {
    return workerRecord;
  }

  const { data: workerProfile } =
    await supabaseClient
      .from("worker_profiles")
      .select("*")
      .eq("id", workerId)
      .maybeSingle();

  return workerProfile || null;
}

async function fetchQuote(quoteId, taskId) {
  if (quoteId) {
    const foundById =
      await fetchSingleById("worker_quotes", quoteId);

    if (foundById) {
      return foundById;
    }
  }

  if (!taskId) {
    return null;
  }

  const { data } =
    await supabaseClient
      .from("worker_quotes")
      .select("*")
      .eq("task_id", taskId)
      .in("status", ["accepted", "in_progress", "worker_completed", "completed", "paid"])
      .order("created_at", { ascending: false })
      .limit(1)
      .maybeSingle();

  return data || null;
}

async function fetchPayment(taskId, quoteId) {
  let query =
    supabaseClient
      .from("payments")
      .select("*")
      .order("created_at", { ascending: false })
      .limit(1);

  if (quoteId) {
    query = query.eq("quote_id", quoteId);
  } else if (taskId) {
    query = query.eq("task_id", taskId);
  }

  const { data } =
    await query.maybeSingle();

  return data || null;
}

async function fetchAssignment(taskId, workerId) {
  if (!taskId) {
    return null;
  }

  let query =
    supabaseClient
      .from("task_assignments")
      .select("*")
      .eq("task_id", taskId)
      .order("created_at", { ascending: false })
      .limit(1);

  if (workerId) {
    query = query.or(`worker_id.eq.${workerId},worker_user_id.eq.${workerId}`);
  }

  const { data } =
    await query.maybeSingle();

  return data || null;
}

function toggleDetails(id) {
  const box =
    document.getElementById(id);

  if (!box) {
    return;
  }

  box.classList.toggle("open");
}

async function markTaskComplete(sourceType, taskId, quoteId, assignmentId, workerId) {
  const confirmed =
    confirm("Confirm this task is complete? Only do this after the worker has finished the work.");

  if (!confirmed) {
    return;
  }

  const ratingInput =
    document.getElementById(`rating-${taskId}`);

  const reviewInput =
    document.getElementById(`review-${taskId}`);

  const rating =
    ratingInput ? ratingInput.value : "";

  const reviewText =
    reviewInput ? reviewInput.value.trim() : "";

  if (!rating) {
    alert("Please rate the worker before marking the task complete.");
    return;
  }

  const customerId =
    await getAuthenticatedCustomerId();

  if (!customerId) {
    alert("Your session expired. Please log in again before submitting a rating.");
    return;
  }

  const reviewPayload =
    {
      task_id: taskId,
      customer_id: customerId,
      worker_id: workerId,
      rating: Number(rating),
      review_text: reviewText || null,
      comment: reviewText || null
    };

  const { error: reviewError } =
    await supabaseClient
      .from("reviews")
      .insert(reviewPayload);

  if (reviewError) {
    alert(reviewError.message);
    return;
  }

  const status =
    document.getElementById("status");

  if (status) {
    status.innerText = "Updating task status...";
  }

  const taskTable =
    sourceType === "direct_quote"
      ? "direct_task_requests"
      : "tasks";

  const completedAt =
    new Date().toISOString();

  const { error: taskError } =
    await supabaseClient
      .from(taskTable)
      .update({
        status: "completed",
        customer_completed: true,
        customer_completed_at: completedAt,
        completed_at: completedAt,
        updated_at: completedAt
      })
      .eq("id", taskId);

  if (taskError) {
    if (status) {
      status.innerText = taskError.message;
    }
    alert(taskError.message);
    return;
  }

  let quoteUpdateError = null;

  if (quoteId) {
    const { error } =
      await supabaseClient
        .from("worker_quotes")
        .update({
          status: "completed",
          customer_completed_at: completedAt,
          completed_at: completedAt,
          updated_at: completedAt
        })
        .eq("id", quoteId);

    quoteUpdateError = error;
  }

  if (!quoteId || quoteUpdateError) {
    const { error } =
      await supabaseClient
        .from("worker_quotes")
        .update({
          status: "completed",
          customer_completed_at: completedAt,
          completed_at: completedAt,
          updated_at: completedAt
        })
        .eq("task_id", taskId)
        .in("status", ["accepted", "in_progress", "worker_completed"]);

    quoteUpdateError = error;
  }

  if (quoteUpdateError) {
    if (status) {
      status.innerText = quoteUpdateError.message;
    }
    alert(quoteUpdateError.message);
    return;
  }

  if (assignmentId) {
    await supabaseClient
      .from("task_assignments")
      .update({
        assignment_status: "completed",
        customer_completed_at: completedAt,
        completed_at: completedAt
      })
      .eq("id", assignmentId);
  } else {
    await supabaseClient
      .from("task_assignments")
      .update({
        assignment_status: "completed",
        customer_completed_at: completedAt,
        completed_at: completedAt
      })
      .eq("task_id", taskId);
  }

  if (status) {
    status.innerText = "";
  }

  alert("Task marked complete. It will now move to past tasks.");
  
async function cancelAcceptedTask(taskId, sourceType) {
  const tableName =
    sourceType === "direct_quote"
      ? "direct_task_requests"
      : "tasks";

  const { data: task, error: taskError } =
    await supabaseClient
      .from(tableName)
      .select("*")
      .eq("id", taskId)
      .maybeSingle();

  if (taskError || !task) {
    alert(taskError ? taskError.message : "Task could not be found.");
    return;
  }

  const quoteId =
    getQuoteId(task);

  const quote =
    await fetchQuote(quoteId, task.id);

  const workerId =
    getWorkerId(task) ||
    quote?.worker_id ||
    "";

  const amountPaid =
    Number(getAmountPaid(task, quote, null) || 0);

  const feeDetails =
    getCancellationFeeDetails(task, amountPaid, workerId);

  const confirmationMessage =
    `${feeDetails.message}

Amount paid: ${formatMoney(amountPaid)}
Cancellation fee: ${formatMoney(feeDetails.feeAmount)}
Refund amount: ${formatMoney(feeDetails.refundAmount)}

Click OK to confirm you understand and want to cancel this task.`;

  const understood =
    confirm(confirmationMessage);

  if (!understood) {
    return;
  }

  const updatePayload =
    sourceType === "direct_quote"
      ? {
          status: "cancelled",
          payment_status: "refund_pending"
        }
      : {
          status: "cancelled",
          payment_status: "refund_pending",
          escrow_status: "refund_pending",
          cancellation_fee: feeDetails.feeAmount,
          refund_amount: feeDetails.refundAmount
        };

  const { error: updateError } =
    await supabaseClient
      .from(tableName)
      .update(updatePayload)
      .eq("id", taskId);

  if (updateError) {
    alert(updateError.message);
    return;
  }

  if (sourceType !== "direct_quote") {
    const { error: refundRecordError } =
      await supabaseClient.rpc(
        "create_cancellation_refund_record",
        {
          p_task_id: taskId
        }
      );

    if (refundRecordError) {
      alert(refundRecordError.message);
      return;
    }
  }

  alert(
    feeDetails.percent > 0
      ? `Task cancelled. Cancellation fee: ${formatMoney(feeDetails.feeAmount)}. Refund processing has started.`
      : "Task cancelled. No cancellation fee was charged. Refund processing has started."
  );

  loadAcceptedQuotes();
}


loadAcceptedQuotes();
}

async function loadAcceptedQuotes() {
  const customerId =
    await getCustomerIdFromSession();

  const list =
    document.getElementById("acceptedList");

  const status =
    document.getElementById("status");

  status.innerText = "";
  list.innerHTML =
    `<div class="empty">Loading accepted quotes...</div>`;

  if (!customerId) {
    list.innerHTML =
      `<div class="empty">You must be logged in.</div>`;
    return;
  }

  const { data: marketplaceTasks, error: taskError } =
    await supabaseClient
      .from("tasks")
      .select("*")
      .eq("customer_id", customerId)
      .in("status", ["accepted", "scheduled", "in_progress", "worker_completed", "dispute_open", "dispute_closed"])
      .order("created_at", { ascending: false });

  if (taskError) {
    list.innerHTML =
      `<div class="empty">${escapeHTML(taskError.message)}</div>`;
    return;
  }

  const { data: directTasks } =
    await supabaseClient
      .from("direct_task_requests")
      .select("*")
      .eq("customer_id", customerId)
      .in("status", ["accepted", "scheduled", "in_progress", "worker_completed", "dispute_open", "dispute_closed"])
      .order("created_at", { ascending: false });

  const tasks =
    [
      ...(marketplaceTasks || []).map(task => ({
        ...task,
        source_type: "marketplace",
        is_direct_request: false
      })),
      ...(directTasks || []).map(task => ({
        ...task,
        source_type: "direct_quote",
        is_direct_request: true
      }))
    ]
      .filter(isAcceptedActiveTask)
      .sort((a, b) => new Date(b.created_at || 0) - new Date(a.created_at || 0));

  if (tasks.length === 0) {
    document.getElementById("closedCount").innerText = "0";
    document.getElementById("paidTotal").innerText = "$0.00";

    list.innerHTML =
      `<div class="empty">No active accepted quotes yet.</div>`;
    return;
  }

  list.innerHTML = "";

  let totalPaid = 0;
  let visiblePaidTasks = 0;

  for (const task of tasks) {
    const quoteId =
      getQuoteId(task);

    const quote =
      await fetchQuote(quoteId, task.id);

    const workerId =
      getWorkerId(task) ||
      quote?.worker_id ||
      "";

    const worker =
      await fetchWorker(workerId);

    const payment =
      await fetchPayment(task.id, quote?.id || quoteId);

    const amountPaid =
      Number(getAmountPaid(task, quote, payment) || 0);

    if (!Number.isNaN(amountPaid)) {
      totalPaid += amountPaid;
    }

    const paymentCompleted =
      isPaymentCompleted(task, quote, payment);

    visiblePaidTasks += 1;

    const paymentStatus =
      getPaymentStatus(task, quote, payment);

    const assignment =
      await fetchAssignment(task.id, workerId);

    const liveStatus =
      getLiveTaskStatus(task, quote, assignment, paymentCompleted);

    const arrivalCode =
      getArrivalCode(assignment, task);

    const detailsId =
      `details-${task.source_type}-${task.id}`;

    const disputeOpen =
      isDisputeOpen(task);

    const card =
      document.createElement("div");

    card.className =
      "task-card";

    card.innerHTML = `
      <div class="task-top">
        <div>
          <div class="task-title">
            ${escapeHTML(getTaskTitle(task))}
          </div>

          <div class="task-sub">
            Order # TM-${String(task.id).slice(0, 8).toUpperCase()} •
            Accepted ${escapeHTML(formatDate(task.accepted_at || task.paid_at || task.updated_at || task.created_at))}
          </div>

          <div class="request-pill">
            ${task.is_direct_request ? "Direct Quote" : "Marketplace Request"}
          </div>
        </div>

        <div class="status-pill ${getStatusPillClass(liveStatus)}">
          ${escapeHTML(liveStatus)}
        </div>
      </div>

      <div class="worker-row">
        <img
          class="worker-avatar"
          src="${escapeHTML(getWorkerPhoto(worker))}"
          onerror="this.src='${DEFAULT_WORKER_PHOTO}'"
          alt="Worker photo"
        >

        <div>
          <div class="worker-name">
            ${escapeHTML(getWorkerName(worker, quote, task))}
          </div>

          <div class="worker-sub">
            Accepted worker for this task
          </div>
        </div>
      </div>

      <div class="compact-grid">
        <div class="info-box">
          <div class="info-label">Amount Paid</div>
          <div class="info-value">
            ${escapeHTML(formatMoney(amountPaid))}
          </div>
        </div>

        <div class="info-box">
          <div class="info-label">Payment Status</div>
          <div class="info-value">
            ${paymentCompleted ? "Payment Completed" : escapeHTML(formatStatus(paymentStatus))}
          </div>
        </div>

        <div class="info-box">
          <div class="info-label">Date Needed</div>
          <div class="info-value">
            ${escapeHTML(formatDate(getTaskDate(task)))}
          </div>
        </div>

        <div class="info-box">
          <div class="info-label">Location</div>
          <div class="info-value">
            ${escapeHTML(getTaskLocation(task))}
          </div>
        </div>
      </div>

      ${renderProgressTracker(liveStatus)}

      ${renderArrivalCodeBox(arrivalCode, liveStatus)}

      <div class="payment-box ${paymentCompleted ? "" : "unpaid"}">
        ${paymentCompleted
          ? `Payment completed for ${escapeHTML(formatMoney(amountPaid))}.`
          : `Payment status: ${escapeHTML(formatStatus(paymentStatus))}.`
        }
      </div>

      ${disputeOpen ? `
        <div class="dispute-alert">
          A dispute is still open on this task. It should remain visible until the dispute is closed.
        </div>
      ` : ""}

      <div class="details-toggle" onclick="toggleDetails('${detailsId}')">
        View all task details
      </div>

      <div class="details-box" id="${detailsId}">
        <div class="detail-item">
          <strong>Category:</strong> ${escapeHTML(getTaskCategory(task))}
        </div>

        <div class="detail-item">
          <strong>Task Details:</strong><br>
          ${escapeHTML(getTaskDetails(task)).replaceAll("\n", "<br>")}
        </div>

        <div class="detail-item">
          <strong>Worker Quote Message:</strong><br>
          ${escapeHTML(quote?.message || "No quote message listed.")}
        </div>

        <div class="detail-item">
          <strong>Quote ID:</strong> ${escapeHTML(quote?.id || quoteId || "Not listed")}
        </div>

        <div class="detail-item">
          <strong>Task Status:</strong> ${escapeHTML(liveStatus)}
        </div>

        <div class="detail-item">
          <strong>Arrival Code:</strong> ${escapeHTML(arrivalCode || "Not generated yet")}
        </div>
      </div>

      <div class="action-row">
        <button class="secondary-btn" onclick="window.location.href='message-center.html?worker_id=${encodeURIComponent(workerId)}&task_id=${encodeURIComponent(task.id)}'">
          Message Worker
        </button>

        <button class="primary-btn" onclick="window.location.href='worker-public-profile.html?worker_id=${encodeURIComponent(workerId)}'">
          Worker Profile
        </button>

        <button class="secondary-btn" onclick="cancelAcceptedTask('${task.id}','${task.source_type}')">
          Cancel Task
        </button>

        ${renderCustomerCompletionButton(task, quote, assignment, liveStatus, workerId)}
      </div>
    `;

    list.appendChild(card);
  }

  if (visiblePaidTasks === 0) {
    document.getElementById("closedCount").innerText = "0";
    document.getElementById("paidTotal").innerText = "$0.00";

    list.innerHTML =
      `<div class="empty">No active accepted quotes yet.</div>`;
    return;
  }

  document.getElementById("closedCount").innerText =
    String(visiblePaidTasks);

  document.getElementById("paidTotal").innerText =
    formatMoney(totalPaid);
}


async function cancelAcceptedTask(taskId, sourceType) {
  const confirmed = confirm("Cancel this accepted task? Cancellation fees may apply based on how close the task date is.");

  if (!confirmed) return;

  await supabaseClient.rpc(
    "create_cancellation_refund_record",
    { p_task_id: taskId }
  );

  const tableName =
    sourceType === "direct_quote"
      ? "direct_task_requests"
      : "tasks";

  await supabaseClient
    .from(tableName)
    .update({
      status: "cancelled",
      payment_status: "refund_pending"
    })
    .eq("id", taskId);

  alert("Task cancelled. Refund processing has started.");
  loadAcceptedQuotes();
}


loadAcceptedQuotes();
</script>
