<!DOCTYPE html>
<html>
<head>
<title>Saved Workers - TaskMint</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #ffffff;
  --surface: #f2f7f4;
  --surface2: #e6f4eb;
  --border: #e2ebe5;
  --accent: #0b7a28;
  --text: #111111;
  --muted: #6b7870;
  --danger: #b00020;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  padding-bottom: 95px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.container {
  width: 100%;
  max-width: 470px;
  padding: 20px 16px 30px;
}

.top-bar {
  position: sticky;
  top: 0;
  z-index: 40;
  width: 100%;
  max-width: 470px;
  background: rgba(255,255,255,0.97);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 13px 20px;
  margin: -20px -16px 20px;
}

.back, .refresh {
  color: var(--accent);
  font-weight: 800;
  cursor: pointer;
  font-size: 14px;
}

.refresh {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 999px;
  padding: 8px 11px;
  font-size: 12px;
}

.hero {
  background: var(--accent);
  color: white;
  border-radius: 22px;
  padding: 24px 20px;
  margin-bottom: 14px;
  box-shadow: 0 8px 24px rgba(11,122,40,0.22);
  position: relative;
  overflow: hidden;
  opacity: 0;
  animation: riseIn 0.35s 0.05s forwards;
}

.hero::before {
  content: "";
  position: absolute;
  width: 155px;
  height: 155px;
  border-radius: 50%;
  background: rgba(255,255,255,0.10);
  top: -65px;
  right: -55px;
}

.hero::after {
  content: "";
  position: absolute;
  width: 92px;
  height: 92px;
  border-radius: 50%;
  background: rgba(255,255,255,0.07);
  bottom: -45px;
  left: -35px;
}

.hero h1 {
  margin: 0 0 7px;
  font-size: 29px;
  font-weight: 800;
  line-height: 1.08;
  letter-spacing: -0.5px;
  position: relative;
  z-index: 2;
}

.hero p {
  margin: 0;
  font-size: 13px;
  line-height: 1.5;
  color: rgba(255,255,255,0.82);
  position: relative;
  z-index: 2;
}

.summary-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 12px;
  opacity: 0;
  animation: riseIn 0.35s 0.1s forwards;
}

.summary-box, .filter-card, .worker-card {
  background: var(--surface);
  border-radius: 20px;
  border: 1px solid var(--border);
}

.summary-box { padding: 15px; }

.summary-label {
  color: var(--accent);
  font-size: 10.5px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.6px;
}

.summary-value {
  font-size: 26px;
  line-height: 1;
  font-weight: 800;
  margin-top: 7px;
}

.filter-card {
  padding: 16px;
  margin-bottom: 12px;
  opacity: 0;
  animation: riseIn 0.35s 0.15s forwards;
}

.filter-title {
  font-size: 15px;
  font-weight: 800;
  margin-bottom: 10px;
}

.filter-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 10px;
}

select, input {
  width: 100%;
  padding: 13px;
  border-radius: 13px;
  border: 1px solid var(--border);
  font-size: 14px;
  outline: none;
  background: white;
  color: var(--text);
  font-family: Arial, sans-serif;
}

select:focus, input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(11,122,40,0.10);
}

.workers-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 12px;
}

.worker-card {
  background: #fff;
  overflow: hidden;
  border-radius: 20px;
  opacity: 0;
  animation: riseIn 0.35s forwards;
}

.worker-top {
  display: flex;
  gap: 13px;
  padding: 14px;
  align-items: center;
}

.worker-photo {
  width: 76px;
  height: 76px;
  border-radius: 22px;
  object-fit: cover;
  border: 1px solid var(--border);
  background: var(--surface2);
  flex-shrink: 0;
  display: block;
}

.worker-info { min-width: 0; flex: 1; }

.worker-name {
  font-size: 16px;
  font-weight: 800;
  line-height: 1.2;
  margin-bottom: 5px;
}

.worker-location {
  color: var(--muted);
  font-size: 12px;
  margin-bottom: 8px;
}

.rating-row {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}

.rating-pill, .gender-pill {
  background: var(--surface2);
  color: var(--accent);
  padding: 6px 9px;
  border-radius: 999px;
  font-size: 10.5px;
  font-weight: 800;
}

.gender-pill {
  background: var(--surface);
  color: var(--text);
  border: 1px solid var(--border);
}

.section { padding: 0 14px 12px; }

.section-title {
  color: var(--accent);
  font-size: 10.5px;
  font-weight: 800;
  text-transform: uppercase;
  margin-bottom: 7px;
  letter-spacing: 0.6px;
}

.chips { display: flex; flex-wrap: wrap; gap: 6px; }

.chip {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 999px;
  padding: 7px 9px;
  font-size: 11px;
  font-weight: 700;
  color: var(--text);
}

.action-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  padding: 0 14px 14px;
}

button {
  width: 100%;
  border: none;
  border-radius: 13px;
  padding: 12px;
  font-size: 12px;
  font-weight: 800;
  cursor: pointer;
  transition: opacity 0.18s, transform 0.18s, box-shadow 0.18s;
  font-family: Arial, sans-serif;
}

button:hover {
  opacity: 0.9;
  transform: translateY(-1px);
  box-shadow: 0 6px 14px rgba(11,122,40,0.10);
}

.primary-btn { background: var(--accent); color: white; }
.secondary-btn { background: white; color: var(--accent); border: 1px solid var(--border); }
.remove-btn { background: var(--danger); color: white; }

.empty {
  background: var(--surface);
  border-radius: 20px;
  padding: 24px 18px;
  text-align: center;
  color: var(--muted);
  border: 1px solid var(--border);
  font-size: 13px;
  line-height: 1.45;
}

#status {
  text-align: center;
  font-size: 13px;
  font-weight: 800;
  margin-bottom: 12px;
  color: var(--accent);
  line-height: 1.4;
}

.nav {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 470px;
  background: rgba(255,255,255,0.97);
  backdrop-filter: blur(16px);
  border-top: 1px solid var(--border);
  box-shadow: 0 -3px 16px rgba(0,0,0,0.06);
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  padding: 10px 6px 14px;
  z-index: 50;
}

.nav a {
  text-decoration: none;
  color: var(--muted);
  font-size: 10px;
  font-weight: 600;
  text-align: center;
  transition: color 0.18s;
}

.nav a:hover { color: var(--accent); }
.nav-icon { display: block; font-size: 20px; margin-bottom: 3px; }
.active { color: var(--accent) !important; }

@keyframes riseIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

@media (max-width: 360px) {
  .hero h1 { font-size: 25px; }
  .action-row { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="container">
  <div class="top-bar">
    <div class="back" onclick="window.location.href='customer-home.html'">← Back</div>
    <div class="refresh" onclick="loadSavedWorkers()">Refresh</div>
  </div>
  <div class="hero">
    <h1>Saved Workers</h1>
    <p>Review your favorite workers, filter by service type, and quickly open their profiles when you are ready to hire again.</p>
  </div>
  <div class="summary-row">
    <div class="summary-box"><div class="summary-label">Saved</div><div class="summary-value" id="savedCount">0</div></div>
    <div class="summary-box"><div class="summary-label">Showing</div><div class="summary-value" id="showingCount">0</div></div>
  </div>
  <div class="filter-card">
    <div class="filter-title">Filter Saved Workers</div>
    <div class="filter-grid">
      <select id="serviceFilter" onchange="applyFilters()"><option value="">All job types</option></select>
      <input id="searchFilter" placeholder="Search city, state, worker" oninput="applyFilters()">
    </div>
    <button class="secondary-btn" onclick="clearFilters()" style="margin-top:10px;">Clear Filters</button>
  </div>
  <p id="status"></p>
  <div id="workersList"></div>
</div>
<div class="nav">
  <a href="customer-home.html"><span class="nav-icon">🏠</span>Home</a>
  <a href="post-job.html"><span class="nav-icon">＋</span>Post</a>
  <a href="browse-workers.html"><span class="nav-icon">👷</span>Workers</a>
  <a href="saved-workers.html" class="active"><span class="nav-icon">⭐</span>Saved</a>
  <a href="message-center.html"><span class="nav-icon">💬</span>Messages</a>
</div>
<script>
const supabaseClient=window.supabase.createClient("https://dbcthtjmtlumidpbucrc.supabase.co","sb_publishable_3h7cO2Z8CDxZyEKDLRzvtg_1UJCLldJ");
let allSavedWorkers=[];let currentUserId="";
function escapeHTML(value){if(value===null||value===undefined){return ""}return String(value).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;")}
function getWorkerName(worker){const firstName=worker.first_name||"";let lastName=worker.last_name||"";if(!lastName&&worker.full_name){const parts=worker.full_name.trim().split(" ");lastName=parts.length>1?parts[parts.length-1]:""}if(!lastName&&worker.display_name){const parts=worker.display_name.trim().split(" ");lastName=parts.length>1?parts[parts.length-1]:""}const lastInitial=lastName?lastName.charAt(0).toUpperCase()+".":"";if(firstName){return `${firstName} ${lastInitial}`.trim()}if(worker.full_name){const parts=worker.full_name.trim().split(" ");return parts.length>1?`${parts[0]} ${parts[parts.length-1].charAt(0).toUpperCase()}.`:parts[0]}if(worker.display_name){const parts=worker.display_name.trim().split(" ");return parts.length>1?`${parts[0]} ${parts[parts.length-1].charAt(0).toUpperCase()}.`:parts[0]}return "Worker"}
function getServices(worker){if(Array.isArray(worker.services_offered)){return worker.services_offered}if(typeof worker.services_offered==="string"){return worker.services_offered.split(",").map(item=>item.trim()).filter(Boolean)}return []}
function getServiceAreas(worker){if(Array.isArray(worker.service_areas)){return worker.service_areas}if(typeof worker.service_areas==="string"){return worker.service_areas.split(",").map(item=>item.trim()).filter(Boolean)}return []}
async function getCurrentUser(){const{data}=await supabaseClient.auth.getSession();if(data.session&&data.session.user){localStorage.setItem("taskmintUserId",data.session.user.id);return data.session.user}const savedUserId=localStorage.getItem("taskmintUserId");if(savedUserId){return{id:savedUserId}}window.location.href="login.html";return null}
async function loadSavedWorkers(){const workersList=document.getElementById("workersList");workersList.className="";workersList.innerHTML=`<div class="empty">Loading saved workers...</div>`;const user=await getCurrentUser();if(!user){return}currentUserId=user.id;const{data:savedRows,error:savedError}=await supabaseClient.from("saved_workers").select("*").eq("customer_id",currentUserId).order("created_at",{ascending:false});if(savedError){workersList.innerHTML=`<div class="empty">${escapeHTML(savedError.message)}</div>`;return}if(!savedRows||savedRows.length===0){allSavedWorkers=[];document.getElementById("savedCount").innerText="0";document.getElementById("showingCount").innerText="0";workersList.innerHTML=`<div class="empty">No saved workers yet.</div>`;return}const workerIds=savedRows.map(row=>row.worker_id).filter(Boolean);const{data:workers,error:workersError}=await supabaseClient.from("worker_profiles").select("*").in("id",workerIds).eq("is_worker_approved",true);if(workersError){workersList.innerHTML=`<div class="empty">${escapeHTML(workersError.message)}</div>`;return}const{data:profiles}=await supabaseClient.from("profiles").select("*");const profileMap={};(profiles||[]).forEach(profile=>{profileMap[profile.id]=profile});const savedDateMap={};savedRows.forEach(row=>{savedDateMap[row.worker_id]=row.created_at||""});allSavedWorkers=(workers||[]).map(worker=>{const linkedProfile=profileMap[worker.user_id]||profileMap[worker.profile_id]||profileMap[worker.id]||{};return{...linkedProfile,...worker,saved_at:savedDateMap[worker.id]||"",full_name:worker.full_name||worker.display_name||linkedProfile.full_name||linkedProfile.display_name||`${worker.first_name||""} ${worker.last_name||""}`.trim()||`${linkedProfile.first_name||""} ${linkedProfile.last_name||""}`.trim()||worker.name||"Worker",profile_photo_url:worker.profile_photo_url||worker.profile_image_url||worker.photo_url||worker.avatar_url||linkedProfile.profile_photo_url||linkedProfile.profile_image_url||linkedProfile.photo_url||linkedProfile.avatar_url||"",city:worker.city||linkedProfile.city||"",state:worker.state||linkedProfile.state||""}});populateServiceFilter();applyFilters()}
function populateServiceFilter(){const serviceFilter=document.getElementById("serviceFilter");const selectedValue=serviceFilter.value;const serviceSet=new Set();allSavedWorkers.forEach(worker=>{getServices(worker).forEach(service=>{if(service){serviceSet.add(service)}})});serviceFilter.innerHTML=`<option value="">All job types</option>`;[...serviceSet].sort().forEach(service=>{const option=document.createElement("option");option.value=service;option.innerText=service;serviceFilter.appendChild(option)});serviceFilter.value=selectedValue}
function applyFilters(){const serviceValue=document.getElementById("serviceFilter").value.toLowerCase();const searchValue=document.getElementById("searchFilter").value.toLowerCase().trim();let filtered=allSavedWorkers.filter(worker=>{const services=getServices(worker).join(" ").toLowerCase();const searchText=[getWorkerName(worker),worker.city,worker.state,getServiceAreas(worker).join(" "),services].join(" ").toLowerCase();const serviceMatch=!serviceValue||services.includes(serviceValue);const searchMatch=!searchValue||searchText.includes(searchValue);return serviceMatch&&searchMatch});renderWorkers(filtered)}
function clearFilters(){document.getElementById("serviceFilter").value="";document.getElementById("searchFilter").value="";renderWorkers(allSavedWorkers)}
async function removeSavedWorker(workerId){const confirmRemove=confirm("Remove this worker from your saved list?");if(!confirmRemove){return}const status=document.getElementById("status");status.innerText="";const{error}=await supabaseClient.from("saved_workers").delete().eq("customer_id",currentUserId).eq("worker_id",workerId);if(error){status.style.color="#b00020";status.innerText=error.message;return}status.style.color="#0b7a28";status.innerText="Worker removed.";await loadSavedWorkers()}
function viewWorkerProfile(workerId){window.location.href=`worker-public-profile.html?worker_id=${encodeURIComponent(workerId)}&workerId=${encodeURIComponent(workerId)}`}
function renderWorkers(workers){const workersList=document.getElementById("workersList");document.getElementById("savedCount").innerText=String(allSavedWorkers.length);document.getElementById("showingCount").innerText=String(workers.length);if(!workers||workers.length===0){workersList.className="";workersList.innerHTML=`<div class="empty">No saved workers match your filter.</div>`;return}workersList.className="workers-grid";workersList.innerHTML="";workers.forEach(worker=>{const services=getServices(worker);const serviceAreas=getServiceAreas(worker);const photo=worker.profile_photo_url||worker.profile_image_url||worker.photo_url||worker.avatar_url||worker.image_url||"https://cdn-icons-png.flaticon.com/512/149/149071.png";const card=document.createElement("div");card.className="worker-card";card.innerHTML=`<div class="worker-top"><img class="worker-photo" src="${escapeHTML(photo)}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/149/149071.png'"><div class="worker-info"><div class="worker-name">${escapeHTML(getWorkerName(worker))}</div><div class="worker-location">${escapeHTML(worker.city||"")}, ${escapeHTML(worker.state||"")}</div><div class="rating-row"><div class="rating-pill">⭐ ${escapeHTML(String(worker.average_rating||worker.rating||"5.0"))}</div>${worker.gender?`<div class="gender-pill">${escapeHTML(worker.gender)}</div>`:""}</div></div></div><div class="section"><div class="section-title">Services</div><div class="chips">${services.length>0?services.slice(0,3).map(service=>`<div class="chip">${escapeHTML(service)}</div>`).join(""):`<div class="chip">Services not listed</div>`}</div></div><div class="section"><div class="section-title">Areas</div><div class="chips">${serviceAreas.length>0?serviceAreas.slice(0,3).map(area=>`<div class="chip">${escapeHTML(area)}</div>`).join(""):`<div class="chip">Areas not listed</div>`}</div></div><div class="action-row"><button class="primary-btn" onclick="viewWorkerProfile('${worker.id}')">View Profile</button><button class="remove-btn" onclick="removeSavedWorker('${worker.id}')">Remove</button></div>`;workersList.appendChild(card)})}
loadSavedWorkers();
</script>
</body>
</html>
