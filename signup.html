<!DOCTYPE html>
<html>
<head>
  <title>Sign Up - TaskMint</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f5f5f5;
      padding: 20px;
    }

    .container {
      max-width: 400px;
      margin: 40px auto;
      background: white;
      padding: 20px;
      border-radius: 12px;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    input, select, button {
      width: 100%;
      padding: 14px;
      margin-top: 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
      box-sizing: border-box;
      font-size: 16px;
    }

    button {
      background: green;
      color: white;
      border: none;
      cursor: pointer;
    }

    .link {
      text-align: center;
      margin-top: 16px;
    }

    .link a {
      color: green;
      text-decoration: none;
    }

    #status {
      margin-top: 14px;
      text-align: center;
      color: #333;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Create Account</h2>

    <input id="name" type="text" placeholder="Full name" />
    <input id="email" type="email" placeholder="Email" />
    <input id="password" type="password" placeholder="Password" />

    <select id="role">
      <option value="customer">Customer</option>
      <option value="worker">Worker</option>
    </select>

    <button onclick="signUp()">Create Account</button>

    <p id="status"></p>

    <div class="link">
      <a href="index.html">Back to Home</a>
    </div>
  </div>

 <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script>
  const supabaseClient = supabase.createClient(
    "https://dbcthtjmtlumidpbucrc.supabase.co",
    "sb_publishable_3h7cO2Z8CDxZyEKDLRzvtg_1UJCLldJ"
  );

  async function signUp() {
    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const role = document.getElementById("role").value;
    const status = document.getElementById("status");

    status.innerText = "";

    const { data, error } = await supabaseClient.auth.signUp({
      email: email,
      password: password
    });

    if (error) {
      status.innerText = error.message;
      return;
    }

    const user = data.user;

    if (!user) {
      status.innerText = "Signup failed.";
      return;
    }

    let insertError = null;

    if (role === "customer") {
      const result = await supabaseClient
        .from("user_profiles")
        .insert([
          {
            id: user.id,
            full_name: name,
            email: email
          }
        ]);

      insertError = result.error;
    }

    if (role === "worker") {
      const result = await supabaseClient
        .from("worker_profiles")
        .insert([
          {
            id: user.id,
            full_name: name,
            email: email
          }
        ]);

      insertError = result.error;
    }

    if (insertError) {
      status.innerText = insertError.message;
      return;
    }

    status.innerText = "Account created successfully.";
  }
</script>
</body>
</html>
