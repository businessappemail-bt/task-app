<!DOCTYPE html>
<html>
<head>
  <title>Reset Password - TaskMint</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
    :root {
      --bg:      #ffffff;
      --surface: #f2f7f4;
      --surface2:#e6f4eb;
      --border:  #e2ebe5;
      --accent:  #0b7a28;
      --text:    #111111;
      --muted:   #6b7870;
      --danger:  #b00020;
    }
 
    body {
      margin: 0;
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }
 
    .card {
      width: 100%;
      max-width: 420px;
      background: var(--surface);
      border-radius: 20px;
      border: 1px solid var(--border);
      padding: 32px 24px;
      opacity: 0;
      animation: riseIn 0.35s 0.05s forwards;
    }
 
    .icon-wrap {
      width: 60px;
      height: 60px;
      border-radius: 18px;
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin: 0 auto 16px;
    }
 
    h1 {
      text-align: center;
      font-size: 24px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.4px;
      margin-bottom: 6px;
    }
 
    p {
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
      margin-bottom: 20px;
    }
 
    label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin: 14px 0 5px;
    }
 
    input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 14px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      outline: none;
      background: #fff;
      color: var(--text);
    }
 
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(11,122,40,0.10);
    }
 
    button {
      width: 100%;
      padding: 13px;
      margin-top: 18px;
      border: none;
      border-radius: 12px;
      background: var(--accent);
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      font-family: 'Plus Jakarta Sans', sans-serif;
      cursor: pointer;
      transition: opacity 0.18s, transform 0.18s;
    }
 
    button:hover {
      opacity: 0.88;
      transform: translateY(-1px);
    }
 
    #status {
      margin-top: 14px;
      text-align: center;
      font-size: 13px;
      font-weight: 700;
      min-height: 18px;
      line-height: 1.4;
    }
 
    @keyframes riseIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
 
<div class="card">
  <div class="icon-wrap">🔑</div>
  <h1>Reset Password</h1>
  <p>Enter your new password below.</p>
 
  <label for="password">New Password</label>
  <input
    id="password"
    type="password"
    placeholder="New Password"
  >
 
  <label for="confirmPassword">Confirm Password</label>
  <input
    id="confirmPassword"
    type="password"
    placeholder="Confirm Password"
  >
 
  <button onclick="updatePassword()">Update Password</button>
 
  <div id="status"></div>
</div>
 
<script>
const supabaseClient = window.supabase.createClient(
  "https://dbcthtjmtlumidpbucrc.supabase.co",
  "sb_publishable_3h7cO2Z8CDxZyEKDLRzvtg_1UJCLldJ"
);
async function updatePassword() {
  const password =
    document.getElementById("password").value;
  const confirmPassword =
    document.getElementById("confirmPassword").value;
  const status =
    document.getElementById("status");
  status.style.color = "#b00020";
  status.innerText = "";
  if (!password || !confirmPassword) {
    status.innerText = "Complete all fields.";
    return;
  }
  if (password !== confirmPassword) {
    status.innerText = "Passwords do not match.";
    return;
  }
  if (password.length < 6) {
    status.innerText = "Password must be at least 6 characters.";
    return;
  }
  const { error } =
    await supabaseClient.auth.updateUser({
      password: password
    });
  if (error) {
    status.innerText = error.message;
    return;
  }
  status.style.color = "#0b7a28";
  status.innerText = "Password updated successfully.";
  setTimeout(() => {
    window.location.href = "login.html";
  }, 1500);
}
</script>
</body>
</html>
