<body>

<div class="card">

  <h1>Reset Password</h1>

  <div class="sub">
    Enter your new password below.
  </div>

  <input
    id="password"
    type="password"
    placeholder="New Password"
  >

  <input
    id="confirmPassword"
    type="password"
    placeholder="Confirm Password"
  >

  <button onclick="updatePassword()">
    Update Password
  </button>

  <div id="status"></div>

</div>

<script>
const supabaseClient = window.supabase.createClient(
  "https://dbcthtjmtlumidpbucrc.supabase.co",
  "sb_publishable_3h7cO2Z8CDxZyEKDLRzvtg_1UJCLldJ"
);

async function updatePassword() {

  const password =
    document.getElementById("password").value;

  const confirmPassword =
    document.getElementById("confirmPassword").value;

  const status =
    document.getElementById("status");

  status.style.color = "#b00020";
  status.innerText = "";

  if (!password || !confirmPassword) {
    status.innerText = "Complete all fields.";
    return;
  }

  if (password !== confirmPassword) {
    status.innerText = "Passwords do not match.";
    return;
  }

  if (password.length < 6) {
    status.innerText = "Password must be at least 6 characters.";
    return;
  }

  const { error } =
    await supabaseClient.auth.updateUser({
      password: password
    });

  if (error) {
    status.innerText = error.message;
    return;
  }

  status.style.color = "#0b7a28";
  status.innerText = "Password updated successfully.";

  setTimeout(() => {
    window.location.href = "login.html";
  }, 1500);
}
</script>

</body>
</html>
