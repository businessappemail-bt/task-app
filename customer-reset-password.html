<!DOCTYPE html>
<html>
<head>
  <title>Reset Password - TaskMint</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: white;
      padding: 24px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
    }

    p {
      text-align: center;
      color: #666;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 14px;
      margin-top: 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
      box-sizing: border-box;
      font-size: 15px;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 16px;
      border: none;
      border-radius: 10px;
      background: #0b7a28;
      color: white;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
    }

    #status {
      margin-top: 14px;
      text-align: center;
      font-size: 13px;
      font-weight: bold;
      min-height: 18px;
    }
  </style>
</head>

<body>

<div class="card">

  <h1>Reset Password</h1>

  <p>Enter your new password below.</p>

  <input
    id="password"
    type="password"
    placeholder="New Password"
  >

  <input
    id="confirmPassword"
    type="password"
    placeholder="Confirm Password"
  >

  <button onclick="updatePassword()">
    Update Password
  </button>

  <div id="status"></div>

</div>

<script>

const supabaseClient = window.supabase.createClient(
  "https://dbcthtjmtlumidpbucrc.supabase.co",
  "sb_publishable_3h7cO2Z8CDxZyEKDLRzvtg_1UJCLldJ"
);

async function updatePassword() {

  const password =
    document.getElementById("password").value;

  const confirmPassword =
    document.getElementById("confirmPassword").value;

  const status =
    document.getElementById("status");

  status.style.color = "#b00020";
  status.innerText = "";

  if (!password || !confirmPassword) {
    status.innerText = "Complete all fields.";
    return;
  }

  if (password !== confirmPassword) {
    status.innerText = "Passwords do not match.";
    return;
  }

  if (password.length < 6) {
    status.innerText = "Password must be at least 6 characters.";
    return;
  }

  const { error } =
    await supabaseClient.auth.updateUser({
      password: password
    });

  if (error) {
    status.innerText = error.message;
    return;
  }

  status.style.color = "#0b7a28";
  status.innerText = "Password updated successfully.";

  setTimeout(() => {
    window.location.href = "login.html";
  }, 1500);
}

</script>

</body>
</html>
