<!DOCTYPE html>
<html>
<head>
<title>Profile - TaskMint</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
margin: 0;
font-family: Arial, sans-serif;
background: #f7f7f7;
color: #111;
padding-bottom: 85px;
}

.header {
background: white;
text-align: center;
padding: 22px 0;
font-size: 26px;
font-weight: bold;
border-bottom: 1px solid #ddd;
}

.profile-top {
background: white;
text-align: center;
padding: 35px 20px 30px;
border-bottom: 1px solid #ddd;
}

.avatar {
width: 130px;
height: 130px;
border-radius: 50%;
background: #ddd;
margin: 0 auto 20px;
display: flex;
align-items: center;
justify-content: center;
font-size: 60px;
color: #aaa;
}

.name {
font-size: 28px;
font-weight: bold;
}

.menu {
background: white;
margin-top: 20px;
}

.row {
display: flex;
justify-content: space-between;
align-items: center;
padding: 20px 25px;
border-bottom: 1px solid #ddd;
font-size: 20px;
font-weight: bold;
}

.row span {
font-weight: normal;
color: #222;
font-size: 18px;
}

.arrow {
color: green;
font-size: 28px;
}

.center-row {
text-align: center;
padding: 20px;
border-bottom: 1px solid #ddd;
font-size: 20px;
background: white;
}

.logout {
text-align: center;
padding: 20px;
font-size: 20px;
background: white;
cursor: pointer;
}

.nav {
position: fixed;
bottom: 0;
left: 0;
width: 100%;
background: white;
border-top: 1px solid #ddd;
display: flex;
justify-content: space-around;
padding: 10px 0;
}

.nav a {
text-decoration: none;
color: #888;
font-size: 14px;
text-align: center;
}

.nav a.active {
color: green;
font-weight: bold;
}
</style>
</head>

<body>

<div class="header">Profile</div>

<div class="profile-top">
<div class="avatar">👤</div>
<div class="name" id="profileName">B T.</div>
</div>

<div class="menu">
<div class="row">
Account
<span id="profileEmail">Loading...</span>
</div>

<div class="row">Account Security <span class="arrow">›</span></div>
<div class="row">Change Password <span class="arrow">›</span></div>
<div class="row">Payment <span class="arrow">›</span></div>
<div class="row">Promos <span class="arrow">›</span></div>
<div class="row">Notifications <span class="arrow">›</span></div>
<div class="row">Support <span class="arrow">›</span></div>
<div class="row">About <span class="arrow">›</span></div>
</div>

<div class="center-row" onclick="window.location.href='worker-signup.html'">
Become a Worker
</div>

<div class="logout" onclick="logoutUser()">
Log Out
</div>

<div class="nav">
<a href="customer-home.html">Home</a>
<a href="my-jobs.html">My Jobs</a>
<a href="messages.html">Messages</a>
<a href="profile.html" class="active">Profile</a>
</div>

<script>
const firstName = localStorage.getItem("taskmintFirstName") || "B";
const lastName = localStorage.getItem("taskmintLastName") || "T";
const email = localStorage.getItem("taskmintEmail") || "No email found";

document.getElementById("profileName").innerText =
firstName.charAt(0).toUpperCase() + " " + lastName.charAt(0).toUpperCase() + ".";

document.getElementById("profileEmail").innerText = email;

function logoutUser() {
localStorage.clear();
window.location.href = "login.html";
}
</script>

</body>
</html>
