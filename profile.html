<!DOCTYPE html>
<html>
<head>
<title>Profile - TaskMint</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin:0; font-family:Arial; background:#f4f4f4; padding-bottom:80px; }
.container { max-width:420px; margin:0 auto; background:white; min-height:100vh; }
.header { text-align:center; padding:20px; font-size:22px; font-weight:bold; border-bottom:1px solid #ddd; }
.profile-top { text-align:center; padding:30px 20px; border-bottom:1px solid #ddd; }

.avatar {
width:110px;
height:110px;
border-radius:50%;
background:#ddd;
margin:0 auto 12px;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
font-size:40px;
cursor:pointer;
}

.avatar img {
width:100%;
height:100%;
object-fit:cover;
}

.upload-text {
font-size:14px;
color:green;
cursor:pointer;
margin-bottom:15px;
}

#photoInput { display:none; }

.name { font-size:22px; font-weight:bold; }

.row {
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 20px;
border-bottom:1px solid #eee;
cursor:pointer;
}

.row-title { font-weight:bold; }
.arrow { color:green; font-size:22px; }

.center-row {
text-align:center;
padding:18px;
border-bottom:1px solid #eee;
cursor:pointer;
font-weight:bold;
}

.logout {
text-align:center;
padding:18px;
cursor:pointer;
}

.nav {
position:fixed;
bottom:0;
width:100%;
background:white;
border-top:1px solid #ddd;
display:flex;
justify-content:center;
}

.nav-inner {
max-width:420px;
width:100%;
display:flex;
justify-content:space-around;
padding:10px 0;
}

.nav a {
text-decoration:none;
color:#777;
font-size:14px;
}

.nav a.active {
color:green;
font-weight:bold;
}

#status {
text-align:center;
color:green;
font-size:14px;
margin-top:8px;
}
</style>
</head>

<body>

<div class="container">

<div class="header">Profile</div>

<div class="profile-top">
<div class="avatar" onclick="document.getElementById('photoInput').click()">
<span id="avatarPlaceholder">👤</span>
<img id="profilePhoto" style="display:none;">
</div>

<div class="upload-text" onclick="document.getElementById('photoInput').click()">
Add / Change Photo
</div>

<input id="photoInput" type="file" accept="image/*" onchange="uploadProfilePhoto()">

<div class="name" id="profileName">Loading...</div>
<div id="status"></div>
</div>

<div class="row" onclick="goToPage('account.html')">
<div class="row-title">Account</div>
<div id="profileEmail">Loading...</div>
</div>

<div class="row" onclick="goToPage('account-security.html')">
<div class="row-title">Account Security</div>
<div class="arrow">›</div>
</div>

<div class="row" onclick="goToPage('change-password.html')">
<div class="row-title">Change Password</div>
<div class="arrow">›</div>
</div>

<div class="row" onclick="goToPage('add-payment.html')">
<div class="row-title">Add Payment</div>
<div class="arrow">›</div>
</div>

<div class="row" onclick="goToPage('notifications.html')">
<div class="row-title">Notifications</div>
<div class="arrow">›</div>
</div>

<div class="row" onclick="goToPage('support.html')">
<div class="row-title">Support</div>
<div class="arrow">›</div>
</div>

<div class="row" onclick="goToPage('about.html')">
<div class="row-title">About</div>
<div class="arrow">›</div>
</div>

<div class="center-row" onclick="goToPage('worker-application.html')">
I want to accept task
</div>

<div class="logout" onclick="logoutUser()">Log Out</div>

</div>

<div class="nav">
<div class="nav-inner">
<a href="customer-home.html">Home</a>
<a href="my-jobs.html">My Jobs</a>
<a href="messages.html">Messages</a>
<a href="profile.html" class="active">Profile</a>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseClient = window.supabase.createClient(
"https://dbcthtjmtlumidpbucrc.supabase.co",
"sb_publishable_3h7cO2Z8CDxZyEKDLRzvtg_1UJCLldJ"
);

async function loadProfile() {
const userId = localStorage.getItem("taskmintUserId");

if (!userId) {
window.location.href = "login.html";
return;
}

const { data: profile, error } = await supabaseClient
.from("profiles")
.select("first_name, last_name, email, profile_photo_url")
.eq("id", userId)
.single();

if (error || !profile) return;

document.getElementById("profileName").innerText =
`${profile.first_name || ""} ${profile.last_name || ""}`;

document.getElementById("profileEmail").innerText =
profile.email || "No email found";

if (profile.profile_photo_url) {
document.getElementById("avatarPlaceholder").style.display = "none";
document.getElementById("profilePhoto").src = profile.profile_photo_url;
document.getElementById("profilePhoto").style.display = "block";
}
}

async function uploadProfilePhoto() {
const userId = localStorage.getItem("taskmintUserId");
const file = document.getElementById("photoInput").files[0];
const status = document.getElementById("status");

if (!file) return;

status.innerText = "Uploading photo...";

const fileExt = file.name.split(".").pop();
const safeFileName = file.name.replace(/[^a-zA-Z0-9.]/g, "_");
const filePath = `customers/${Date.now()}_${safeFileName}`;

const { error: uploadError } = await supabaseClient.storage
.from("profile-photos")
.upload(filePath, file);

if (uploadError) {
status.innerText = uploadError.message;
return;
}

const { data } = supabaseClient.storage
.from("profile-photos")
.getPublicUrl(filePath);

const photoUrl = data.publicUrl;

const { error: updateError } = await supabaseClient
.from("profiles")
.update({
profile_photo_url: photoUrl
})
.eq("id", userId);

if (updateError) {
status.innerText = updateError.message;
return;
}

document.getElementById("avatarPlaceholder").style.display = "none";
document.getElementById("profilePhoto").src = photoUrl + "?t=" + Date.now();
document.getElementById("profilePhoto").style.display = "block";

status.innerText = "Photo updated.";
}

function goToPage(page) {
window.location.href = page;
}

function logoutUser() {
localStorage.clear();
window.location.href = "login.html";
}

loadProfile();
</script>

</body>
</html>
