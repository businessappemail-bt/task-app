<!DOCTYPE html>
<html>
<head>
<title>Profile - TaskMint</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
margin: 0;
font-family: Arial, sans-serif;
background: #f4f4f4;
}

/* ✅ THIS FIXES THE WIDTH */
.container {
max-width: 420px;
margin: 0 auto;
background: white;
min-height: 100vh;
}

.header {
text-align: center;
padding: 20px;
font-size: 22px;
font-weight: bold;
border-bottom: 1px solid #ddd;
}

.profile-top {
text-align: center;
padding: 30px 20px;
border-bottom: 1px solid #ddd;
}

.avatar {
width: 110px;
height: 110px;
border-radius: 50%;
background: #ddd;
margin: 0 auto 15px;
display: flex;
align-items: center;
justify-content: center;
font-size: 40px;
}

.name {
font-size: 22px;
font-weight: bold;
}

.menu {
width: 100%;
}

.row {
display: flex;
justify-content: space-between;
align-items: center;
padding: 18px 20px;
border-bottom: 1px solid #eee;
font-size: 16px;
}

.row span {
color: #333;
font-weight: normal;
}

.arrow {
color: #999;
}

.center-row {
text-align: center;
padding: 18px;
border-bottom: 1px solid #eee;
cursor: pointer;
}

.logout {
text-align: center;
padding: 18px;
cursor: pointer;
}

.nav {
position: fixed;
bottom: 0;
left: 0;
width: 100%;
background: white;
border-top: 1px solid #ddd;
display: flex;
justify-content: center;
}

.nav-inner {
max-width: 420px;
width: 100%;
display: flex;
justify-content: space-around;
padding: 10px 0;
}

.nav a {
text-decoration: none;
color: #888;
font-size: 14px;
}

.nav a.active {
color: green;
font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

<div class="header">Profile</div>

<div class="profile-top">
<div class="avatar">👤</div>
<div class="name" id="profileName">B T.</div>
</div>

<div class="menu">

<div class="row">
Account
<span id="profileEmail">Loading...</span>
</div>

<div class="row">Account Security <span class="arrow">›</span></div>
<div class="row">Change Password <span class="arrow">›</span></div>
<div class="row">Payment <span class="arrow">›</span></div>
<div class="row">Promos <span class="arrow">›</span></div>
<div class="row">Notifications <span class="arrow">›</span></div>
<div class="row">Support <span class="arrow">›</span></div>
<div class="row">About <span class="arrow">›</span></div>

<div class="center-row" onclick="window.location.href='worker-signup.html'">
Become a Worker
</div>

<div class="logout" onclick="logoutUser()">
Log Out
</div>

</div>

</div>

<!-- NAV -->
<div class="nav">
<div class="nav-inner">
<a href="customer-home.html">Home</a>
<a href="my-jobs.html">My Jobs</a>
<a href="messages.html">Messages</a>
<a href="profile.html" class="active">Profile</a>
</div>
</div>

<script>
const firstName = localStorage.getItem("taskmintFirstName") || "B";
const lastName = localStorage.getItem("taskmintLastName") || "T";
const email = localStorage.getItem("taskmintEmail") || "No email found";

document.getElementById("profileName").innerText =
firstName.charAt(0) + " " + lastName.charAt(0) + ".";

document.getElementById("profileEmail").innerText = email;

function logoutUser() {
localStorage.clear();
window.location.href = "login.html";
}
</script>

</body>
</html>
