<!DOCTYPE html>
<html>
<head>
  <title>Worker Dashboard - TaskMint</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      color: #111;
      padding-bottom: 40px;
    }

    .container {
      max-width: 420px;
      margin: 0 auto;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    .card {
      background: white;
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 18px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .profile-row {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .profile-pic {
      width: 75px;
      height: 75px;
      border-radius: 50%;
      background: #ddd;
      object-fit: cover;
    }

    .section-title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 12px;
    }

    button {
      width: 100%;
      padding: 14px;
      margin: 7px 0;
      border: none;
      border-radius: 10px;
      background: #0b7a28;
      color: white;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
    }

    button.secondary {
      background: white;
      color: #111;
      border: 1px solid #ddd;
    }

    button.logout {
      background: #b00020;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Worker Dashboard</h1>

    <div class="card">
      <div class="profile-row">
        <img class="profile-pic" src="" alt="Profile Picture">
        <div>
          <strong>Worker Profile</strong>
<p>Manage the profile customers see before hiring you.</p>
        </div>
      </div>

     <button class="secondary" onclick="window.location.href='worker-profile-edit.html'">
  Edit Public Worker Profile
</button>

<button class="secondary" onclick="window.location.href='worker-settings.html'">
  Account Settings
</button>
    </div>

    <div class="card">
      <div class="section-title">Main</div>

      <button onclick="window.location.href='worker-open-tasks.html'">
        View Open Tasks
      </button>

      <button onclick="window.location.href='worker-completed-tasks.html'">
        View Completed Tasks
      </button>

      <button onclick="window.location.href='worker-reviews.html'">
        Ratings & Reviews
      </button>

      <button onclick="window.location.href='worker-disputes.html'">
        Dispute Center
      </button>

      <button onclick="window.location.href='worker-earnings.html'">
        Earnings
      </button>
    </div>

    <div class="card">
      <div class="section-title">Account</div>

      <button class="logout" onclick="logout()">
        Log Out
      </button>
    </div>
  </div>

  <script>
    function logout() {
      localStorage.clear();
      window.location.href = "index.html";
    }
  </script>
</body>
</html>
