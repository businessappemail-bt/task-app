<!DOCTYPE html>
<html>
<head>
<title>Change Password - TaskMint</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
margin: 0;
font-family: Arial, sans-serif;
background: #f4f4f4;
padding-bottom: 80px;
}

.container {
max-width: 420px;
margin: 0 auto;
background: white;
min-height: 100vh;
}

.header {
display: flex;
align-items: center;
gap: 15px;
padding: 18px 20px;
border-bottom: 1px solid #ddd;
font-size: 22px;
font-weight: bold;
}

.back {
font-size: 28px;
cursor: pointer;
color: green;
}

.section {
padding: 20px;
}

input {
width: 100%;
padding: 14px;
margin-bottom: 12px;
border: 1px solid #ccc;
border-radius: 10px;
font-size: 16px;
box-sizing: border-box;
}

button {
width: 100%;
padding: 14px;
border: none;
border-radius: 10px;
background: green;
color: white;
font-size: 16px;
cursor: pointer;
margin-top: 8px;
}

#status {
text-align: center;
padding: 15px;
font-weight: bold;
}

.nav {
position: fixed;
bottom: 0;
left: 0;
width: 100%;
background: white;
border-top: 1px solid #ddd;
display: flex;
justify-content: center;
}

.nav-inner {
max-width: 420px;
width: 100%;
display: flex;
justify-content: space-around;
padding: 10px 0;
}

.nav a {
text-decoration: none;
color: #888;
font-size: 14px;
}

.nav a.active {
color: green;
font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<span class="back" onclick="window.location.href='profile.html'">‹</span>
Change Password
</div>

<div class="section">
<input id="newPassword" type="password" placeholder="New password">
<input id="confirmPassword" type="password" placeholder="Confirm new password">

<button onclick="changePassword()">Update Password</button>

<div id="status"></div>
</div>

</div>

<div class="nav">
<div class="nav-inner">
<a href="customer-home.html">Home</a>
<a href="my-jobs.html">My Jobs</a>
<a href="messages.html">Messages</a>
<a href="profile.html" class="active">Profile</a>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseClient = window.supabase.createClient(
"https://dbcthtjmtlumidpbucrc.supabase.co",
"sb_publishable_3h7cO2Z8CDxZyEKDLRzvtg_1UJCLldJ"
);

async function protectPage() {
const { data, error } = await supabaseClient.auth.getSession();

if (error || !data.session) {
window.location.href = "login.html";
return null;
}

return data.session.user;
}

async function changePassword() {
const newPassword = document.getElementById("newPassword").value;
const confirmPassword = document.getElementById("confirmPassword").value;
const status = document.getElementById("status");

status.innerText = "";

const user = await protectPage();

if (!user) return;

if (!newPassword || !confirmPassword) {
status.innerText = "Enter and confirm your new password.";
return;
}

if (newPassword.length < 6) {
status.innerText = "Password must be at least 6 characters.";
return;
}

if (newPassword !== confirmPassword) {
status.innerText = "Passwords do not match.";
return;
}

const { error } = await supabaseClient.auth.updateUser({
password: newPassword
});

if (error) {
status.innerText = error.message;
return;
}

status.innerText = "Password updated successfully.";

setTimeout(() => {
window.location.href = "profile.html";
}, 1200);
}

protectPage();
</script>

</body>
</html>
