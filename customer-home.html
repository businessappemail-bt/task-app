<!DOCTYPE html>
<html>
<head>

  <style>
    body {

      font-family: Arial, sans-serif;

      color: #111;
    }

    .container {
      max-width: 420px;

    .card {

    }

    .spacer {
      height: 80px;
    }
    .logo-img {
  width: 160px;
  margin-bottom: 20px;
      object-fit: contain;
      object-position: left center;
      background: transparent;
      mix-blend-mode: multiply;
    }
    .logo-wrap {
  text-align: center;
  margin-bottom: 8px;
  background: transparent;
}
   .mode-toggle {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 10px;
  padding: 12px;
  border-radius: 12px;
  background: #f5f5f5;
  cursor: pointer;
  font-weight: 600;
}

.toggle-switch {
  width: 42px;
  height: 24px;
  background: #ccc;
  border-radius: 20px;
  position: relative;
  transition: 0.3s;
}

.toggle-circle {
  width: 20px;
  height: 20px;
  background: white;
  border-radius: 50%;
  position: absolute;
  top: 2px;
  left: 2px;
  transition: 0.3s;
}

/* ACTIVE (Worker Mode) */
.toggle-switch.active {
  background: #16a34a;
}

.toggle-switch.active .toggle-circle {
  left: 20px;

}
  </style>
</head>
<body>
  <div class="container">
    <div class="logo-wrap">
      <img src="taskmintlogo.png" class="logo-img" alt="TaskMint Logo">
    </div>

    <h1>Welcome Back!</h1>
    <p>Post a quick job and find someone local to help you.</p>


    <div class="card">
      <h2>Your Activity</h2>
      <p>Manage your task, messages, disputes, and profile.</p>

<button class="btn primary" onclick="window.location.href='post-job.html'">
  Post a Task
</button>

<button class="btn secondary" onclick="window.location.href='open-tasks.html'">
  View Open Tasks
</button>

<button class="btn secondary" onclick="window.location.href='past-tasks.html'">
  View Past Tasks
</button>

<button class="btn secondary" onclick="window.location.href='messages.html'">
  Message Center
</button>

<button class="btn secondary" onclick="window.location.href='disputes.html'">

</button>

<button class="btn secondary" onclick="window.location.href='profile.html'">

<div class="mode-toggle" onclick="toggleMode()">
<span id="modeLabel">Worker Dashboard</span>

  <div class="toggle-circle"></div>
  </div>
</div>
    </div>




  <script>
    function goToPostJob() {
      window.location.href = "post-job.html";
    }

    function goToMyJobs() {
      window.location.href = "my-jobs.html";
    }

    function goToMessages() {
      window.location.href = "messages.html";
    }

    function goToProfile() {
      window.location.href = "profile.html";
    }
   async function toggleMode() {
  const { data } = await supabaseClient.auth.getSession();

  if (!data.session) {
    window.location.href = "login.html";
    return;
  }

  const user = data.session.user;

  const { data: profile } = await supabaseClient
    .from("profiles")
    .select("account_type")
    .eq("id", user.id)
    .single();

  const newMode = profile.account_type === "customer" ? "worker" : "customer";

  await supabaseClient
    .from("profiles")
    .update({ account_type: newMode })
    .eq("id", user.id);

  if (newMode === "worker") {
    window.location.href = "tasks.html";
  } else {
    window.location.href = "customer-home.html";
  }
}

  window.location.href = "tasks.html";
}
  </script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseClient = window.supabase.createClient(
  "https://dbcthtjmtlumidpbucrc.supabase.co",
  "sb_publishable_3h7cO2Z8CDxZyEKDLRzvtg_1UJCLldJ"
);

async function protectPage() {
  const { data, error } = await supabaseClient.auth.getSession();

  if (error || !data.session) {
    window.location.href = "login.html";
    return null;
  }

  return data.session.user;
}

function updateToggleUI(mode) {
  const label = document.getElementById("modeLabel");
  const toggle = document.getElementById("toggleSwitch");

  if (mode === "worker") {
    label.innerText = "Worker Mode";
    toggle.classList.add("active");
  } else {
    label.innerText = "Customer Mode";
    toggle.classList.remove("active");
  }
}

async function loadMode() {
  const user = await protectPage();
  if (!user) return;

  const { data: profile, error } = await supabaseClient
    .from("profiles")
    .select("account_type")
    .eq("id", user.id)
    .single();

  if (error || !profile) {
    alert("Could not load profile.");
    return;
  }

  updateToggleUI(profile.account_type);
}

async function toggleMode() {
  const user = await protectPage();
  if (!user) return;

  const { data: profile, error: profileError } = await supabaseClient
    .from("profiles")
    .select("account_type")
    .eq("id", user.id)
    .single();

  if (profileError || !profile) {
    alert("Could not load profile.");
    return;
  }

  const newMode = profile.account_type === "customer" ? "worker" : "customer";

  const { error: updateError } = await supabaseClient
    .from("profiles")
    .update({ account_type: newMode })
    .eq("id", user.id);

  if (updateError) {
    alert(updateError.message);
    return;
  }

  updateToggleUI(newMode);

  setTimeout(() => {
    window.location.href = newMode === "worker"
      ? "tasks.html"
      : "customer-home.html";
  }, 300);
}

loadMode();
</script>
  
</body>
</html>
