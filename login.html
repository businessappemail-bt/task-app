<!DOCTYPE html>
<html>
<head>
  <title>TaskMint Customer Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg:          #ffffff;
      --surface:     #f2f7f4;
      --surface2:    #e6f4eb;
      --border:      #e2ebe5;
      --accent:      #0b7a28;
      --text:        #111111;
      --muted:       #6b7870;
      --danger:      #b00020;
    }

    body {
      margin: 0;
      font-family: 'Plus Jakarta Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      padding-bottom: 30px;
    }

    .bg-circle {
      position: fixed;
      border-radius: 50%;
      filter: blur(70px);
      opacity: 0.12;
      z-index: 0;
      animation: float 8s ease-in-out infinite;
    }

    .circle1 {
      width: 240px;
      height: 240px;
      background: var(--accent);
      top: -70px;
      left: -90px;
    }

    .circle2 {
      width: 220px;
      height: 220px;
      background: var(--accent);
      bottom: -60px;
      right: -70px;
      animation-delay: 2s;
    }

    .container {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 470px;
      min-height: 100vh;
      padding: 22px 16px 30px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .logo-wrap {
      text-align: center;
      margin-bottom: 16px;
      opacity: 0;
      animation: riseIn 0.35s 0.02s forwards;
    }

    .logo {
      width: 238px;
      max-width: 86%;
      filter: drop-shadow(0 8px 16px rgba(0,0,0,0.10));
      background: transparent;
      mix-blend-mode: multiply;
    }

    .hero-card {
      background: var(--accent);
      border-radius: 20px;
      padding: 22px 20px;
      color: #fff;
      margin-bottom: 16px;
      box-shadow: 0 6px 20px rgba(11,122,40,0.20);
      opacity: 0;
      animation: riseIn 0.35s 0.07s forwards;
    }

    .hero-title {
      font-size: 26px;
      font-weight: 800;
      margin-bottom: 6px;
      line-height: 1.1;
      letter-spacing: -0.4px;
    }

    .hero-sub {
      font-size: 13px;
      line-height: 1.5;
      color: rgba(255,255,255,0.82);
    }

    .feature-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 16px;
    }

    .feature-box {
      background: rgba(255,255,255,0.13);
      border: 1px solid rgba(255,255,255,0.18);
      padding: 13px 8px;
      border-radius: 15px;
      text-align: center;
    }

    .emoji-icon {
      font-size: 24px;
      margin-bottom: 6px;
    }

    .feature-text {
      font-size: 10.5px;
      font-weight: 700;
      line-height: 1.3;
      color: rgba(255,255,255,0.92);
    }

    .card {
      background: var(--surface);
      border-radius: 18px;
      padding: 18px 16px;
      border: 1px solid var(--border);
      opacity: 0;
      animation: riseIn 0.35s 0.12s forwards;
    }

    .section-title {
      text-align: left;
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 4px;
      color: var(--text);
      letter-spacing: -0.3px;
    }

    .section-sub {
      color: var(--muted);
      font-size: 12.5px;
      line-height: 1.45;
      margin-bottom: 12px;
    }

    .field-label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin: 12px 0 5px;
    }

    input {
      width: 100%;
      padding: 12px 13px;
      border-radius: 11px;
      border: 1px solid var(--border);
      margin-top: 0;
      font-size: 13.5px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      outline: none;
      background: #fff;
      color: var(--text);
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(11,122,40,0.10);
    }

    .stay-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 14px;
      padding: 12px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 13px;
    }

    .stay-row input {
      width: 16px;
      height: 16px;
      margin: 0;
      accent-color: var(--accent);
    }

    .stay-row label {
      font-size: 13px;
      color: var(--muted);
      font-weight: 600;
    }

    button {
      font-family: 'Plus Jakarta Sans', sans-serif;
      transition: opacity 0.18s, transform 0.18s;
    }

    button:hover {
      opacity: 0.88;
      transform: translateY(-1px);
    }

    button:disabled {
      opacity: 0.65;
      transform: none;
      cursor: not-allowed;
    }

    .login-btn {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 12px;
      background: var(--accent);
      color: #fff;
      font-size: 13.5px;
      font-weight: 700;
      margin-top: 14px;
      cursor: pointer;
    }

    .create-btn {
      width: 100%;
      padding: 13px;
      border-radius: 12px;
      border: none;
      background: var(--text);
      color: #fff;
      font-size: 13.5px;
      font-weight: 700;
      margin-top: 10px;
      cursor: pointer;
    }

    .forgot-link {
      display: block;
      text-align: center;
      margin-top: 14px;
      color: var(--accent);
      font-size: 13px;
      font-weight: 700;
      text-decoration: none;
    }

    .status {
      text-align: center;
      margin-top: 14px;
      min-height: 18px;
      font-size: 13px;
      font-weight: 700;
      line-height: 1.4;
    }

    .bottom-link {
      text-align: center;
      margin-top: 16px;
      opacity: 0;
      animation: riseIn 0.35s 0.17s forwards;
    }

    .bottom-link a {
      color: var(--accent);
      font-weight: 700;
      text-decoration: none;
      font-size: 13px;
    }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-15px); }
      100% { transform: translateY(0px); }
    }

    @keyframes riseIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

  </style>
</head>

<body>

<div class="bg-circle circle1"></div>
<div class="bg-circle circle2"></div>

<div class="container">

  <div class="logo-wrap">
    <img
      src="taskmintlogo-transparent.png"
      class="logo"
      alt="TaskMint Logo"
    >
  </div>

  <div class="hero-card">

    <div class="hero-title">
      Get Tasks Done Faster
    </div>

    <div class="hero-sub">
      Connect with local workers, request quotes, message directly, and manage your tasks in one place.
    </div>

    <div class="feature-row">

      <div class="feature-box">
        <div class="emoji-icon">💬</div>
        <div class="feature-text">
          Message Workers
        </div>
      </div>

      <div class="feature-box">
        <div class="emoji-icon">⚡</div>
        <div class="feature-text">
          Fast Quotes
        </div>
      </div>

      <div class="feature-box">
        <div class="emoji-icon">📋</div>
        <div class="feature-text">
          Track Tasks
        </div>
      </div>

    </div>

  </div>

  <div class="card">

    <div class="section-title">
      Welcome Back
    </div>

    <div class="section-sub">
      Log in to manage your posted tasks, messages, quotes, and account.
    </div>

    <label class="field-label" for="email">Email Address</label>
    <input
      id="email"
      type="email"
      placeholder="Email Address"
    >

    <label class="field-label" for="password">Password</label>
    <input
      id="password"
      type="password"
      placeholder="Password"
    >

    <div class="stay-row">
      <input type="checkbox" id="stayLoggedIn">
      <label for="stayLoggedIn">Stay logged in</label>
    </div>

    <button
      class="login-btn"
      onclick="login()">
      Log In
    </button>

    <button
      class="create-btn"
      onclick="window.location.href='signup.html'">
      Create Account
    </button>

    <a
      class="forgot-link"
      href="customer-forgot-password.html">
      Forgot Password?
    </a>

    <div
      id="status"
      class="status">
    </div>

  </div>

  <div class="bottom-link">
    <a href="index.html">
      ← Back
    </a>
  </div>

</div>

<script>

const SUPABASE_URL =
  "https://dbcthtjmtlumidpbucrc.supabase.co";

const SUPABASE_ANON_KEY =
  "sb_publishable_3h7cO2Z8CDxZyEKDLRzvtg_1UJCLldJ";

const supabaseClient =
  window.supabase.createClient(
    SUPABASE_URL,
    SUPABASE_ANON_KEY
  );

async function login() {

  const email =
    document.getElementById("email").value.trim();

  const password =
    document.getElementById("password").value;

  const status =
    document.getElementById("status");

  const loginButton =
    document.querySelector(".login-btn");

  status.style.color = "#b00020";
  status.innerText = "";

  if (!email || !password) {

    status.innerText =
      "Enter your email and password.";

    return;
  }

  loginButton.disabled = true;
  loginButton.innerText = "Logging In...";

  const { data, error } =
    await supabaseClient.auth.signInWithPassword({
      email,
      password
    });

  if (error) {

    status.innerText = error.message;

    loginButton.disabled = false;
    loginButton.innerText = "Log In";

    return;
  }

  const authUser =
    data && data.user ? data.user : null;

  if (!authUser) {

    status.innerText = "Login failed.";

    loginButton.disabled = false;
    loginButton.innerText = "Log In";

    return;
  }

  const { data: profile } =
    await supabaseClient
      .from("customer_profiles")
      .select("account_type, status")
      .eq("id", authUser.id)
      .maybeSingle();

  /* BLOCK DEACTIVATED ACCOUNTS */
  if (
    profile &&
    profile.status === "deactivated"
  ) {

    await supabaseClient.auth.signOut();

    localStorage.clear();

    status.innerText =
      "This account has been deactivated and can no longer be accessed.";

    loginButton.disabled = false;
    loginButton.innerText = "Log In";

    return;
  }

 if (
  profile &&
  profile.account_type === "worker"
) {

  await supabaseClient.auth.signOut();

  localStorage.clear();

  status.innerText =
    "This is the customer login. Please log in through the worker app or create a customer account.";

  loginButton.disabled = false;
  loginButton.innerText = "Log In";

  return;
}

  status.style.color = "#0b7a28";
  status.innerText = "Login successful.";

  window.location.href =
    "customer-home.html";
}

</script>

</body>
</html>
