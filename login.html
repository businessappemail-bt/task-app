<!DOCTYPE html>
<html>
<head>
  <title>Login - TaskMint</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f5f5f5;
      padding: 20px;
    }

    .container {
      max-width: 400px;
      margin: 60px auto;
      background: white;
      padding: 20px;
      border-radius: 12px;
    }

    h2 {
      text-align: center;
    }

    input, button {
      width: 100%;
      padding: 14px;
      margin-top: 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    button {
      background: green;
      color: white;
      border: none;
      cursor: pointer;
    }

    #status {
      margin-top: 10px;
      text-align: center;
    }

    .link {
      text-align: center;
      margin-top: 15px;
    }
  </style>
</head>

<body>
  <div class="container">
    <h2>Login</h2>

    <input id="email" placeholder="Email" />
    <input id="password" type="password" placeholder="Password" />
<div style="width:100%; display:flex; justify-content:center; align-items:center; gap:8px; margin:12px 0;">
  <input type="checkbox" id="stayLoggedIn" style="width:16px; height:16px; margin:0;">
  <label for="stayLoggedIn" style="margin:0; font-size:16px; line-height:16px;">Stay logged in</label>
</div>


    <button onclick="login()">Log In</button>

    <p id="status"></p>

    <div class="link">
      <a href="index.html">Back</a>
    </div>
  </div>

 <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
  const SUPABASE_URL = "https://dbcthtjmtlumidpbucrc.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_3h7cO2Z8CDxZyEKDLRzvtg_1UJCLldJ";

  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  async function login() {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const status = document.getElementById("status");

    status.innerText = "";

    if (!email || !password) {
      status.innerText = "Enter your email and password.";
      return;
    }

    const { data, error } = await supabaseClient.auth.signInWithPassword({
      email: email,
      password: password
    });

    if (error) {
      status.innerText = error.message;
      return;
    }

    window.location.href = "customer-home.html";
  }

  async function logoutOldSession() {
    await supabaseClient.auth.signOut();
  }

  logoutOldSession();
</script>
  
</body>
</html>
