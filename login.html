<script>
const SUPABASE_URL =
  "https://dbcthtjmtlumidpbucrc.supabase.co";

const SUPABASE_ANON_KEY =
  "sb_publishable_3h7cO2Z8CDxZyEKDLRzvtg_1UJCLldJ";

const supabaseClient =
  window.supabase.createClient(
    SUPABASE_URL,
    SUPABASE_ANON_KEY
  );

async function login() {

  const email =
    document.getElementById("email").value.trim();

  const password =
    document.getElementById("password").value;

  const status =
    document.getElementById("status");

  status.style.color = "#b00020";
  status.innerText = "";

  if (!email || !password) {
    status.innerText =
      "Enter your email and password.";
    return;
  }

  const loginButton =
    document.querySelector("button");

  loginButton.disabled = true;
  loginButton.innerText = "Logging In...";

  const { data, error } =
    await supabaseClient.auth.signInWithPassword({
      email: email,
      password: password
    });

  if (error) {
    status.innerText = error.message;

    loginButton.disabled = false;
    loginButton.innerText = "Log In";

    return;
  }

  const authUser =
    data && data.user ? data.user : null;

  if (!authUser) {
    status.innerText = "Login failed.";

    loginButton.disabled = false;
    loginButton.innerText = "Log In";

    return;
  }

  const { data: profile } =
    await supabaseClient
      .from("profiles")
      .select("account_type")
      .eq("id", authUser.id)
      .maybeSingle();

  if (
    profile &&
    profile.account_type &&
    profile.account_type !== "customer"
  ) {

    await supabaseClient.auth.signOut();

    status.innerText =
      "Please log in through the worker app.";

    loginButton.disabled = false;
    loginButton.innerText = "Log In";

    return;
  }

  status.style.color = "#0b7a28";
  status.innerText = "Login successful.";

  window.location.href =
    "customer-home.html";
}

async function logoutOldSession() {
  await supabaseClient.auth.signOut();
}

logoutOldSession();
</script>
