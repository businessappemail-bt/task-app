
<!DOCTYPE html>
<html>
<head>
  <title>TaskMint Customer Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      background: linear-gradient(180deg, #ebfff0 0%, #f5f5f5 100%);
      position: relative;
    }

    .bg-circle {
      position: fixed;
      border-radius: 50%;
      filter: blur(70px);
      opacity: 0.18;
      z-index: 0;
      animation: float 8s ease-in-out infinite;
    }

    .circle1 {
      width: 240px;
      height: 240px;
      background: #22c55e;
      top: -60px;
      left: -80px;
    }

    .circle2 {
      width: 220px;
      height: 220px;
      background: #16a34a;
      bottom: -50px;
      right: -60px;
      animation-delay: 2s;
    }

    @keyframes float {
      0% {
        transform: translateY(0px);
      }

      50% {
        transform: translateY(-15px);
      }

      100% {
        transform: translateY(0px);
      }
    }

    .container {
      position: relative;
      z-index: 2;
      max-width: 430px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 24px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .logo-wrap {
      text-align: center;
      margin-bottom: 20px;
      animation: fadeUp 0.7s ease;
    }

    .logo {
      width: 270px;
      max-width: 100%;
      animation: logoFloat 4s ease-in-out infinite;
      filter: drop-shadow(0 10px 18px rgba(0,0,0,0.12));
    }

    @keyframes logoFloat {
      0% {
        transform: translateY(0px);
      }

      50% {
        transform: translateY(-8px);
      }

      100% {
        transform: translateY(0px);
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(18px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .hero-card {
      background: linear-gradient(135deg, #0b7a28, #1cb74d);
      border-radius: 28px;
      padding: 24px;
      color: white;
      margin-bottom: 18px;
      box-shadow: 0 18px 35px rgba(11,122,40,0.22);
      animation: fadeUp 0.9s ease;
      overflow: hidden;
      position: relative;
    }

    .hero-card::before {
      content: "";
      position: absolute;
      width: 180px;
      height: 180px;
      background: rgba(255,255,255,0.08);
      border-radius: 50%;
      top: -70px;
      right: -60px;
    }

    .hero-title {
      font-size: 30px;
      font-weight: 900;
      margin-bottom: 10px;
      line-height: 1.1;
      position: relative;
      z-index: 2;
    }

    .hero-sub {
      font-size: 14px;
      line-height: 1.55;
      opacity: 0.96;
      position: relative;
      z-index: 2;
    }

    .feature-row {
      display: flex;
      gap: 10px;
      margin-top: 18px;
      position: relative;
      z-index: 2;
    }

    .feature-box {
      flex: 1;
      background: rgba(255,255,255,0.13);
      border: 1px solid rgba(255,255,255,0.18);
      padding: 14px 10px;
      border-radius: 18px;
      text-align: center;
      backdrop-filter: blur(10px);
      animation: cardFloat 4s ease-in-out infinite;
    }

    .feature-box:nth-child(2) {
      animation-delay: 1s;
    }

    .feature-box:nth-child(3) {
      animation-delay: 2s;
    }

    @keyframes cardFloat {
      0% {
        transform: translateY(0px);
      }

      50% {
        transform: translateY(-6px);
      }

      100% {
        transform: translateY(0px);
      }
    }

    .emoji-icon {
      font-size: 34px;
      margin-bottom: 8px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.08);
      }

      100% {
        transform: scale(1);
      }
    }

    .feature-text {
      font-size: 12px;
      font-weight: 700;
      line-height: 1.35;
    }

    .card {
      background: white;
      border-radius: 24px;
      padding: 22px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      border: 1px solid #edf1ee;
      animation: fadeUp 1s ease;
    }

    .section-title {
      text-align: center;
      font-size: 24px;
      font-weight: 900;
      margin-bottom: 18px;
      color: #111;
    }

    input {
      width: 100%;
      padding: 15px;
      border-radius: 16px;
      border: 1px solid #d8d8d8;
      margin-top: 12px;
      font-size: 15px;
      outline: none;
      background: #fafafa;
      transition: 0.2s;
    }

    input:focus {
      border-color: #16a34a;
      background: white;
      box-shadow: 0 0 0 4px rgba(22,163,74,0.10);
    }

    .stay-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      margin-top: 16px;
    }

    .stay-row input {
      width: 16px;
      height: 16px;
      margin: 0;
      accent-color: #16a34a;
    }

    .stay-row label {
      font-size: 14px;
      color: #444;
    }

    .login-btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 18px;
      background: linear-gradient(135deg, #0b7a28, #19b64c);
      color: white;
      font-size: 16px;
      font-weight: 900;
      margin-top: 18px;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 12px 22px rgba(11,122,40,0.20);
    }

    .login-btn:hover {
      transform: translateY(-2px) scale(1.01);
    }

    .create-btn {
      width: 100%;
      padding: 16px;
      border-radius: 18px;
      border: none;
      background: #111;
      color: white;
      font-size: 15px;
      font-weight: 900;
      margin-top: 14px;
      cursor: pointer;
      transition: 0.2s;
      position: relative;
      overflow: hidden;
    }

    .create-btn::before {
      content: "";
      position: absolute;
      top: 0;
      left: -120%;
      width: 100%;
      height: 100%;
      background: rgba(255,255,255,0.18);
      transform: skewX(-25deg);
      transition: 0.5s;
    }

    .create-btn:hover::before {
      left: 120%;
    }

    .create-btn:hover {
      transform: translateY(-2px);
    }

    .forgot-link {
      display: block;
      text-align: center;
      margin-top: 14px;
      color: #0b7a28;
      font-size: 14px;
      font-weight: 800;
      text-decoration: none;
    }

    .status {
      text-align: center;
      margin-top: 14px;
      min-height: 18px;
      font-size: 13px;
      font-weight: 800;
    }

    .bottom-link {
      text-align: center;
      margin-top: 20px;
    }

    .bottom-link a {
      color: #0b7a28;
      font-weight: 800;
      text-decoration: none;
      font-size: 14px;
    }

  </style>
</head>

<body>

<div class="bg-circle circle1"></div>
<div class="bg-circle circle2"></div>

<div class="container">

  <div class="logo-wrap">
    <img
      src="a_digital_vector_illustration_features_the_taskmin.png"
      class="logo"
    >
  </div>

  <div class="hero-card">

    <div class="hero-title">
      Get Tasks Done Faster
    </div>

    <div class="hero-sub">
      Connect with local workers, request quotes, message directly, and manage your tasks in one place.
    </div>

    <div class="feature-row">

      <div class="feature-box">
        <div class="emoji-icon">💬</div>
        <div class="feature-text">
          Message Workers
        </div>
      </div>

      <div class="feature-box">
        <div class="emoji-icon">⚡</div>
        <div class="feature-text">
          Fast Quotes
        </div>
      </div>

      <div class="feature-box">
        <div class="emoji-icon">📋</div>
        <div class="feature-text">
          Track Tasks
        </div>
      </div>

    </div>

  </div>

  <div class="card">

    <div class="section-title">
      Welcome Back
    </div>

    <input
      id="email"
      type="email"
      placeholder="Email Address"
    >

    <input
      id="password"
      type="password"
      placeholder="Password"
    >

    <div class="stay-row">
      <input type="checkbox" id="stayLoggedIn">
      <label for="stayLoggedIn">Stay logged in</label>
    </div>

    <button
      class="login-btn"
      onclick="login()">
      Log In
    </button>

    <button
      class="create-btn"
      onclick="window.location.href='customer-create-account.html'">
      Create Account
    </button>

    <a
      class="forgot-link"
      href="customer-forgot-password.html">
      Forgot Password?
    </a>

    <div
      id="status"
      class="status">
    </div>

  </div>

  <div class="bottom-link">
    <a href="index.html">
      ← Back
    </a>
  </div>

</div>

<script>

const SUPABASE_URL =
  "https://dbcthtjmtlumidpbucrc.supabase.co";

const SUPABASE_ANON_KEY =
  "sb_publishable_3h7cO2Z8CDxZyEKDLRzvtg_1UJCLldJ";

const supabaseClient =
  window.supabase.createClient(
    SUPABASE_URL,
    SUPABASE_ANON_KEY
  );

async function login() {

  const email =
    document.getElementById("email").value.trim();

  const password =
    document.getElementById("password").value;

  const status =
    document.getElementById("status");

  const loginButton =
    document.querySelector(".login-btn");

  status.style.color = "#b00020";
  status.innerText = "";

  if (!email || !password) {

    status.innerText =
      "Enter your email and password.";

    return;
  }

  loginButton.disabled = true;
  loginButton.innerText = "Logging In...";

  const { data, error } =
    await supabaseClient.auth.signInWithPassword({
      email,
      password
    });

  if (error) {

    status.innerText = error.message;

    loginButton.disabled = false;
    loginButton.innerText = "Log In";

    return;
  }

  const authUser =
    data && data.user ? data.user : null;

  if (!authUser) {

    status.innerText = "Login failed.";

    loginButton.disabled = false;
    loginButton.innerText = "Log In";

    return;
  }

  const { data: profile } =
    await supabaseClient
      .from("profiles")
      .select("account_type")
      .eq("id", authUser.id)
      .maybeSingle();

  if (
    profile &&
    profile.account_type &&
    profile.account_type !== "customer"
  ) {

    await supabaseClient.auth.signOut();

    status.innerText =
      "Please use the worker login.";

    loginButton.disabled = false;
    loginButton.innerText = "Log In";

    return;
  }

  status.style.color = "#0b7a28";
  status.innerText = "Login successful.";

  window.location.href =
    "customer-home.html";
}

</script>

</body>
</html>
