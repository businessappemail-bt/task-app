<!DOCTYPE html>
<html>
<head>
  <title>Post Job - TaskMint</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      color: #111;
    }

    .container {
      max-width: 420px;
      margin: 0 auto;
      padding: 30px 20px 100px;
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
    }

    p.subtext {
      text-align: center;
      color: #666;
      margin-bottom: 25px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    input, textarea, select {
      width: 100%;
      padding: 14px;
      margin-bottom: 14px;
      border: 1px solid #ccc;
      border-radius: 10px;
      font-size: 16px;
      box-sizing: border-box;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 8px;
    }

    .primary {
      background: green;
      color: white;
    }

    .secondary {
      background: white;
      color: #111;
      border: 1px solid #ccc;
    }

    #status {
      text-align: center;
      margin-top: 16px;
      color: #333;
    }

    .nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: white;
      border-top: 1px solid #ddd;
      display: flex;
      justify-content: space-around;
      padding: 12px 0;
      max-width: 420px;
      margin: 0 auto;
    }

    .nav a {
      text-decoration: none;
      color: #555;
      font-size: 14px;
    }

    .nav .active {
      color: green;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Post a Job</h1>
    <p class="subtext">Tell people what you need help with.</p>

   <div class="card" id="step1">

  <h3>What is the task location?</h3>

  <input id="street_address" type="text" placeholder="Street address">

  <input id="unit" type="text" placeholder="Optional unit or apt #">

  <input id="city" type="text" placeholder="City">

  <input id="state" type="text" placeholder="State">

  <input id="zipcode" type="text" placeholder="Zip_code">

  <button class="primary" onclick="goToStep2()">Continue</button>

</div>
    <div class="card" id="step2" style="display:none;">

  <h3>What do you need help with?</h3>

  <button onclick="selectCategory('Moving Help')">Moving Help</button>
  <button onclick="selectCategory('Furniture Assembly')">Furniture Assembly</button>
  <button onclick="selectCategory('Cleaning')">Cleaning</button>
  <button onclick="selectCategory('Yard Work')">Yard Work</button>
  <button onclick="selectCategory('Handyman Help')">Handyman Help</button>
  <button onclick="selectCategory('Errands')">Errands</button>
  <button onclick="selectCategory('Other')">Other</button>
      
</div>
    <div class="card" id="step3" style="display:none;">

  <h3>Describe your task</h3>

  <input id="title" type="text" placeholder="Job title">

  <textarea id="description" placeholder="Describe the job"></textarea>

  <button class="primary" onclick="goToStep4()">Continue</button>

</div>
      <div class="card" id="step4" style="display:none;">

  <h3>What is your budget?</h3>

  <input id="budget" type="number" placeholder="Budget">

  <button class="primary" onclick="goToStep5()">Continue</button>

</div>

<div class="card" id="step5" style="display:none;">

  <h3>When do you need this done?</h3>

  <select id="schedule">
    <option value="">Select</option>
    <option value="Today">Today</option>
    <option value="Within 3 days">Within 3 days</option>
    <option value="Within a week">Within a week</option>
    <option value="Flexible">Flexible</option>
  </select>

  <button class="primary" onclick="postJob()">Post Task</button>

</div>

  <div class="nav">
    <a href="customer-home.html">Home</a>
    <a href="my-jobs.html">My Jobs</a>
    <a href="messages.html">Messages</a>
    <a href="profile.html">Profile</a>
  </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseClient = window.supabase.createClient(
  "https://dbcthtjmtlumidpbucrc.supabase.co",
  "sb_publishable_3h7cO2Z8CDxZyEKDLRzvtg_1UJC11dJ"
);

function goToStep2() {
  document.getElementById("step1").style.display = "none";
  document.getElementById("step2").style.display = "block";
}

function selectCategory(value) {
  window.selectedCategory = value;
  document.getElementById("step2").style.display = "none";
  document.getElementById("step3").style.display = "block";
}

function goToStep4() {
  document.getElementById("step3").style.display = "none";
  document.getElementById("step4").style.display = "block";
}

function goToStep5() {
  document.getElementById("step4").style.display = "none";
  document.getElementById("step5").style.display = "block";
}

async function postJob() {
  const title = document.getElementById("title").value;
  const description = document.getElementById("description").value;
  const category = window.selectedCategory;
  const budget = document.getElementById("budget").value;
  const city = document.getElementById("city").value;
  const state = document.getElementById("state").value;
  const street_address = document.getElementById("street_address").value;
  const unit = document.getElementById("unit").value;
  const zip_code = document.getElementById("zip_code").value;
  const schedule = document.getElementById("schedule").value;
  const status = document.getElementById("status");

  
  status.innerText = "";

  if (!title || !description || !category || !budget || !city || !state || !street_address || !zip_code || !schedule) {
    status.innerText = "Please fill out all fields.";
    return;
  }

  const customerId = localStorage.getItem("taskmintUserId");

  if (!customerId) {
    status.innerText = "You must be logged in.";
    return;
  }

  const { error } = await supabaseClient
    .from("tasks")
    .insert([
      {
        title: title,
        description: description,
        category: category,
        price: budget,
        city: city,
        state: state,
        street_address: street_address,
        unit: unit,
        zip_code: zip_code,
        schedule_preference: schedule,
        status: "open",
        customer_id: customerId
      }
    ]);

  if (error) {
    status.innerText = error.message;
    return;
  }

  status.innerText = "Task posted successfully.";

  setTimeout(() => {
    window.location.href = "my-jobs.html";
  }, 1000);
}
</script>

</body>
</html>
