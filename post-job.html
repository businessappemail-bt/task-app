<!DOCTYPE html>
<html>
<head>
  <title>Post Job - TaskMint</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      color: #111;
    }

    .container {
      max-width: 420px;
      margin: 0 auto;
      padding: 30px 20px 100px;
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
    }

    p.subtext {
      text-align: center;
      color: #666;
      margin-bottom: 25px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    input, textarea, select {
      width: 100%;
      padding: 14px;
      margin-bottom: 14px;
      border: 1px solid #ccc;
      border-radius: 10px;
      font-size: 16px;
      box-sizing: border-box;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 8px;
    }

    .primary {
      background: green;
      color: white;
    }

    .secondary {
      background: white;
      color: #111;
      border: 1px solid #ccc;
    }

    #status {
      text-align: center;
      margin-top: 16px;
      color: #333;
    }

    .nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: white;
      border-top: 1px solid #ddd;
      display: flex;
      justify-content: space-around;
      padding: 12px 0;
      max-width: 420px;
      margin: 0 auto;
    }

    .nav a {
      text-decoration: none;
      color: #555;
      font-size: 14px;
    }

    .nav .active {
      color: green;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Post a Job</h1>
    <p class="subtext">Tell people what you need help with.</p>

    <div class="card">
      <input id="title" type="text" placeholder="Job title">
      
      <textarea id="description" placeholder="Describe the job"></textarea>

      <select id="category">
        <option value="">Select category</option>
        <option value="Help Moving">Help Moving</option>
        <option value="Furniture Assembly">Furniture Assembly</option>
        <option value="Cleaning">Cleaning</option>
        <option value="Yard Work">Yard Work</option>
        <option value="Handyman Help">Handyman Help</option>
        <option value="Errands">Errands</option>
        <option value="Other">Other</option>
      </select>

      <input id="budget" type="number" placeholder="Budget">

      <input id="city" type="text" placeholder="City">

      <input id="state" type="text" placeholder="State">

      <button class="primary" onclick="postJob()">Post Job</button>
      <button class="secondary" onclick="goBack()">Back to Home</button>

      <p id="status"></p>
    </div>
  </div>

  <div class="nav">
    <a href="customer-home.html">Home</a>
    <a href="my-jobs.html">My Jobs</a>
    <a href="messages.html">Messages</a>
    <a href="profile.html">Profile</a>
  </div>

 <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script>
  const supabaseClient = supabase.createClient(
    "https://dbcthtjmtlumidpbcurc.supabase.co",
    "sb_publishable_3h7cO2Z8CDxZyEKDLRzvtg_1UJCL1dJ"
  );

  async function postJob() {
    const title = document.getElementById("title").value;
    const description = document.getElementById("description").value;
    const category = document.getElementById("category").value;
    const budget = document.getElementById("budget").value;
    const city = document.getElementById("city").value;
    const state = document.getElementById("state").value;
    const status = document.getElementById("status");

    status.innerText = "";

    if (!title || !description || !category || !budget || !city || !state) {
      status.innerText = "Please fill out all fields.";
      return;
    }

const customerId = localStorage.getItem("taskmintUserId");

if (!customerId) {
  status.innerText = "You must be logged in.";
  return;
}

    if (!customerid) {
      status.innerText = "You must be logged in.";
      return;
    }

    const { error } = await supabaseClient
      .from("tasks")
      .insert([
        {
          title: title,
          description: description,
          category: category,
          price: budget,
          city: city,
          state: state,
          status: "open",
          customer_id: customerid
        }
      ]);

    if (error) {
      status.innerText = error.message;
      return;
    }

    status.innerText = "Job posted successfully.";

    document.getElementById("title").value = "";
    document.getElementById("description").value = "";
    document.getElementById("category").value = "";
    document.getElementById("budget").value = "";
    document.getElementById("city").value = "";
    document.getElementById("state").value = "";
  }

  function goBack() {
    window.location.href = "customer-home.html";
  }
</script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

async function protectPage() {
  const { data, error } = await supabaseClient.auth.getSession();

  if (error || !data.session) {
    window.location.href = "login.html";
    return;
  }
}

protectPage();

</body>
</html>
