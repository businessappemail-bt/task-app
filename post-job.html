<!DOCTYPE html>
<html>
<head>
<title>Post a Task - TaskMint</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --bg: #ffffff;
  --surface: #f2f7f4;
  --surface2: #e6f4eb;
  --card: #ffffff;
  --border: #e2ebe5;
  --accent: #0b7a28;
  --accent2: #19b64c;
  --text: #111111;
  --muted: #6b7870;
  --danger: #b00020;
  --warn-bg: #fffbeb;
  --warn-border: #f0c040;
  --warn-text: #7a4f00;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background:
    radial-gradient(circle at top left, rgba(11,122,40,0.10), transparent 30%),
    linear-gradient(180deg, #ffffff 0%, #f7faf8 100%);
  color: var(--text);
  padding-bottom: 40px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.container {
  width: 100%;
  max-width: 470px;
  padding: 0 16px 30px;
}

.top-bar {
  position: sticky;
  top: 0;
  z-index: 50;
  width: 100%;
  max-width: 470px;
  background: rgba(255,255,255,0.97);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 13px 20px;
  margin: 0 -16px 20px;
}

.back {
  color: var(--accent);
  font-weight: 800;
  cursor: pointer;
  font-size: 14px;
}

.step-pill {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--accent);
  border-radius: 999px;
  padding: 8px 12px;
  font-size: 11.5px;
  font-weight: 800;
}

.hero {
  background: var(--accent);
  color: white;
  border-radius: 22px;
  padding: 24px 20px;
  margin-bottom: 16px;
  box-shadow: 0 8px 24px rgba(11,122,40,0.22);
  position: relative;
  overflow: hidden;
  opacity: 0;
  animation: riseIn 0.35s 0.05s forwards;
}

.hero::before {
  content: "";
  position: absolute;
  width: 155px;
  height: 155px;
  border-radius: 50%;
  background: rgba(255,255,255,0.10);
  top: -65px;
  right: -55px;
}

.hero::after {
  content: "";
  position: absolute;
  width: 92px;
  height: 92px;
  border-radius: 50%;
  background: rgba(255,255,255,0.07);
  bottom: -45px;
  left: -35px;
}

.hero h1 {
  margin: 0 0 7px;
  font-size: 29px;
  font-weight: 800;
  line-height: 1.08;
  letter-spacing: -0.5px;
  position: relative;
  z-index: 2;
}

.hero p {
  margin: 0;
  font-size: 13px;
  line-height: 1.5;
  color: rgba(255,255,255,0.82);
  position: relative;
  z-index: 2;
}

.card {
  background: var(--surface);
  border-radius: 22px;
  padding: 16px;
  border: 1px solid var(--border);
  opacity: 0;
  animation: riseIn 0.35s 0.12s forwards;
}

.step-heading {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 15px;
  margin-bottom: 14px;
}

.step-heading h3,
#dateStep h3,
#pickupAddressStep h3,
#dropoffAddressStep h3,
#reviewStep h3,
#questionStep h3 {
  font-size: 20px;
  font-weight: 800;
  line-height: 1.15;
  margin: 0 0 6px;
  letter-spacing: -0.2px;
}

.subtext {
  color: var(--muted);
  font-size: 13px;
  line-height: 1.5;
  margin: 0 0 12px;
}

.category-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

button,
input,
select,
textarea {
  width: 100%;
  box-sizing: border-box;
  padding: 12px 13px;
  margin-top: 10px;
  border-radius: 13px;
  border: 1px solid var(--border);
  font-size: 14px;
  font-family: Arial, sans-serif;
  outline: none;
}

input,
select,
textarea {
  background: #fff;
  color: var(--text);
}

input::placeholder,
textarea::placeholder {
  color: #8b9790;
}

input:focus,
select:focus,
textarea:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(11,122,40,0.10);
}

button {
  background: var(--accent);
  color: white;
  border: none;
  cursor: pointer;
  font-weight: 800;
  transition: opacity 0.18s, transform 0.18s, box-shadow 0.18s;
}

button:hover {
  opacity: 0.9;
  transform: translateY(-1px);
  box-shadow: 0 6px 14px rgba(11,122,40,0.12);
}

.cancel-btn {
  background: var(--danger);
  color: white;
}

.action-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.secondary {
  background: #fff;
  color: var(--text);
  border: 1px solid var(--border);
}

.option {
  background: #fff;
  color: var(--text);
  border: 1px solid var(--border);
  text-align: left;
  min-height: 118px;
  box-shadow: none;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  position: relative;
  overflow: hidden;
}

.option::before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 4px;
  background: var(--surface2);
}

.option:hover {
  border-color: #a3cfb0;
  box-shadow: 0 6px 16px rgba(11,122,40,0.12);
}

.option-title {
  display: block;
  font-weight: 800;
  margin-bottom: 7px;
  font-size: 14px;
  position: relative;
  z-index: 2;
}

.option-sub {
  display: block;
  color: var(--muted);
  font-size: 12px;
  line-height: 1.35;
  font-weight: 600;
  position: relative;
  z-index: 2;
}

textarea {
  min-height: 112px;
  resize: vertical;
}

.hidden {
  display: none;
}

.checkbox-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 10px;
  background: #fff;
  border: 1px solid var(--border);
  padding: 12px;
  border-radius: 13px;
  font-size: 13.5px;
  color: var(--text);
}

.checkbox-row input {
  width: auto;
  margin: 0;
  accent-color: var(--accent);
}

#status {
  margin-top: 14px;
  text-align: center;
  font-weight: 800;
  color: var(--danger);
  font-size: 13px;
  line-height: 1.4;
}

.review-box {
  background: #fff;
  border-radius: 18px;
  padding: 15px;
  margin-top: 10px;
  border: 1px solid var(--border);
  font-size: 13.5px;
  line-height: 1.55;
}

.review-box p {
  margin: 0 0 9px;
  padding-bottom: 8px;
  border-bottom: 1px solid #edf1ee;
}

.review-box p:last-child {
  border-bottom: none;
}

.review-box hr {
  border: none;
  border-top: 1px solid var(--border);
  margin: 12px 0;
}

.selected-address {
  background: var(--surface2);
  border: 1px solid #cdebd5;
  padding: 12px;
  border-radius: 14px;
  margin-top: 10px;
  font-size: 13.5px;
  color: var(--accent);
  font-weight: 800;
}

.help-box,
.code-note {
  background: var(--warn-bg);
  border: 1px solid var(--warn-border);
  color: var(--warn-text);
  border-radius: 14px;
  padding: 12px;
  margin: 12px 0;
  font-size: 12.5px;
  line-height: 1.5;
  font-weight: 700;
}

.price-box {
  background: var(--surface2);
  border: 1px solid #cdebd5;
  color: var(--accent);
  border-radius: 14px;
  padding: 12px;
  margin: 12px 0;
  font-size: 12.5px;
  line-height: 1.5;
  font-weight: 800;
}

.field-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.progress {
  height: 8px;
  background: #dceee2;
  border-radius: 999px;
  overflow: hidden;
  margin-bottom: 14px;
}

.progress-bar {
  height: 100%;
  width: 0%;
  background: var(--accent);
  transition: 0.25s;
}

.modern-step-card {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 15px;
  margin-bottom: 14px;
}

.question-shell {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 15px;
}

.question-shell select,
.question-shell input,
.question-shell textarea {
  margin-top: 10px;
}

.date-panel {
  display: grid;
  gap: 12px;
}

.date-icon-row {
  display: flex;
  align-items: flex-start;
  gap: 12px;
}

.step-icon {
  width: 42px;
  height: 42px;
  border-radius: 13px;
  background: var(--surface2);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--accent);
  font-size: 20px;
  flex-shrink: 0;
}

.address-shell {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 15px;
  margin-bottom: 14px;
}

.address-label {
  font-size: 11px;
  font-weight: 800;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 0.6px;
  margin-bottom: 8px;
}

.address-help {
  color: var(--muted);
  font-size: 12px;
  line-height: 1.45;
  margin-top: 8px;
}

.input-section-title {
  color: var(--muted);
  font-size: 11.5px;
  font-weight: 800;
  margin: 0 0 2px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.review-header-card {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 15px;
  margin-bottom: 12px;
}

.time-picker-modern {
  display: grid;
  gap: 10px;
  margin-top: 12px;
}

.time-display-card {
  background: var(--surface2);
  border: 1px solid #cdebd5;
  color: var(--accent);
  border-radius: 16px;
  padding: 14px;
  font-size: 14px;
  font-weight: 800;
  text-align: center;
}

.time-chip-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.time-chip {
  margin-top: 0;
  background: #fff;
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 13px 10px;
  font-size: 13px;
  font-weight: 800;
}

.time-chip.selected {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}

.custom-time-row {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 12px;
}

.custom-time-label {
  font-size: 11px;
  font-weight: 800;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 8px;
}

.custom-time-input {
  margin-top: 0;
}

.native-time-hidden {
  position: absolute;
  opacity: 0;
  pointer-events: none;
  height: 0;
  padding: 0;
  margin: 0;
  border: 0;
}

gmp-place-autocomplete {
  width: 100%;
  display: block;
  margin-top: 10px;
  color-scheme: light;
  --gmpx-color-surface: #ffffff;
  --gmpx-color-on-surface: #111111;
  --gmpx-color-primary: #0b7a28;
  --gmpx-color-outline: #e2ebe5;
  --gmpx-font-family-base: Arial, sans-serif;
}

gmp-place-autocomplete input {
  background: #fff !important;
  color: #111 !important;
  border: 1px solid var(--border) !important;
  border-radius: 13px !important;
  padding: 13px !important;
  font-size: 14px !important;
  font-family: Arial, sans-serif !important;
  box-shadow: none !important;
}

gmp-place-autocomplete::part(input) {
  background: #fff !important;
  color: #111 !important;
  border: 1px solid var(--border) !important;
  border-radius: 13px !important;
  padding: 13px !important;
  font-size: 14px !important;
  font-family: Arial, sans-serif !important;
}

gmp-place-autocomplete::part(input-field) {
  background: #fff !important;
  color: #111 !important;
}

gmp-place-autocomplete::part(prediction-list),
gmp-place-autocomplete::part(listbox),
gmp-place-autocomplete::part(panel) {
  background: #fff !important;
  color: #111 !important;
  border: 1px solid var(--border) !important;
  border-radius: 14px !important;
  box-shadow: 0 12px 28px rgba(0,0,0,0.14) !important;
  overflow: hidden !important;
}

gmp-place-autocomplete::part(prediction-row),
gmp-place-autocomplete::part(option),
gmp-place-autocomplete::part(place-title),
gmp-place-autocomplete::part(place-address) {
  background: #fff !important;
  color: #111 !important;
}

.pac-container {
  z-index: 999999 !important;
  background: #fff !important;
  color: #111 !important;
  border: 1px solid var(--border) !important;
  border-radius: 14px !important;
  box-shadow: 0 12px 28px rgba(0,0,0,0.14) !important;
  overflow: hidden !important;
  font-family: Arial, sans-serif !important;
}

.pac-item {
  background: #fff !important;
  color: #111 !important;
  border-top: 1px solid #edf1ee !important;
  padding: 10px 12px !important;
  font-size: 13px !important;
}

.pac-item:hover {
  background: var(--surface) !important;
}

.pac-item-query,
.pac-matched,
.pac-item span {
  color: #111 !important;
}

.pac-icon {
  filter: none !important;
}

.address-autocomplete-wrap {
  position: relative;
  width: 100%;
}

.address-suggestion-list {
  display: none;
  position: absolute;
  top: calc(100% + 4px);
  left: 0;
  right: 0;
  z-index: 999999;
  background: #fff;
  color: #111;
  border: 1px solid var(--border);
  border-radius: 14px;
  box-shadow: 0 12px 28px rgba(0,0,0,0.14);
  overflow: hidden;
  font-family: Arial, sans-serif;
}

.address-suggestion-list.show {
  display: block;
}

.address-suggestion-item {
  width: 100%;
  margin: 0;
  padding: 11px 12px;
  background: #fff;
  color: #111;
  border: none;
  border-bottom: 1px solid #edf1ee;
  border-radius: 0;
  box-shadow: none;
  text-align: left;
  font-size: 13px;
  font-weight: 700;
  line-height: 1.35;
}

.address-suggestion-item:hover {
  background: var(--surface);
  transform: none;
  box-shadow: none;
}

@keyframes riseIn {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

@media (max-width: 360px) {
  .hero h1 {
    font-size: 25px;
  }

  .category-grid,
  .field-grid,
  .action-row {
    grid-template-columns: 1fr;
  }

  .option {
    min-height: auto;
  }
}
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<div class="container">

  <div class="top-bar">
    <div class="back" onclick="goBack()">← Back</div>
    <div id="stepPill" class="step-pill">Choose task</div>
  </div>

  <div class="hero">
    <h1 id="pageTitle">Post a Task</h1>
    <p id="pageSubtext">Choose what you need help with. Workers will review the details and send quotes.</p>
  </div>

  <div class="card">

    <div id="categoryStep">
      <div class="step-heading">
        <h3>Select a task type</h3>
        <p class="subtext">Pick the category that best matches what you need done.</p>
      </div>

      <div class="category-grid">
        <button class="option" onclick="selectCategory('Moving')">
          <span class="option-title">🚚 Moving</span>
          <span class="option-sub">Furniture, rooms, drop-off, stairs.</span>
        </button>

        <button class="option" onclick="selectCategory('TV Mounting')">
          <span class="option-title">📺 TV Mounting</span>
          <span class="option-sub">Mount type, wall type, wire hiding.</span>
        </button>

        <button class="option" onclick="selectCategory('Furniture Assembly')">
          <span class="option-title">🪑 Assembly</span>
          <span class="option-sub">Furniture, tools, number of items.</span>
        </button>

        <button class="option" onclick="selectCategory('Cleaning')">
          <span class="option-title">🧽 Cleaning</span>
          <span class="option-sub">Deep, move-out, rooms, bathrooms.</span>
        </button>

        <button class="option" onclick="selectCategory('Trash Removal')">
          <span class="option-title">🗑️ Trash Removal</span>
          <span class="option-sub">Bags, bulky items, junk removal.</span>
        </button>

        <button class="option" onclick="selectCategory('Errands')">
          <span class="option-title">🛍️ Errands</span>
          <span class="option-sub">Pickup, drop-off, local errands.</span>
        </button>

        <button class="option" onclick="selectCategory('Handywork')">
          <span class="option-title">🔧 Handywork</span>
          <span class="option-sub">Small installs, fixes, household help.</span>
        </button>

        <button class="option" onclick="selectCategory('Yard Work')">
          <span class="option-title">🌿 Yard Work</span>
          <span class="option-sub">Grass, trimming, edging, flower beds.</span>
        </button>

        <button class="option" onclick="selectCategory('Repairs')">
          <span class="option-title">🛠️ Repairs</span>
          <span class="option-sub">Describe the issue and repair needed.</span>
        </button>

        <button class="option" onclick="selectCategory('Auto Help')">
          <span class="option-title">🚗 Auto Help</span>
          <span class="option-sub">Jump starts, flat tires, lockouts, detailing.</span>
        </button>

        <button class="option" onclick="selectCategory('Home Organization')">
          <span class="option-title">🗂️ Home Organization</span>
          <span class="option-sub">Closets, pantry, garage, decluttering.</span>
        </button>

        <button class="option" onclick="selectCategory('Seasonal Services')">
          <span class="option-title">🍂 Seasonal Services</span>
          <span class="option-sub">Leaves, holiday lights, gutters, storm prep.</span>
        </button>

        <button class="option" onclick="selectCategory('Interior Decorating')">
          <span class="option-title">🖼️ Interior Decorating</span>
          <span class="option-sub">Wall decor, furniture placement, staging.</span>
        </button>

        <button class="option" onclick="selectCategory('Other')">
          <span class="option-title">✨ Other</span>
          <span class="option-sub">Anything else you need help with.</span>
        </button>
      </div>
    </div>

    <div id="questionStep" class="hidden">
      <div class="progress">
        <div id="progressBar" class="progress-bar"></div>
