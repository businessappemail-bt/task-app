<!DOCTYPE html>
<html>
<head>
  <title>Forgot Password - TaskMint</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
    :root {
      --bg:      #ffffff;
      --surface: #f2f7f4;
      --surface2:#e6f4eb;
      --border:  #e2ebe5;
      --accent:  #0b7a28;
      --text:    #111111;
      --muted:   #6b7870;
      --danger:  #b00020;
    }
 
    body {
      margin: 0;
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }
 
    .card {
      width: 100%;
      max-width: 420px;
      background: var(--surface);
      border-radius: 20px;
      border: 1px solid var(--border);
      padding: 32px 24px;
      opacity: 0;
      animation: riseIn 0.35s 0.05s forwards;
    }
 
    .logo-wrap {
      text-align: center;
      margin-bottom: 24px;
    }
 
    .logo-wrap .lock {
      width: 60px;
      height: 60px;
      border-radius: 18px;
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin: 0 auto 14px;
    }
 
    h1 {
      font-size: 24px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.4px;
      margin-bottom: 6px;
    }
 
    .sub {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.55;
    }
 
    label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin: 20px 0 5px;
    }
 
    input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 14px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      outline: none;
      background: #fff;
      color: var(--text);
    }
 
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(11,122,40,0.10);
    }
 
    button {
      width: 100%;
      padding: 13px;
      margin-top: 14px;
      border: none;
      border-radius: 12px;
      background: var(--accent);
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Plus Jakarta Sans', sans-serif;
      transition: opacity 0.18s, transform 0.18s;
    }
 
    button:hover {
      opacity: 0.88;
      transform: translateY(-1px);
    }
 
    #status {
      text-align: center;
      font-size: 13px;
      font-weight: 700;
      margin-top: 12px;
      line-height: 1.4;
      min-height: 20px;
    }
 
    .back-link {
      display: block;
      text-align: center;
      margin-top: 18px;
      font-size: 13px;
      font-weight: 600;
      color: var(--accent);
      text-decoration: none;
    }
 
    .back-link:hover { text-decoration: underline; }
 
    @keyframes riseIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
 
  <div class="card">
 
    <div class="logo-wrap">
      <div class="lock">🔑</div>
      <h1>Forgot Password?</h1>
      <p class="sub">Enter your email and we'll send you a reset link.</p>
    </div>
 
    <label for="email">Email Address</label>
    <input
      id="email"
      type="email"
      placeholder="Email address"
    >
 
    <button onclick="sendResetEmail()">Send Reset Link</button>
 
    <p id="status"></p>
 
    <a class="back-link" href="login.html">← Back to Login</a>
 
  </div>
 
<script>
const supabaseClient = window.supabase.createClient(
  "https://dbcthtjmtlumidpbucrc.supabase.co",
  "sb_publishable_3h7cO2Z8CDxZyEKDLRzvtg_1UJCLldJ"
);
async function sendResetEmail() {
  const email = document.getElementById("email").value.trim();
  const status = document.getElementById("status");
  status.style.color = "#b00020";
  status.innerText = "";
  if (!email) {
    status.innerText = "Enter your email address.";
    return;
  }
  const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.origin + "/customer-reset-password.html"
  });
  if (error) {
    status.innerText = error.message;
    return;
  }
  status.style.color = "#0b7a28";
  status.innerText = "Password reset email sent.";
}
</script>
</body>
</html>
