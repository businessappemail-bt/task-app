<!DOCTYPE html>
<html>
<head>
  <title>Forgot Password - TaskMint</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
  <div style="max-width:420px;margin:80px auto;padding:24px;font-family:Arial;">
    <h1>Forgot Password?</h1>

    <p>Enter your email and we’ll send you a reset link.</p>

    <input
      id="email"
      type="email"
      placeholder="Email Address"
      style="width:100%;padding:14px;border-radius:10px;border:1px solid #ccc;"
    >

    <button
      onclick="sendResetEmail()"
      style="width:100%;padding:14px;margin-top:12px;border:none;border-radius:10px;background:#0b7a28;color:white;font-weight:bold;"
    >
      Send Reset Link
    </button>

    <p id="status"></p>

    <a href="login.html">Back to Login</a>
  </div>

<script>
const supabaseClient = window.supabase.createClient(
  "https://dbcthtjmtlumidpbucrc.supabase.co",
  "sb_publishable_3h7cO2Z8CDxZyEKDLRzvtg_1UJCLldJ"
);

async function sendResetEmail() {
  const email = document.getElementById("email").value.trim();
  const status = document.getElementById("status");

  status.style.color = "#b00020";
  status.innerText = "";

  if (!email) {
    status.innerText = "Enter your email address.";
    return;
  }

  const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.origin + "/customer-reset-password.html"
  });

  if (error) {
    status.innerText = error.message;
    return;
  }

  status.style.color = "#0b7a28";
  status.innerText = "Password reset email sent.";
}
</script>

</body>
</html>
