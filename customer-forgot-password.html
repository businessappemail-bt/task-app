const supabaseClient = window.supabase.createClient(
  "https://dbcthtjmtlumidpbucrc.supabase.co",
  "sb_publishable_3h7cO2Z8CDxZyEKDLRzvtg_1UJCLldJ"
);

async function sendResetEmail() {

  const email =
    document.getElementById("email").value.trim();

  const status =
    document.getElementById("status");

  status.style.color = "#b00020";
  status.innerText = "";

  if (!email) {
    status.innerText = "Enter your email address.";

  const { error } =
    await supabaseClient.auth.resetPasswordForEmail(email, {

}

  <style>
    * {

    body {
      margin: 0;

      background: #f5f7f5;

      background: white;
      border-radius: 28px;

    h1 {
      text-align: center;
      margin-bottom: 10px;
      font-size: 28px;
      font-weight: 900;
    }

    .sub {
      text-align: center;
      color: #666;
      font-size: 14px;
      line-height: 1.5;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 15px;
      border-radius: 16px;
      border: 1px solid #d9dfda;

      margin-top: 12px;

    button {
      width: 100%;
      padding: 15px;
      margin-top: 18px;
      border: none;
      border-radius: 18px;
      background: linear-gradient(135deg, #0b7a28, #19b64c);
      color: white;
      font-size: 15px;
      font-weight: 900;
      cursor: pointer;
    }

    #status {
      margin-top: 16px;
      text-align: center;
      font-size: 13px;
      font-weight: 800;
      min-height: 18px;
      line-height: 1.4;
    }
  </style>
</head>

<body>

<div class="card">

  <h1>Reset Password</h1>

  <div class="sub">
    Enter your new password below.
  </div>

  <input
    id="password"
    type="password"
    placeholder="New Password"
  >

  <input
    id="confirmPassword"
    type="password"
    placeholder="Confirm Password"
  >

  <button onclick="updatePassword()">
    Update Password
  </button>

  <div id="status"></div>

</div>

<script>
const supabaseClient = window.supabase.createClient(
  "https://dbcthtjmtlumidpbucrc.supabase.co",
  "sb_publishable_3h7cO2Z8CDxZyEKDLRzvtg_1UJCLldJ"
);

async function updatePassword() {

  const password =
    document.getElementById("password").value;

  const confirmPassword =
    document.getElementById("confirmPassword").value;

  const status =
    document.getElementById("status");

  status.style.color = "#b00020";
  status.innerText = "";

  if (!password || !confirmPassword) {
    status.innerText = "Complete all fields.";
    return;
  }

  if (password !== confirmPassword) {
    status.innerText = "Passwords do not match.";
    return;
  }

  if (password.length < 6) {
    status.innerText = "Password must be at least 6 characters.";
    return;
  }

  const { error } =
    await supabaseClient.auth.updateUser({
      password: password
    });

  if (error) {
    status.innerText = error.message;
    return;
  }

  status.style.color = "#0b7a28";
  status.innerText = "Password updated successfully.";

  setTimeout(() => {
    window.location.href = "login.html";
  }, 1500);
}
</script>

</body>
</html>
